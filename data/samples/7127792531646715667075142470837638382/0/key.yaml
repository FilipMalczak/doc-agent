"## Test Overview: `tests/test_parse_cfg.py`\n\n- **Purpose**: Verify that `pip_outdated.find_require.parse_cfg`\
  \ correctly extracts package names from a `setup.cfg` file.  \n- **File location**:\
  \ `tests/test_parse_cfg.py` (Python source file).  \n\n### What the test does\n\
  1. **Creates a temporary `setup.cfg`**:\n   - Uses the `tmp_path` pytest fixture\
  \ to generate a temporary directory.\n   - Writes a minimal configuration with the\
  \ following sections:\n     - `[options]`  \n       - `setup_requires` (two entries).\
  \  \n       - `install_requires` (two entries, one with a version range).  \n  \
  \   - `[options.extras_require]`  \n       - `docs` (two entries).  \n\n2. **Invokes\
  \ the parser**:\n   - Calls `parse_cfg(str(file))`, passing the path of the temporary\
  \ `setup.cfg`.  \n   - The function returns an iterable of requirement objects.\n\
  \n3. **Collects the parsed names**:\n   - Extracts the `name` attribute from each\
  \ requirement object:  \n     ```python\n     names = [r.name for r in parse_cfg(str(file))]\n\
  \     ```\n\n4. **Asserts the expected order and content**:\n   - The extracted\
  \ names must match exactly:\n     ```python\n     [\n         \"setuptools_scm\"\
  ,\n         \"setuptools_scm_git_archive\",\n         \"ansible\",\n         \"\
  ansible-lint\",\n         \"alabaster\",\n         \"Sphinx\"\n     ]\n     ```\n\
  \n### Key Behaviors Verified\n- **Section handling**:  \n  - Parses `setup_requires`,\
  \ `install_requires`, and `extras_require` (specifically the `docs` extra).  \n\
  - **Version specifiers**:  \n  - Strips version constraints (e.g., `>= 1.15.0`,\
  \ `< 5`) and retains only the package name.  \n- **Whitespace & formatting**:  \n\
  \  - Handles multiline values with indentation.  \n- **Order preservation**:  \n\
  \  - Returns names in the order they appear in the file.  \n\n### Implications for\
  \ Users\n- **Function usage**: Users can call `parse_cfg(path_to_cfg)` to obtain\
  \ a list of requirement objects representing all declared dependencies (including\
  \ extras).  \n- **Output format**: Each requirement object provides a `.name` attribute;\
  \ version specs are omitted in the name extraction.  \n- **Supported sections**:\
  \ The parser currently supports the common `setup_requires`, `install_requires`,\
  \ and any extras defined under `[options.extras_require]`.  \n\n### Additional Context\
  \ for Documentation\n- **Testing environment**: Relies on pytest\u2019s `tmp_path`\
  \ fixture; no external files are needed.  \n- **Error handling**: The test assumes\
  \ a well\u2011formed `setup.cfg`. Documentation should clarify behavior when sections\
  \ are missing or malformed.  \n- **Extensibility**: If the project adds support\
  \ for other configuration sections (e.g., `build-system.requires` in `pyproject.toml`),\
  \ similar tests should be added.  "
