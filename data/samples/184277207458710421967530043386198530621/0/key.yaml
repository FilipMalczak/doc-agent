"# Notes on `pip_outdated/session.py`\n## Design Rationale (for documentation)\n-\
  \ **User\u2011Agent branding**: Helps users and maintainers identify traffic generated\
  \ by *pip-outdated*.\n- **Connection limit**: A modest default (`5`) balances performance\
  \ with courtesy to external services, especially when checking many package indexes\
  \ in parallel.\n- **Encapsulation**: Providing a single function abstracts away\
  \ aiohttp configuration details, making the rest of the codebase cleaner and easier\
  \ to maintain.\n"
