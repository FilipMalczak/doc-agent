- content: "# Notes for End\u2011User Perspective (pip_outdated/find_require.py)\n\
    \n- **Purpose** \u2013 Provides utilities to locate and parse Python package requirements\
    \ from various files (e.g., `requirements.txt`, `setup.cfg`).  \n- **Key Functions**\
    \  \n  - `iter_files(patterns)` \u2013 Yields `pathlib.Path` objects for each\
    \ file matching one or more glob patterns. Accepts individual file paths or patterns.\
    \  \n  - `file_to_lines(file)` \u2013 Reads a file line\u2011by\u2011line, prints\
    \ a parse message when `verbose()` is true, and forwards the content to `parse_lines`.\
    \  \n  - `parse_lines(lines: Iterable[str])` \u2013 Normalises raw lines:  \n\
    \    - Strips inline comments that start with `#`.  \n    - Handles line continuations\
    \ ending with a backslash (`\\`).  \n    - Removes trailing new\u2011line characters.\
    \  \n  - `parse_requirements(file)` \u2013 Uses `file_to_lines` to read a file\
    \ and yields `Requirement` objects for each valid requirement line.  \n  - `parse_requirements_text(text:\
    \ str)` \u2013 Same as `parse_requirements` but works on a raw string (useful\
    \ for in\u2011memory config values).  \n  - `parse_cfg(file)` \u2013 Parses a\
    \ `.cfg` file with `ConfigParser` and extracts requirement sections:  \n    -\
    \ `setup_requires`  \n    - `install_requires`  \n    - All entries under `options.extras_require`\
    \  \n    For each extracted text block, it yields `Requirement` objects via `parse_requirements_text`.\
    \  \n  - `find_require(files)` \u2013 Main entry point: iterates over given file\
    \ patterns, chooses parsing strategy based on file suffix (`.cfg` \u2192 `parse_cfg`,\
    \ otherwise \u2192 `parse_requirements`), and yields all discovered `Requirement`\
    \ objects.  \n  - `parse_require(text)` \u2013 Cleans a requirement line by removing\
    \ option flags (e.g., `--hash=...`) and attempts to create a `packaging.requirements.Requirement`.\
    \ Returns `None` on `InvalidRequirement`.  \n\n- **Behavior Details**  \n  - Comments\
    \ are detected with a regular expression that matches `#` preceded by whitespace\
    \ or start of line; the comment and everything after it are omitted.  \n  - Continuation\
    \ lines ending with `\"\\\\\\n\"` are concatenated with the following line before\
    \ further processing.  \n  - When `verbose()` returns `true`, each file being\
    \ parsed is printed as `Parse: <file>`.  \n\n- **Typical Usage for an End\u2011\
    User**  \n  ```python\n  from pip_outdated.find_require import find_require\n\n\
    \  # Find all requirements in the current directory matching typical patterns\n\
    \  requirements = list(find_require([\"requirements.txt\", \"setup.cfg\", \"*.in\"\
    ]))\n  for req in requirements:\n      print(req)   # each `req` is a `packaging.requirements.Requirement`\
    \ instance\n  ```\n\n- **Relevant Imports** \u2013 Uses standard library (`collections.abc.Iterable`,\
    \ `configparser.ConfigParser`, `pathlib`, `re`) and third\u2011party `packaging.requirements.Requirement`.\
    \  \n\n- **Limitations** \u2013 Invalid requirement lines are silently skipped\
    \ (returned as `None`). No handling of other config formats (e.g., `pyproject.toml`).\
    \  \n\n- **Helpful Reference** \u2013 Requirement\u2011file syntax is documented\
    \ at https://pip.pypa.io/en/stable/reference/pip_install/#requirements-file-format.\
    \  "
