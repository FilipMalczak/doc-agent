  builtin_tools: []
  function_tools:
  - description: '<summary>Indicate that you cannot provide a correct answer. Use
      this tool only if you don''t know (and have no way to

      get to know) the answer, not when there should be no answer (in which case use
      the `empty_result` instead).

      Consider this your way to admit defeat instead of hallucinating an answer; using
      this tool will be considered

      a failure to solve your task.</summary>

      <returns>

      <description>end of the agent session</description>

      </returns>'
    kind: function
    metadata: null
    name: i_dont_know
    outer_typed_dict_key: null
    parameters_json_schema:
      additionalProperties: false
      properties:
        comment:
          description: explanation as to why you're unable to provide the result
          type: string
      required:
      - comment
      type: object
    sequential: false
    strict: null
  - description: "<summary>Run a multi-stage retrieval pipeline and return scored\
      \ documents relevant to a given purpose.\n\nThis pipeline is more than a simple\
      \ vector search. It orchestrates several LLM-powered steps, each of which\n\
      contributes to expanding, cleaning, and ranking the search space:\n\n**1. Search-area\
      \ expansion**\n   - An agent generates query rewrites and auxiliary queries\
      \ to broaden the retrieval space.\n\n**2. Vector index retrieval**\n   - Documents\
      \ are retrieved in high volume from the vector store.\n   - Quality is intentionally\
      \ unfiltered at this stage to maximize recall.\n\n**3. Deduplication / grouping**\n\
      \   - Retrieved documents are clustered:\n       \u2022 Original source files\
      \ form their own groups and are always promoted.\n       \u2022 Derived documents\
      \ (e.g., chunks) are grouped by type and subject.\n   - Each group is sent to\
      \ a specialized agent, which selects a representative and may adjust its score.\n\
      \n**4. Reranking**\n   - Group representatives are evaluated by another agent\
      \ that assigns new scores based on alignment\n     with the overall search purpose.\n\
      \n**5. Softmax normalization**\n   - Documents are sorted by score and normalized\
      \ so scores sum to 1.\n   - Relative score ratios from the reranker are preserved.\n\
      \n**6. Cutoff-based selection**\n   - Documents are collected in descending\
      \ score order until their cumulative normalized score\n     reaches the cutoff\
      \ threshold.\n   - Only the collected documents are returned.</summary>\n<returns>\n\
      <description>The final set of documents, sorted by decreasing score and annotated\
      \ with their normalized relevance values.</description>\n</returns>"
    kind: function
    metadata: null
    name: search_knowledge_base
    outer_typed_dict_key: null
    parameters_json_schema:
      additionalProperties: false
      properties:
        additional_deduplication_instructions:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: "Extra guidance for the deduplication agent. Can express preferences\
            \ such as \u201Cprefer smaller chunks\u201D or \u201Cprefer full documents\
            \ over chunk extracts\u201D."
        additional_rephrasing_instructions:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: "Extra guidance for the expansion agent. Useful for applying\
            \ constraints such as \u201Cuse only the vocabulary present in the original\
            \ queries\u201D or other domain-specific rules."
        additional_reranking_instructions:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Extra guidance for the reranking agent. Can express relevance
            and priority rules, such as ranking complete documents above chunked ones
            when their content overlaps.
        cutoff:
          anyOf:
          - type: number
          - type: integer
          default: 0.8
          description: The score accumulation threshold used during final selection.
            Accepts either a float in the range [0.0, 1.0] or an integer in the range
            [0, 100]. Defaults to 0.8 (Pareto 80%).
        expansion_count:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          description: 'Number of auxiliary expansion queries. Defaults to the maximum
            of: `max(3, log2(len(queries)), rewrite_count)`.'
        purpose:
          description: The high-level reason for performing the search. Provided to
            all agents in the pipeline for contextual alignment.
          type: string
        queries:
          description: The initial search terms or phrases.
          items:
            type: string
          type: array
        rewrite_count:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          description: Number of rewrites per original query during expansion. Defaults
            to `max(2, log2(len(queries)))`.
      required:
      - purpose
      - queries
      type: object
    sequential: false
