"# Do not fail with a non\u2011zero exit code when updates exist\n### 4.4 Output Explanation\n\
  - **Table Columns**\n  - **Name** \u2013 Package name.\n  - **Installed** \u2013\
  \ Version currently installed locally (red if not installed).\n  - **Wanted** \u2013\
  \ Newest version that satisfies the requirement specifier (green if newer than installed).\n\
  \  - **Latest** \u2013 Absolute newest stable version on PyPI (green if newer than\
  \ installed).\n- **Color Legend**\n  - **Red** \u2013 Information unavailable or\
  \ version does not satisfy the specifier.\n  - **Green** \u2013 A newer version\
  \ exists and can be upgraded.\n- **Exit Codes**\n  - `0` \u2013 All dependencies\
  \ are up\u2011to\u2011date *or* `--quiet` was used.  \n  - `1` \u2013 At least one\
  \ dependency is outdated *and* `--quiet` was *not* used (useful for CI pipelines).\n"
