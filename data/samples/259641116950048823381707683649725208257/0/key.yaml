  - description: "<summary>Run a multi-stage retrieval pipeline and return scored\
      \ documents relevant to a given purpose.\n\nThis pipeline is more than a simple\
      \ vector search. It orchestrates several LLM-powered steps, each of which\n\
      contributes to expanding, cleaning, and ranking the search space:\n\n**1. Search-area\
      \ expansion**\n   - An agent generates query rewrites and auxiliary queries\
      \ to broaden the retrieval space.\n\n**2. Vector index retrieval**\n   - Documents\
      \ are retrieved in high volume from the vector store.\n   - Quality is intentionally\
      \ unfiltered at this stage to maximize recall.\n\n**3. Deduplication / grouping**\n\
      \   - Retrieved documents are clustered:\n       \u2022 Original source files\
      \ form their own groups and are always promoted.\n       \u2022 Derived documents\
      \ (e.g., chunks) are grouped by type and subject.\n   - Each group is sent to\
      \ a specialized agent, which selects a representative and may adjust its score.\n\
      \n**4. Reranking**\n   - Group representatives are evaluated by another agent\
      \ that assigns new scores based on alignment\n     with the overall search purpose.\n\
      \n**5. Softmax normalization**\n   - Documents are sorted by score and normalized\
      \ so scores sum to 1.\n   - Relative score ratios from the reranker are preserved.\n\
      \n**6. Cutoff-based selection**\n   - Documents are collected in descending\
      \ score order until their cumulative normalized score\n     reaches the cutoff\
      \ threshold.\n   - Only the collected documents are returned.</summary>\n<returns>\n\
      <description>The final set of documents, sorted by decreasing score and annotated\
      \ with their normalized relevance values.</description>\n</returns>"
    kind: function
    metadata: null
    name: search_knowledge_base
    outer_typed_dict_key: null
    parameters_json_schema:
      additionalProperties: false
      properties:
        additional_deduplication_instructions:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: "Extra guidance for the deduplication agent. Can express preferences\
            \ such as \u201Cprefer smaller chunks\u201D or \u201Cprefer full documents\
            \ over chunk extracts\u201D."
        additional_rephrasing_instructions:
