"### `OutdateResult` (in `check_outdated.py`)  \n\n| Field | Type | Meaning |\n|-------|------|---------|\n\
  | `requirement` | `Requirement` | Parsed requirement line (name, specifier, extras).\
  \ |\n| `version` | `Optional[Version]` | Currently installed version (or `None`).\
  \ |\n| `all_versions` | `List[Version]` | All stable PyPI releases, sorted. |\n\
  | `wanted` | `Optional[Version]` | Highest PyPI version satisfying the requirement\u2019\
  s specifier. |\n| `latest` | `Optional[Version]` | Newest stable PyPI release. |\n\
  | **Computed helpers** | \u2013 | `name`, `install_not_found()`, `install_not_wanted()`,\
  \ `pypi_not_found()`, `outdated()` |\n\nThese helpers drive the colour logic in\
  \ `print_outdated.py`.\n\n---  \n"
