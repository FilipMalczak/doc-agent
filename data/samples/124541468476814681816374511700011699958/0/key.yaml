"### Behaviour Summary\n1. **Locate requirements** via `pip_outdated.find_require.find_require`.\n\
  2. **Check each requirement** asynchronously with `pip_outdated.check_outdated.check_outdated`.\n\
  3. **Display results** using a colour\u2011coded ASCII table (`pip_outdated.print_outdated`).\n\
  4. **Exit code**: `0` when everything is up\u2011to\u2011date **or** `--quiet` is\
  \ set; otherwise `1`.\n\n---\n"
