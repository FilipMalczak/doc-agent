"## Maintainer\u2011focused notes on `tests/test_parse_cfg.py`\n\n- **Purpose of the\
  \ test**  \n  - Verifies that `pip_outdated.find_require.parse_cfg` can read a `setup.cfg`\
  \ file and extract *only the package names* from the `setup_requires`, `install_requires`,\
  \ and `extras_require` sections.  \n\n- **Key behaviours exercised**  \n  - Handles\
  \ a standard `setup.cfg` layout with `[options]` and `[options.extras_require]`\
  \ sections.  \n  - Supports multiline requirement lists that are indented under\
  \ each key.  \n  - Strips version specifiers (e.g., `>= 1.15.0`, `>= 4.0.2, < 5`)\
  \ and returns just the plain package names.  \n  - Returns an iterable of objects\
  \ (presumably Requirement\u2011like) from which the `.name` attribute can be accessed.\
  \  \n\n- **Test data snapshot** (the temporary `setup.cfg` created in the test)\
  \  \n\n  ```ini\n  [options]\n  setup_requires =\n      setuptools_scm >= 1.15.0\n\
  \      setuptools_scm_git_archive >= 1.0\n      \n  install_requires =\n      ansible\
  \ >= 2.5\n      ansible-lint >= 4.0.2, < 5\n      \n  [options.extras_require]\n\
  \  docs =\n      alabaster\n      Sphinx\n  ```\n\n- **Expected result**  \n  -\
  \ The list of extracted names must be exactly:  \n\n    - `\"setuptools_scm\"` \
  \ \n    - `\"setuptools_scm_git_archive\"`  \n    - `\"ansible\"`  \n    - `\"ansible-lint\"\
  `  \n    - `\"alabaster\"`  \n    - `\"Sphinx\"`  \n\n- **Implications for end\u2011\
  user documentation**  \n  - When describing the `parse_cfg` utility, highlight that\
  \ it can be used to *list all dependencies* declared in a project's `setup.cfg`,\
  \ ignoring version constraints.  \n  - Emphasise that the function works with both\
  \ regular dependencies and optional extras (e.g., `docs`).  \n  - Indicate that\
  \ the output is a collection of objects exposing a `.name` attribute, suitable for\
  \ further processing or presentation to users.  "
