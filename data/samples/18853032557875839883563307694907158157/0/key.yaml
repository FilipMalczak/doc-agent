"# Example: find all requirements in the current directory\nfor req in find_require([\"\
  requirements.txt\", \"setup.cfg\", \"src/*.txt\"]):\n    print(req)          # ->\
  \ Requirement object, e.g. \"requests>=2.25\"\n```\n\n- Pass a list of file paths\
  \ or glob patterns to `find_require`.  \n- The function yields `Requirement` objects\
  \ that can be inspected (`.name`, `.specifier`, `.extras`, etc.).  \n\n## Edge Cases\
  \ & Limitations  \n\n- **Comments** \u2013 Only `#` that start a comment after optional\
  \ whitespace are stripped. Inline `#` inside a URL (e.g., `git+https://example.com#egg=pkg`)\
  \ may be incorrectly truncated.  \n- **Continuation Lines** \u2013 Only a backslash\
  \ (`\\`) followed by a newline is treated as a line continuation. Other whitespace\u2011\
  based continuations are not supported.  \n- **Option Parsing** \u2013 The regex\
  \ `r\"(.*?)\\s--?[a-z]\"` removes anything from the first whitespace before an option\
  \ flag. Complex option syntax (e.g., `--hash=sha256:...`) may cause premature truncation.\
  \  \n- **Invalid Requirements** \u2013 Lines that cannot be parsed into a `Requirement`\
  \ are silently dropped; no error is raised.  \n"
