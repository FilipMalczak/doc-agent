      \    <summary>...</summary>\n  </perspective>\n  <low_level>\n\nDeduplicate\
      \ the variants of the retrieved document. \nReduce the list of candidates to\
      \ a single, best one. \nMeasure 'best' against the given purpose.\nModify (usually\
      \ raise; if not - include the reason in the explanation) the score to reflect\
      \ the document being found multiple times. \nBoth the input and updated score\
      \ should be in [0.0, 1.0] range, where 1.0 means the best similarity and 0.0\
