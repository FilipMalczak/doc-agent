"# Do not fail with a non\u2011zero exit code when updates exist\npip-outdated -q\n\
  ```\n\n### 4.3 Command\u2011Line Reference\n| Option | Shortcut | Effect |\n|--------|----------|--------|\n\
  | `--verbose` | `-v` | Prints detailed status lines (e.g., each package being checked).\
  \ |\n| `--quiet`   | `-q` | Suppresses the non\u2011zero exit code when outdated\
  \ packages are found. |\n| `file`      | \u2013   | Zero or more positional arguments\
  \ representing file paths or glob patterns. Defaults to `[\"requirements.txt\",\
  \ \"setup.cfg\"]`. |\n\n### 4.4 Output Explanation\n- **Table Columns**\n  - **Name**\
  \ \u2013 Package name.\n  - **Installed** \u2013 Version currently installed locally\
  \ (red if not installed).\n  - **Wanted** \u2013 Newest version that satisfies the\
  \ requirement specifier (green if newer than installed).\n  - **Latest** \u2013\
  \ Absolute newest stable version on PyPI (green if newer than installed).\n- **Color\
  \ Legend**\n  - **Red** \u2013 Information unavailable or version does not satisfy\
  \ the specifier.\n  - **Green** \u2013 A newer version exists and can be upgraded.\n\
  - **Exit Codes**\n  - `0` \u2013 All dependencies are up\u2011to\u2011date *or*\
  \ `--quiet` was used.  \n  - `1` \u2013 At least one dependency is outdated *and*\
  \ `--quiet` was *not* used (useful for CI pipelines).\n\n### 4.5 Technical Details\
  \ (for advanced users)\n- **Async Implementation** \u2013 Uses `asyncio` with a\
  \ manually managed event loop (`run_until_complete`) to work around an `aiohttp`\
  \ bug that closes the loop when `asyncio.run` is used.  \n- **Session Limits** \u2013\
  \ HTTP requests are limited to 5 concurrent connections to avoid overloading PyPI\
  \ servers.  \n- **Version Filtering** \u2013 Only stable (non\u2011prerelease) releases\
  \ are considered; prereleases are ignored.  \n- **Requirement Parsing Edge Cases**\n\
  \  - Inline `#` inside URLs may be stripped incorrectly.\n  - Only backslash (`\\\
  `) line continuations are supported.\n  - Options after a requirement (e.g., `--no-binary`)\
  \ are removed by a simple regex, which may truncate complex options.\n\n### 4.6\
  \ Extending / Customizing\n- **Adding New File Types** \u2013 Extend `find_require.find_require`\
  \ with a new parser that yields `Requirement` objects similar to the existing `parse_cfg`\
  \ and `parse_requirements`.  \n- **Changing HTTP Behaviour** \u2013 Modify `session.get_session`\
  \ to adjust headers or connection limits, or instantiate `aiohttp.ClientSession`\
  \ directly if deeper customization is needed.  \n- **Verbosity** \u2013 The `verbose`\
  \ flag is a lightweight global; for more sophisticated logging, replace uses of\
  \ `verbose()` with the standard `logging` module.\n\n## 5. Important Implementation\
  \ Notes (for documentation writers)\n\n- **Lazy Imports** \u2013 Heavy modules (`aiohttp`,\
  \ `check_outdated`, etc.) are imported inside the async main function to keep CLI\
  \ start\u2011up fast.  \n- **Global Verbose Flag** \u2013 Simple boolean stored\
  \ in `pip_outdated.verbose`; not thread\u2011safe and should be set once at start\u2011\
  up.  \n- **Error Handling** \u2013 Functions return `None` or empty collections\
  \ on failures (e.g., missing local package, unavailable PyPI data) rather than raising,\
  \ ensuring the tool continues processing other packages.  \n- **Known Limitation**\
  \ \u2013 The tool does not resolve transitive dependencies; it only checks packages\
  \ explicitly listed in the scanned files.\n\n---\n\n*These directory\u2011level\
  \ notes synthesize the file\u2011level information into a cohesive description suitable\
  \ for user\u2011facing documentation, onboarding guides, and technical references\
  \ for contributors.*"
