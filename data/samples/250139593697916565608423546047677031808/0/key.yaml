"- **Project name:** `pip-outdated`  \n- **Current version:** `0.8.0`  \n- **Purpose:**\
  \ Tool to find outdated dependencies in `requirements.txt` or `setup.cfg`.  \n-\
  \ **Author:** `eight` \u2013 contact via **eight04@gmail.com**.  \n- **License:**\
  \ MIT (permissive open\u2011source license).  \n- **Homepage / source repo:** <https://github.com/eight04/pip-outdated>\
  \  \n- **Keywords for discoverability:** `pip`, `check`, `outdate`, `npm`.  \n\n\
  ### How end users interact with the tool\n- The package installs a **console script**\
  \ named **`pip-outdated`** (declared under `options.entry_points`).  \n- Running\
  \ `pip-outdated` from the command line invokes the project's `main` function (`pip_outdated:main`).\
  \  \n\n### Dependencies users must have (installed automatically)\n- `aiohttp` (~=3.12)\
  \ \u2013 asynchronous HTTP client.  \n- `colorama` (~=0.4.6) \u2013 cross\u2011\
  platform colored terminal text.  \n- `packaging` (~=25.0) \u2013 utilities for version\
  \ handling.  \n- `termcolor` (~=3.1) \u2013 colored terminal output.  \n- `terminaltables`\
  \ (~=3.1) \u2013 simple table formatting for terminal output.  \n\n### Installation\
  \ notes for end users\n- Install via pip (e.g., `pip install pip-outdated`).  \n\
  - The package is **zip\u2011safe** and discovers its Python packages automatically\
  \ (excluding the `tests` directory).  \n\n### Additional configuration\n- The `[vpip]`\
  \ section defines a fallback command (`python cute.py`). This is internal configuration\
  \ and does not affect typical end\u2011user usage.  "
