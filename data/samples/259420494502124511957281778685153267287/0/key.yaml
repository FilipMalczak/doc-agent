"## \U0001F4C4 File Overview\n\n- **Path:** `pip_outdated/session.py`\n- **Language:**\
  \ Python\n- **Primary role:** Centralises creation of a pre\u2011configured `aiohttp.ClientSession`\
  \ for the *pip\u2011outdated* tool.\n\n## \U0001F527 Key Function\n\n- **Signature:**\
  \ `get_session() -> aiohttp.ClientSession`\n- **What it does:**\n  - Instantiates\
  \ a new `aiohttp.ClientSession` on every call.\n  - Sets a default HTTP header `\"\
  User-Agent\": \"pip-outdated\"`.\n  - Uses an `aiohttp.TCPConnector` with `limit=5`\
  \ to cap concurrent connections.\n\n## \U0001F4E6 Usage Example (User\u2011Facing)\n\
  \n```python\nimport asyncio\nfrom pip_outdated.session import get_session\n\nasync\
  \ def main() -> None:\n    async with get_session() as session:\n        async with\
  \ session.get(\"https://pypi.org/pypi/pip/json\") as resp:\n            data = await\
  \ resp.json()\n            # \u2026 process the JSON response \u2026\n\nasyncio.run(main())\n\
  ```\n- **Note:** Wrapping the session in an `async with` block guarantees proper\
  \ cleanup (the session is closed automatically).\n\n## \U0001F4DA Dependencies\n\
  \n- Requires the third\u2011party library `aiohttp`.\n\n## \U0001F6E0 Design Rationale\n\
  \n- **Single source of truth:** All HTTP requests share the same User\u2011Agent\
  \ and connection limit, simplifying future adjustments.\n- **Connection limit (`5`):**\
  \ Matches the modest parallelism of the CLI, preventing excessive open sockets.\n"
