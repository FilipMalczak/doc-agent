"# Directory\u2011Level Notes for **`pip_outdated/`**\n\nThese notes synthesize the\
  \ file\u2011level documentation for the *pip\u2011outdated* package.  \nThey are\
  \ organized to support the creation of user\u2011facing documentation, onboarding\
  \ material, or a quick\u2011reference guide.\n\n---  \n\n## 5. Verbosity & Quiet\
  \ Modes  \n\n- **Verbose (`-v / --verbose`)** \u2013 Enables extra diagnostic prints\
  \ (e.g., file parsing traces, per\u2011package status). Implemented via the global\
  \ flag in `verbose.py`.  \n- **Quiet (`-q / --quiet`)** \u2013 Suppresses the non\u2011\
  zero exit code when outdated packages are detected, allowing callers (scripts, CI)\
  \ to handle results themselves.\n\n---  \n"
