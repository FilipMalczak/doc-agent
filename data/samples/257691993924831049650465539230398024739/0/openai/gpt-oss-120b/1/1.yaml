- content: "## Maintainer\u2011focused notes for **`pip_outdated/print_outdated.py`**\n\
    \n### Overview\n- This module formats and displays information about Python package\
    \ versions that are outdated, missing, or otherwise unavailable.\n- It is used\
    \ by the **pip\u2011outdated** tool to present a concise, colour\u2011coded table\
    \ to the end\u2011user.\n\n### Public API\n| Function | Purpose | Return type\
    \ |\n|---|---|---|\n| `make_row(outdate: OutdateResult) -> Optional[List[str]]`\
    \ | Builds a single table row for a package if it is outdated; otherwise returns\
    \ `None`. | `list` of string values or `None`. |\n| `print_outdated(outdates:\
    \ List[Awaitable[OutdateResult]], quiet: bool) -> Awaitable[None]` | Awaits each\
    \ `OutdateResult`, assembles the table, prints colour\u2011coded guidance, and\
    \ exits with status\u202F1 when updates are available (unless `quiet` is `True`).\
    \ | `None` (async). |\n\n### Behaviour details (relevant for end\u2011users)\n\
    \n- **Colour coding** (displayed via `termcolor` and `colorama`):\n  - **Red**\
    \ \u2013 indicates a version that cannot be determined, is unavailable, or does\
    \ not satisfy the version specifier.\n  - **Green** \u2013 indicates an up\u2011\
    datable version (installed version is older than the wanted/latest version).\n\
    \  - **Cyan (bold)** \u2013 shown when everything is already up\u2011to\u2011\
    date.\n- **Table columns** (always displayed when at least one package is outdated):\n\
    \  - **Name** \u2013 package name.\n  - **Installed** \u2013 current version;\
    \ red\u2011styled if installation data is missing or not wanted.\n  - **Wanted**\
    \ \u2013 version requested in requirements; red if the package is not found on\
    \ PyPI or no version specifier.\n  - **Latest** \u2013 newest version on PyPI;\
    \ red if the package cannot be queried.\n\n- **Control flow**:\n  1. Initializes\
    \ colour handling with `colorama.init()`.\n  2. Constructs a header row `[\"Name\"\
    , \"Installed\", \"Wanted\", \"Latest\"]`.\n  3. Iterates over the supplied `outdates`\
    \ list:\n     - Awaits each `OutdateResult`.\n     - Calls `make_row`; appends\
    \ the row only when the package is outdated.\n  4. If **no requirements** were\
    \ processed, prints *\u201CNo requirements found.\u201D* (red) and returns.\n\
    \  5. If **all packages are up\u2011to\u2011date**, prints *\u201CEverything is\
    \ up\u2011to\u2011date!\u201D* (cyan, bold) and returns.\n  6. Otherwise prints\
    \ colour legends, renders the Ascii table via `terminaltables.AsciiTable`, and\
    \ outputs it.\n  7. If `quiet` is `False`, terminates the process with exit code\
    \ **1** to signal that updates are required.\n\n### Dependencies (runtime)\n-\
    \ `colorama` \u2013 enables cross\u2011platform ANSI colour handling.\n- `termcolor`\
    \ \u2013 provides colourised text output.\n- `terminaltables` \u2013 renders the\
    \ ASCII table.\n- Local module `.check_outdated` \u2013 defines the `OutdateResult`\
    \ data structure used throughout.\n\n### Execution considerations for maintainers\n\
    - The function is **asynchronous**; callers must `await print_outdated(...)` or\
    \ run it within an event loop.\n- The exit status (non\u2011zero when updates\
    \ exist) is useful for CI pipelines or scripts that need to enforce up\u2011to\u2011\
    date dependencies.\n- The `quiet` flag allows suppression of the non\u2011zero\
    \ exit, useful for scenarios where the output is displayed but the script should\
    \ continue without signalling failure.\n\n### Potential documentation snippets\
    \ (for end\u2011users)\n- *\u201CRun `pip\u2011outdated` to see which of your\
    \ project's dependencies are behind the versions you requested or the latest releases\
    \ on PyPI. Red entries mean the version cannot be determined or does not meet\
    \ the specifier; green entries indicate up\u2011datable packages.\u201D*\n- *\u201C\
    By default the command exits with status\u202F1 when any package can be upgraded.\
    \ Use `--quiet` to prevent the non\u2011zero exit while still seeing the report.\u201D\
    *"
