"## Project Component: `pip_outdated/verbose.py`\n\n### Core Elements\n- **Global\
  \ Variable**\n  - `VERBOSE: bool = None`\n    - Holds the current verbose state.\n\
  \    - Initialized to `None` (unset) to allow the project to decide the default\
  \ behavior.\n\n- **Functions**\n  - `set_verbose(value: bool) -> None`\n    - **Description**:\
  \ Updates the global `VERBOSE` flag.\n    - **Parameters**\n      - `value`: Boolean\
  \ indicating whether verbose mode should be enabled (`True`) or disabled (`False`).\n\
  \    - **Side Effects**: Modifies the module\u2011level `VERBOSE` variable via `global`.\n\
  \  - `verbose() -> bool`\n    - **Description**: Retrieves the current value of\
  \ the global `VERBOSE` flag.\n    - **Return**: The boolean value stored in `VERBOSE`\
  \ (or `None` if not yet set).\n"
