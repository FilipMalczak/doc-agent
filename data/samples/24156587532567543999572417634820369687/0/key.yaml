"### Runtime Behavior  \n- The CLI parses arguments, sets the global verbose flag\
  \ (`verbose.set_verbose`), discovers required packages (`find_require`), and then\
  \ runs an asynchronous workflow to check for outdated packages.  \n- **Async Execution:**\
  \ Uses `asyncio.get_event_loop().run_until_complete(_main())` instead of `asyncio.run()`\
  \ due to a known issue with aiohttp event\u2011loop handling.  \n- **Workflow inside\
  \ `_main()`**  \n  1. Retrieve CLI arguments.  \n  2. Import and configure helper\
  \ modules (`verbose`, `find_require`, `check_outdated`, `print_outdated`, `session`).\
  \  \n  3. Resolve the list of required packages.  \n  4. Open an HTTP session (`get_session()`)\
  \ for contacting PyPI.  \n  5. Create a task for each requirement to check its latest\
  \ version (`check_outdated`).  \n  6. Await completion and format results via `print_outdated`,\
  \ respecting the `--quiet` flag.  \n"
