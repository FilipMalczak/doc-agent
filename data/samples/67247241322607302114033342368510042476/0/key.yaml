  ### 7. Test Suite (`tests/`)\n### 8. Development & Extensibility Notes\n\n- **Lazy\
  \ Imports** \u2013 Heavy modules (`aiohttp`, `check_outdated`, etc.) are imported\
  \ inside the async main function to keep CLI start\u2011up fast.  \n- **Global Verbose\
  \ Flag** \u2013 Implemented as a simple boolean in `pip_outdated.verbose`; not thread\u2011\
