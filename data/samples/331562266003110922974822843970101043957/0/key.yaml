"import argparse\nimport asyncio\n\n__version__ = \"0.8.0\"\n\ndef parse_args():\n\
  \    parser = argparse.ArgumentParser(\n        prog=\"pip-outdated\",\n       \
  \ description=\"Find outdated dependencies in your requirements.txt or \"\n    \
  \                \"setup.cfg file.\",\n        formatter_class=argparse.ArgumentDefaultsHelpFormatter)\n\
  \    parser.add_argument(\n        \"-v\", \"--verbose\", action=\"store_true\"\
  , help=\"Print verbose information.\")\n    parser.add_argument(\n        \"-q\"\
  , \"--quiet\", action=\"store_true\",\n        help=\"Don't return exit code 1 if\
  \ not everything is up to date.\")\n    parser.add_argument(\n        \"file\",\
  \ nargs=\"*\", default=[\"requirements.txt\", \"setup.cfg\"], metavar=\"<file>\"\
  ,\n        help=\"Read dependencies from requirements files. This option accepts\
  \ \"\n             \"glob pattern.\")\n    return parser.parse_args()\n    \ndef\
  \ main():\n    # FIXME: we can't use asyncio.run since it closes the event loop\n\
  \    # https://github.com/aio-libs/aiohttp/issues/1925\n    # asyncio.run(_main())\n\
  \    asyncio.get_event_loop().run_until_complete(_main())\n\nasync def _main():\n\
  \    # pylint: disable=import-outside-toplevel\n    args = parse_args()\n\n    from\
  \ .verbose import set_verbose\n    set_verbose(args.verbose)\n    \n    from .find_require\
  \ import find_require\n    from .check_outdated import check_outdated\n    from\
  \ .print_outdated import print_outdated\n    from .session import get_session\n\
  \    \n    requires = find_require(args.file)\n    async with get_session() as session:\n\
  \        outdated_results = [asyncio.create_task(check_outdated(r, session)) for\
  \ r in requires]\n        await print_outdated(outdated_results, args.quiet)\n"
