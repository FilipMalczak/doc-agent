"**Notes for End\u2011User Documentation \u2013 `pip_outdated/check_outdated.py`**\n\
  \n- **Purpose**  \n  - Provides the core logic for detecting whether a Python package\
  \ used in a project is outdated compared with the versions available on PyPI.\n\n\
  - **Main public API**  \n  - `async def check_outdated(require, session) -> OutdateResult`\
  \  \n    - **Parameters**  \n      - `require`: a `packaging.requirements.Requirement`\
  \ object describing the package name and version specifier (e.g., `requests>=2.0`).\
  \  \n      - `session`: an `aiohttp.ClientSession` (or compatible) used for the\
  \ HTTP request to PyPI.  \n    - **Returns**  \n      - An `OutdateResult` instance\
  \ containing the current local version, the list of all released PyPI versions,\
  \ and derived \u201Cwanted\u201D and \u201Clatest\u201D versions.\n\n- **Key data\
  \ structure**  \n  - `@dataclass OutdateResult`  \n    - **Attributes**  \n    \
  \  - `requirement`: the original `Requirement` object.  \n      - `version`: the\
  \ locally\u2011installed version (`None` if the package is not installed).  \n \
  \     - `all_versions`: sorted list of all non\u2011prerelease versions found on\
  \ PyPI.  \n      - `wanted`: the newest version that satisfies the requirement\u2019\
  s specifier (or `None` if none match).  \n      - `latest`: the newest version on\
  \ PyPI (or `None` if no versions were fetched).  \n    - **Convenient properties\
  \ / methods**  \n      - `name`: shortcut to `requirement.name`.  \n      - `install_not_found()`:\
  \ `True` when the package is not installed locally.  \n      - `install_not_wanted()`:\
  \ `True` when the installed version does not satisfy the specifier.  \n      - `pypi_not_found()`:\
  \ `True` when no releases could be retrieved from PyPI.  \n      - `outdated()`:\
  \ `True` when the installed version differs from either the wanted or the latest\
  \ version.\n\n- **Version\u2011retrieval helpers (internal, but useful to know)**\
  \  \n  - `async def get_local_version(name: str) -> Optional[Version]`  \n    -\
  \ Executes `pip show <name>` and parses the \u201CVersion:\u201D line. Returns `None`\
  \ if the package is not installed or the command fails.  \n  - `async def get_pypi_versions(name:\
  \ str, session) -> List[Version]`  \n    - Queries `https://pypi.org/pypi/<name>/json`,\
  \ extracts all release keys, filters out invalid or prerelease versions, and returns\
  \ a sorted list.\n\n- **Behaviour details relevant to users**  \n  - **Prereleases\
  \ are ignored** \u2013 only stable releases are considered when building `all_versions`.\
  \  \n  - **Verbose output** \u2013 if the package\u2019s `verbose()` function returns\
  \ `True`, `check_outdated` prints a line like `Checking: <package> <specifier>`.\
  \  \n  - **Async usage** \u2013 all functions are `async`; callers must run them\
  \ inside an event loop or use `asyncio.run`.  \n  - **Error handling** \u2013 network\
  \ errors raise via `raise_for_status()`. Invalid version strings are silently skipped.\n\
  \n- **Typical usage pattern (example)**  \n\n  ```python\n  import asyncio\n  import\
  \ aiohttp\n  from packaging.requirements import Requirement\n  from pip_outdated.check_outdated\
  \ import check_outdated\n  \n  async def main():\n      req = Requirement(\"requests>=2.20\"\
  )\n      async with aiohttp.ClientSession() as session:\n          result = await\
  \ check_outdated(req, session)\n          if result.outdated():\n              print(f\"\
  {result.name} is outdated: installed {result.version}, \"\n                    f\"\
  wanted {result.wanted}, latest {result.latest}\")\n          else:\n           \
  \   print(f\"{result.name} is up\u2011to\u2011date.\")\n  \n  asyncio.run(main())\n\
  \  ```\n\n- **What the user can infer from `OutdateResult`**  \n  - **`install_not_found()`**\
  \ \u2192 package missing locally \u2192 may need to install.  \n  - **`install_not_wanted()`**\
  \ \u2192 installed version conflicts with the specified constraint \u2192 consider\
  \ upgrading/downgrading.  \n  - **`pypi_not_found()`** \u2192 package name not found\
  \ on PyPI (possible typo).  \n  - **`outdated()`** \u2192 indicates any mismatch\
  \ between the installed version and the wanted/latest versions; useful for CI checks\
  \ or automated updates."
