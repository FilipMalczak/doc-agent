      \     \"file\", nargs=\"*\", default=[\"requirements.txt\", \"setup.cfg\"],\
      \ metavar=\"<file>\",\n        help=\"Read dependencies from requirements files.\
      \ This option accepts \"\n             \"glob pattern.\")\n    return parser.parse_args()\n\
      \    \ndef main():\n    # FIXME: we can't use asyncio.run since it closes the\
      \ event loop\n    # https://github.com/aio-libs/aiohttp/issues/1925\n    # asyncio.run(_main())\n\
      \    asyncio.get_event_loop().run_until_complete(_main())\n\nasync def _main():\n\
      \    # pylint: disable=import-outside-toplevel\n    args = parse_args()\n\n\
      \    from .verbose import set_verbose\n    set_verbose(args.verbose)\n    \n\
