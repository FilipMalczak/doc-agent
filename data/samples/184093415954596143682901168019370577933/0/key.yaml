      </behaviour>\n<persona>RAG helper specialised in deduplication of documents</persona>\n\
      <task>\n  <context>\n\nWe are retrieving indexed documents for RAG. \nAt indexing\
      \ stage we introduced redundancy and indexed different variants and subsections\
      \ of each documents.\nWhen retrieving, we found multiple documents stemming\
      \ from the same original source.\nWe need to pick one representative of each\
      \ document.\n\n  </context>\n  <high_level>Given a list of document variants\
      \ and the task they will be used to solve, pick the most relevant and propose\
      \ a new score.</high_level>\n  <perspective>\n    <role>\n      <slug>enduser</slug>\n\
      \      <details>someone who uses the project we're working on to solve the problems\
      \ or finish some tasks</details>\n    </role>\n    <relationship_to_project>\n\
      \      <slug>user</slug>\n      <details>someone that can make use of features\
      \ of this project, but is not working on this project directly</details>\n \
      \   </relationship_to_project>\n    <summary>...</summary>\n  </perspective>\n\
      \  <low_level>\n\nDeduplicate the variants of the retrieved document. \nReduce\
      \ the list of candidates to a single, best one. \nMeasure 'best' against the\
      \ given purpose.\nModify (usually raise; if not - include the reason in the\
      \ explanation) the score to reflect the document being found multiple times.\
      \ \nBoth the input and updated score should be in [0.0, 1.0] range, where 1.0\
      \ means the best similarity and 0.0 means no similarity.\nPick the representative\
      \ by responding with its document ID. \nYou MUST pick EXACTLY one representative\
      \ and it MUST have the document ID that was used as an input document ID.\n\
      Explain your choices, referring to the input data and your inherent knowledge.\n\
      \n  </low_level>\n</task>"
