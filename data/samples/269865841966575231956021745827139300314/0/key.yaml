"## Project Overview  \n- **Name:** `pip-outdated`  \n- **Purpose:** Detect outdated,\
  \ missing, or incompatible dependencies defined in `requirements.txt` or `setup.cfg`.\
  \  \n- **Key Feature:** Presents results in a colored table; compares installed\
  \ versions against version specifiers.  \n- **Alternative:** For a simple list of\
  \ updatable packages, use `pip list --outdated`.\n\n## Badges  \n- **Build:** ![Travis\
  \ CI](https://travis-ci.com/eight04/pip-outdated.svg?branch=master) \u2192 <https://travis-ci.com/eight04/pip-outdated>\
  \  \n- **Coverage:** ![Codecov](https://codecov.io/gh/eight04/pip-outdated/branch/master/graph/badge.svg)\
  \ \u2192 <https://codecov.io/gh/eight04/pip-outdated>\n\n## Installation  \n```bash\n\
  pip install pip-outdated\n```\n*Published on PyPI*: <https://pypi.org/project/pip-outdated/>\n\
  \n## Usage Synopsis  \n```bash\npip-outdated [-h] [-v] [-q] [<file> [<file> ...]]\n\
  ```\n\n### Positional arguments  \n- `<file>`: One or more requirement files (supports\
  \ glob patterns).  \n  - Default: `requirements.txt`, `setup.cfg`  \n\n### Optional\
  \ arguments  \n- `-h, --help`: Show help message and exit.  \n- `-v, --verbose`:\
  \ Enable verbose output (default: `False`).  \n- `-q, --quiet`: Do **not** exit\
  \ with code\u202F1 when any dependency is outdated (default: `False`).  \n\n###\
  \ Practical examples  \n- **Check multiple requirement files**  \n  ```bash\n  pip-outdated\
  \ *-requirements.txt\n  ```\n- **Check all files in a folder**  \n  ```bash\n  pip-outdated\
  \ requirements/*.txt\n  ```\n"
