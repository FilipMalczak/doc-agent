- content: 'We need to extract atomic facts from file. Provide list of facts with
    explanation. Each fact short, self-contained, based on source code. We''ll output
    using final_result function with facts array. Need to include reasoning? The description
    says "explain why you think that each statement is a fact". So each fact should
    include a rationale. Probably each fact object could have "statement" and "explanation".
    Not specified schema, but we can output list of objects each with "fact" and "explanation".
    Use double quotes. Provide facts about functionality, imports, behavior, handling
    of comments, continuation, etc.


    Let''s craft facts:


    - The module provides functions to parse Python requirement files and setup.cfg
    for dependencies.


    - iter_files yields pathlib.Path objects for files matching given patterns; if
    pattern is a file path, yields that file directly, else yields files matched by
    glob from current directory.


    - file_to_lines reads a file and yields its lines processed by parse_lines; prints
    "Parse: ..." when verbose() is true.


    - parse_lines processes an iterable of strings and handles comments (everything
    after a ''#'' preceded by start or whitespace) and line continuations ending with
    backslash, concatenating them.


    - parse_requirements iterates over lines from file_to_lines and yields Requirement
    objects returned by parse_require; skips lines that can''t be parsed.


    - parse_requirements_text does same for a provided text string.


    - parse_cfg reads a .cfg file using ConfigParser, extracts setup_requires, install_requires,
    and extras_require sections, and yields Requirement objects from their values.


    - find_require takes a list of file patterns, iterates over matching files, parses
    .cfg files with parse_cfg otherwise uses parse_requirements, yielding Requirement
    objects.


    - parse_require strips any options (e.g., "--hash=...") by matching regex that
    captures text before a space followed by ''--'' or ''-''; then attempts to construct
    a packaging.requirements.Requirement; returns None if InvalidRequirement.


    - The module uses packaging.requirements.Requirement to represent each requirement.


    - The regular expression in parse_lines: r"(.*?)(^|\s)#" matches any text before
    a ''#'' that is either at start or preceded by whitespace, used to strip comments.


    - The function verbose is imported from .verbose; when it returns True, file parsing
    prints a message.


    - The module''s top-level docstring: "Find requirements." and a link to pip requirements
    file format.


    These are atomic facts.


    Let''s produce list.


    '
