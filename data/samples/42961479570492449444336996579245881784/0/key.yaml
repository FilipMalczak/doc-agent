"### \U0001F527 Integration Points  \n\n- **`verbose`**: The module imports `verbose`\
  \ from `.verbose`. When enabled, each package check prints: `\"Checking: <name>\
  \ <specifier>\"`.  \n- **Async Context**: All public functions are `async`; callers\
  \ must run them inside an event loop (e.g., via `asyncio.run`).  \n- **HTTP Session**:\
  \ `check_outdated` expects an existing async HTTP session (commonly an `aiohttp.ClientSession`)\
  \ so that connection pooling can be reused across many package checks.  \n\n---\n"
