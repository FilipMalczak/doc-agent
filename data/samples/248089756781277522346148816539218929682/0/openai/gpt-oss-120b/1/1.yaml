    \  \n  ```bash\n  pip install pip-outdated\n  ```\n\n- **CLI Overview**  \n  ```bash\n\
    \  pip-outdated [-h] [-v] [-q] [<file> ...]\n  ```\n  - **Positional `<file>`**\
    \ \u2013 one or more glob patterns; defaults to `requirements.txt` and `setup.cfg`.\
    \  \n  - **Options**  \n    - `-h, --help` \u2013 show help message.  \n    -\
    \ `-v, --verbose` \u2013 enable verbose output (default: `False`).  \n    - `-q,\
    \ --quiet` \u2013 suppress exit\u2011code\u202F1 when some dependencies are not\
    \ up\u2011to\u2011date (default: `False`).  \n\n- **Typical Usage Examples** \
    \ \n  - Scan all `*-requirements.txt` files:  \n    ```bash\n    pip-outdated\
    \ *-requirements.txt\n    ```  \n  - Scan every `.txt` file under a `requirements/`\
