"# Run the pip\u2011outdated command (the CLI wrapper calls `print_outdated` internally)\n\
  pip-outdated\n```\n- The command prints the colour legend, followed by a table similar\
  \ to:\n\n```\n+------------+-----------+--------+--------+\n| Name       | Installed\
  \ | Wanted | Latest |\n+------------+-----------+--------+--------+\n| requests\
  \   | 2.23.0    | 2.28.1 | 2.28.1 |\n| numpy      | 1.18.0    | None   | None  \
  \ |\n+------------+-----------+--------+--------+\n```\n- **Red** entries flag missing\
  \ or mismatched versions; **green** entries indicate an upgrade is available.\n\n\
  ### Points of Interest for Documentation Writers\n- Emphasise the **visual colour\
  \ cues** because they are the primary way users assess package status.  \n- Explain\
  \ the **meaning of the exit code** for automation contexts (e.g., CI pipelines).\
  \  \n- Note the **`quiet` flag** as a way to get only the table output without a\
  \ failing exit status.  \n- Clarify that the module expects **asynchronous** `OutdateResult`\
  \ objects \u2013 the surrounding CLI handles the async gathering.\n\n---\n\n*These\
  \ notes capture the user\u2011relevant behaviour of `print_outdated.py` and can\
  \ be directly reused when drafting the project's user\u2011facing documentation.*"
