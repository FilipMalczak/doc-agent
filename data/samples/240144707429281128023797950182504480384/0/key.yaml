"### Key Data Structure\n- **`OutdateResult` (dataclass)**\n  - **Fields**\n    -\
  \ `requirement: Requirement` \u2013 the original package requirement (name + version\
  \ specifier).\n    - `version: Optional[Version]` \u2013 the version currently installed\
  \ locally (or `None` if not installed).\n    - `all_versions: List[Version]` \u2013\
  \ *all* non\u2011prerelease versions retrieved from PyPI, sorted ascending.\n  \
  \  - `wanted: Optional[Version]` \u2013 the newest version that **satisfies** the\
  \ requirement\u2019s specifier (computed in `__post_init__`).\n    - `latest: Optional[Version]`\
  \ \u2013 the absolute newest version on PyPI (last element of `all_versions`).\n\
  \  - **Properties / Helpers**\n    - `name` \u2013 shortcut for `requirement.name`.\n\
  \    - `install_not_found()` \u2013 `True` when the package is not installed locally.\n\
  \    - `install_not_wanted()` \u2013 `True` when the installed version does **not**\
  \ satisfy the requirement specifier.\n    - `pypi_not_found()` \u2013 `True` when\
  \ no versions could be fetched from PyPI.\n    - `outdated()` \u2013 `True` when\
  \ the installed version differs from either the wanted or the latest version.\n\n\
  ---\n"
