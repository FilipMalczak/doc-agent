"**Notes for Maintainer (from `tests/test_parse_cfg.py`)**\n\n- **Purpose of the test**\
  \  \n  - Verifies that `parse_cfg` correctly parses a `setup.cfg` file and extracts\
  \ *only* the package names, stripping version constraints and any extra characters.\
  \  \n\n- **Key scenarios covered**  \n  - Packages listed under `[options]` \u2192\
  \ `setup_requires` and `install_requires`.  \n  - Packages listed under `[options.extras_require]`\
  \ (e.g., `docs`).  \n  - Handling of version specifiers with comparison operators\
  \ (`>=`, `<`) and commas.  \n  - Preservation of the original declaration order\
  \ across sections.  \n\n- **Expected outcome**  \n  - The function should return\
  \ an iterable of requirement objects whose `name` attributes match:  \n    - `\"\
  setuptools_scm\"`  \n    - `\"setuptools_scm_git_archive\"`  \n    - `\"ansible\"\
  `  \n    - `\"ansible-lint\"`  \n    - `\"alabonly\"`  \n    - `\"Sphinx\"`  \n\n\
  - **Implications for end\u2011users**  \n  - When the library is used to scan a\
  \ project's `setup.cfg`, it will accurately list all required packages, regardless\
  \ of how version constraints are expressed.  \n  - This ensures that any downstream\
  \ tooling (e.g., dependency checkers, CI pipelines) can rely on `parse_cfg` to provide\
  \ a clean list of package names for further processing or reporting.  \n\n- **Maintenance\
  \ considerations**  \n  - If the format of `setup.cfg` changes (e.g., new sections,\
  \ alternative syntax), the test should be updated to reflect those scenarios.  \n\
  \  - Ensure that any future modifications to `parse_cfg` continue to pass this test\
  \ to guarantee backward compatibility with existing projects.  "
