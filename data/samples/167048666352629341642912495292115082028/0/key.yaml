"# Project Notes \u2013 `pip_outdated/__init__.py`\n\n## Overview\n- **Package name:**\
  \ `pip-outdated`\n- **Current version:** `\"0.8.0\"`\n- **Purpose:** Command\u2011\
  line utility that scans a `requirements.txt` or `setup.cfg` file (or any file matching\
  \ a glob pattern) and reports packages that have newer releases available on PyPI.\n\
  \n## Entry Point\n- **Function:** `main()`\n- **How it runs:**  \n  - Uses `asyncio.get_event_loop().run_until_complete(_main())`\
  \ instead of `asyncio.run()` because of a known issue with aiohttp that closes the\
  \ event loop (`https://github.com/aio-libs/aiohttp/issues/1925`).\n\n## Core Workflow\
  \ (`_main`)\n1. **Parse CLI arguments** \u2013 via `parse_args()`.\n2. **Configure\
  \ verbosity** \u2013 calls `set_verbose(args.verbose)` from `.verbose`.\n3. **Load\
  \ required modules** (imported lazily to keep start\u2011up fast):\n   - `.find_require`\
  \ \u2013 discovers dependency specifications.\n   - `.check_outdated` \u2013 contacts\
  \ PyPI to determine newer versions.\n   - `.print_outdated` \u2013 formats and displays\
  \ the results.\n   - `.session` \u2013 provides an aiohttp session for network calls.\n\
  4. **Identify requirements** \u2013 `requires = find_require(args.file)`.\n5. **Create\
  \ an async session** \u2013 `async with get_session() as session:`.\n6. **Schedule\
  \ version checks** \u2013 one `asyncio.create_task` per requirement.\n7. **Print\
  \ results** \u2013 `await print_outdated(outdated_results, args.quiet)`.\n"
