- content: "**Notes for Maintainers (User\u2011Facing Documentation Preparation)**\
    \  \n\n- **Purpose of the module**  \n  - Provides utilities to locate and parse\
    \ Python package requirements from various sources (e.g., `requirements.txt`,\
    \ `setup.cfg`).  \n  - Supports the official *pip* requirements file syntax\u202F\
    \u2014\u202Fsee\u202F<https://pip.pypa.io/en/stable/reference/pip_install/#requirements-file-format>.\n\
    \n- **Key public functions**  \n  - `iter_files(patterns)`: yields `pathlib.Path`\
    \ objects for each matching file. Accepts a list of glob patterns; if a pattern\
    \ points directly to a file, that file is yielded unchanged.  \n  - `file_to_lines(file)`:\
    \ reads a file line\u2011by\u2011line, applying comment stripping and line\u2011\
    continuation handling; prints parsing progress when `verbose()` is truthy.  \n\
    \  - `parse_require(text)`: removes trailing options (e.g., `--no-binary`) via\
    \ a regex, then attempts to build a `packaging.requirements.Requirement` object.\
    \ Invalid lines return `None`.  \n  - `parse_requirements(file)`: iterates over\
    \ cleaned lines from a file and yields valid `Requirement` objects.  \n  - `parse_requirements_text(text)`:\
    \ same as `parse_requirements` but works on an in\u2011memory string (useful for\
    \ embedded requirement blocks).  \n  - `parse_cfg(file)`: reads a `setup.cfg`\u2011\
    style file, extracts requirement sections (`setup_requires`, `install_requires`,\
    \ `extras_require`) and yields parsed `Requirement` objects.  \n  - `find_require(files)`:\
    \ orchestrates the search \u2013 for each path returned by `iter_files`, uses\
    \ `parse_cfg` for `.cfg` files or `parse_requirements` otherwise, yielding every\
    \ discovered requirement.\n\n- **Parsing details**  \n  - **Comment handling**\
    \ \u2013 Lines are truncated at the first unescaped `#` (`re.match(r\"(.*?)(^|\\\
    s)#\", line)`).  \n  - **Line continuation** \u2013 A trailing backslash (`\\\
    `) followed by a newline merges the line with the next one (`pre_line` buffer).\
    \  \n  - **Option stripping** \u2013 The regex `r\"(.*?)\\s--?[a-z]\"` removes\
    \ any trailing pip option (e.g., `package>=1.0 --no-binary :all:`) before constructing\
    \ a `Requirement`.  \n\n- **Verbosity**  \n  - When `verbose()` returns a truthy\
    \ value, each file being parsed is printed (`Parse: {file}`), helping users diagnose\
    \ parsing problems.\n\n- **Error handling**  \n  - Invalid requirement strings\
    \ raise `InvalidRequirement`; these are caught and result in `None`, which is\
    \ silently skipped by the caller loops.  \n\n- **Dependencies**  \n  - Relies\
    \ on `packaging.requirements.Requirement` for proper requirement parsing.  \n\
    \  - Uses Python standard library modules only (`collections.abc`, `configparser`,\
    \ `pathlib`, `re`).  \n\n- **Typical usage pattern for end\u2011users**  \n  ```python\n\
    \  from pip_outdated.find_require import find_require\n\n  # Provide glob patterns\
    \ (e.g., [\"requirements.txt\", \"setup.cfg\"])\n  for req in find_require([\"\
    requirements.txt\", \"setup.cfg\"]):\n      print(req)   # Requirement objects\
    \ can be inspected or stringified\n  ```\n\n- **Considerations for maintainers**\
    \  \n  - Ensure the repository includes a clear guide on which files the tool\
    \ scans (any glob pattern accepted).  \n  - Document that only `.cfg` files trigger\
    \ `parse_cfg`; other files are assumed to follow the standard requirements file\
    \ format.  \n  - Highlight that the parser ignores lines it cannot interpret,\
    \ which may hide malformed entries; advise users to run the tool with `verbose()`\
    \ enabled for debugging.  "
