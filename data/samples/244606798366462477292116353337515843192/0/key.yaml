"# Project Notes: `pip_outdated/check_outdated.py`\n\n## Overview\n- Provides **asynchronous\
  \ utilities** to check if a Python package installed via `pip` is outdated compared\
  \ to versions available on PyPI.  \n- Part of the **`pip_outdated`** project, aimed\
  \ at helping users identify and upgrade stale dependencies.\n\n## Key Components\n\
  \n### `OutdateResult` (dataclass)\n- **Purpose:** Represents the result of an outdated\u2011\
  check for a single requirement.\n- **Fields**\n  - `requirement: Requirement` \u2013\
  \ Original `packaging.Requirement` object.  \n  - `version: Optional[Version]` \u2013\
  \ Currently installed version (or `None` if not installed).  \n  - `all_versions:\
  \ List[Version]` \u2013 All non\u2011prerelease versions found on PyPI, sorted ascending.\
  \  \n  - `wanted: Optional[Version]` \u2013 Newest version that satisfies the requirement\
  \ specifier (computed in `__post_init__`).  \n  - `latest: Optional[Version]` \u2013\
  \ Newest version on PyPI (last element of `all_versions`).  \n- **Computed properties\
  \ & methods**\n  - `name` \u2013 Returns `requirement.name`.  \n  - `install_not_found()`\
  \ \u2013 `True` when the package is not installed locally.  \n  - `install_not_wanted()`\
  \ \u2013 `True` when the installed version does not match the specifier.  \n  -\
  \ `pypi_not_found()` \u2013 `True` when no suitable version could be retrieved from\
  \ PyPI.  \n  - `outdated()` \u2013 `True` if the installed version differs from\
  \ either `wanted` or `latest`.\n\n### Asynchronous Helper Functions\n| Function\
  \ | Description | Return type |\n|----------|-------------|-------------|\n| `async\
  \ def get_local_version(name: str) -> Optional[Version]` | Executes ``pip show <name>``\
  \ in a subprocess, parses the `Version:` line, and returns a `Version` object or\
  \ `None` if the package is not installed. | `Optional[Version]` |\n| `async def\
  \ get_pypi_versions(name: str, session) -> List[Version]` | Performs an HTTP GET\
  \ to ``https://pypi.org/pypi/<name>/json`` using the provided `session` (expected\
  \ to be an `aiohttp` client). Collects all release keys, filters out invalid or\
  \ prerelease versions, sorts them, and returns the list. | `List[Version]` |\n|\
  \ `async def check_outdated(require, session) -> OutdateResult` | Orchestrates the\
  \ check: canonicalizes the requirement name, obtains the local version, fetches\
  \ PyPI versions, prints a verbose message if enabled, and returns an `OutdateResult`.\
  \ | `OutdateResult` |\n\n## How to Use\n```python\nimport asyncio\nimport aiohttp\n\
  from packaging.requirements import Requirement\nfrom pip_outdated.check_outdated\
  \ import check_outdated\n\nasync def main():\n    req = Requirement(\"requests>=2.20,<3\"\
  )\n    async with aiohttp.ClientSession() as session:\n        result = await check_outdated(req,\
  \ session)\n        if result.outdated():\n            print(\n                f\"\
  {result.name} is outdated: installed {result.version}, \"\n                f\"wanted\
  \ {result.wanted}, latest {result.latest}\"\n            )\n        else:\n    \
  \        print(f\"{result.name} is up-to-date.\")\n\nasyncio.run(main())\n```\n\
  - **Parameters**\n  - `require`: a `Requirement` object describing the package and\
  \ version constraints.  \n  - `session`: an `aiohttp.ClientSession` (or compatible\
  \ async HTTP client) used for the PyPI request.\n- **Return**: an `OutdateResult`\
  \ instance that can be inspected via its methods.\n\n## Dependencies\n- **Standard\
  \ library:** `asyncio`, `dataclasses`, `typing`.\n- **Third\u2011party:**  \n  -\
  \ `packaging` (`Requirement`, `Version`, `canonicalize_name`).  \n  - An asynchronous\
  \ HTTP client (e.g., `aiohttp`) for the `session` argument.\n- **Internal:** `pip_outdated.verbose.verbose`\
  \ \u2013 a helper that toggles verbose output.\n\n## Notable Implementation Details\n\
  - **Canonicalization:** Package names are normalized with `canonicalize_name` to\
  \ match PyPI naming rules.\n- **Version Filtering:** Pre\u2011release versions are\
  \ ignored to focus on stable releases.\n- **Error Handling:**  \n  - If `pip show`\
  \ fails (non\u2011zero exit code), `get_local_version` returns `None`.  \n  - Invalid\
  \ version strings from PyPI are silently skipped.\n- **Verbose Mode:** When `verbose()`\
  \ returns `True`, each check prints the package name and its specifier.\n\n## Potential\
  \ Extensibility Points\n- **Custom HTTP Clients:** The `session` argument can be\
  \ swapped for other async HTTP libraries exposing a compatible `.get()` method.\n\
  - **Additional Filters:** Extend `get_pypi_versions` to include pre\u2011releases\
  \ or apply custom version\u2011selection logic.\n- **Parallel Checks:** Consumers\
  \ can schedule multiple `check_outdated` calls concurrently using `asyncio.gather`\
  \ for batch processing.\n\n---\n\n*These notes are intended to assist authors in\
  \ creating user\u2011facing documentation (e.g., README sections, API reference,\
  \ or usage guides) for the `pip_outdated` project.*"
