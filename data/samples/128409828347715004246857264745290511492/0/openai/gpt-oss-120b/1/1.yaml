- content: "## `pip_outdated/print_outdated.py` \u2013 Quick Summary for End\u2011\
    User Documentation  \n\n- **Purpose**:  \n  - Displays a concise, colour\u2011\
    coded table of Python packages that are outdated in the current environment. \
    \ \n\n- **Key Functions**:  \n  - `make_row(outdate: OutdateResult) \u2192 Optional[List[str]]`\
    \  \n    - Builds a printable row for a single package if it is outdated.  \n\
    \    - Uses **red** (bold) for unavailable or out\u2011of\u2011specifier versions,\
    \ **green** (bold) for updatable versions.  \n    - Returns `None` when the package\
    \ is up\u2011to\u2011date, so it is omitted from the final table.  \n  - `print_outdated(outdates:\
    \ List[Awaitable[OutdateResult]], quiet: bool)` (async)  \n    - Initializes colour\
    \ handling with `colorama`.  \n    - Collects rows from `make_row` and builds\
    \ a table with `terminaltables.AsciiTable`.  \n    - Handles three output scenarios:\
    \  \n      1. **No requirements found** \u2192 red message, exit.  \n      2.\
    \ **All packages up\u2011to\u2011date** \u2192 cyan bold message, exit.  \n  \
    \    3. **Some packages outdated** \u2192 prints a legend (red\u202F=\u202Funavailable/outdated,\
    \ green\u202F=\u202Fupdatable) then the ASCII table.  \n    - If `quiet` is `False`,\
    \ the script terminates the process with `sys.exit(1)` to signal that updates\
    \ are needed.  \n\n- **User\u2011Facing Behaviour**:  \n  - **Colour Legend**\
    \ (always shown when there are outdated packages):  \n    - *Red*: package version\
    \ can\u2019t be determined, is unavailable, or does not meet the required specifier.\
    \  \n    - *Green*: a newer version is available and can be installed.  \n  -\
    \ **Table Columns**:  \n    - **Name** \u2013 package identifier.  \n    - **Installed**\
    \ \u2013 currently installed version (red if missing or not wanted).  \n    -\
    \ **Wanted** \u2013 version specifier from requirements (red if unknown).  \n\
    \    - **Latest** \u2013 newest version on PyPI (red if unreachable).  \n\n- **Typical\
    \ Usage Flow**:  \n  1. The calling code gathers `OutdateResult` objects (e.g.,\
    \ via `check_outdated.py`).  \n  2. It passes the list of awaitables to `print_outdated`.\
    \  \n  3. The function prints the summary table and, unless `=True`, exits with\
    \ status\u202F1 to indicate that updates are pending.  \n\n- **Important Notes\
    \ for End\u2011Users**:  \n  - The script is **read\u2011only** \u2013 it never\
    \ modifies the environment; it only reports status.  \n  - To suppress the non\u2011\
    zero exit code (e.g., when using the script in CI pipelines), set the `quiet`\
    \ flag to `True`.  \n  - Colour output requires a terminal that supports ANSI\
    \ colours; otherwise, the output will fall back to plain text.  \n\n---  \n\n\
    *These notes capture everything an end\u2011user needs to understand the purpose,\
    \ output, and basic interaction model of `print_outdated.py` without diving into\
    \ implementation details of other modules.*"
