      \      <score>0.85</score>\n      <document>\n        <id>c3b7d65b-6553-4c82-9d9d-6ad494dd6238</id>\n\
      \        <content>\n# Project Notes: **pip-outdated** (from `setup.cfg`)\n##\
      \ Overview\n## Classification (PyPI classifiers)\n- Development Status :: 4\
      \ - Beta\n- Environment :: Console\n- Intended Audience :: Developers\n- Programming\
      \ Language :: Python :: 3.7\n- Topic :: Software Development :: Build Tools\n\
      \n        </content>\n        <metadata>\n          <document_type>chunk</document_type>\n\
      \          <chunk_source_document_type>note</chunk_source_document_type>\n \
      \         <chunk_variant>contextualized</chunk_variant>\n          <chunk_coordinates>\n\
      \            <list>\n              <item index=\"0\">0</item>\n            \
      \  <item index=\"1\">1</item>\n            </list>\n          </chunk_coordinates>\n\
      \          <chunked_note_id>851f3a4c-842f-454c-b912-4a72705fd9ab</chunked_note_id>\n\
      \          <chunked_note_subject_path>setup.cfg</chunked_note_subject_path>\n\
      \          <chunked_note_subject_type>file</chunked_note_subject_type>\n   \
      \       <chunk_include_previous_content>False</chunk_include_previous_content>\n\
      \        </metadata>\n      </document>\n    </item>\n    <item index=\"4\"\
      >\n      <score>0.75</score>\n      <document>\n        <id>e585e1ea-89bb-4d87-8e85-2503a2872657</id>\n\
      \        <content>\n## Project Overview\n## Entry Point\n## Core Functions\n\
      \n- **`parse_args()`** \u2013 Builds an `argparse.ArgumentParser` with the following\
      \ options:\n  - `-v, --verbose` (store_true): Enable verbose output.\n  - `-q,\
      \ --quiet` (store_true): Suppress the non\u2011zero exit code when some packages\
      \ are not up\u2011to\u2011date.\n  - `<file>` (positional, accepts zero or more\
      \ values, defaults to `[\"requirements.txt\", \"setup.cfg\"]`): Files or glob\
      \ patterns from which to read dependencies.\n- **`main()`** \u2013 Starts the\
      \ async workflow. It deliberately avoids `asyncio.run()` because of a known\
      \ `aiohttp` issue, instead retrieving the current event loop and running `_main()`\
      \ until completion.\n- **`_main()`** (async) \u2013 Orchestrates the program\
      \ flow:\n  1. Parses CLI arguments.\n  2. Sets the global verbosity flag via\
      \ `pip_outdated.verbose.set_verbose`.\n  3. Imports helper modules lazily:\n\
      \     - `find_require` \u2013 discovers dependency specifications from the provided\
      \ files.\n     - `check_outdated` \u2013 contacts PyPI (through an aiohttp session)\
      \ to determine the latest version for each requirement.\n     - `print_outdated`\
      \ \u2013 formats and displays the results.\n     - `session.get_session` \u2013\
      \ provides an aiohttp session context manager.\n  4. Generates a list of asynchronous\
      \ tasks (`check_outdated`) for each requirement.\n  5. Awaits `print_outdated`\
      \ to output the aggregated results, respecting the `--quiet` flag.\n\n     \
      \   </content>\n        <metadata>\n          <document_type>chunk</document_type>\n\
      \          <chunk_source_document_type>note</chunk_source_document_type>\n \
      \         <chunk_variant>contextualized</chunk_variant>\n          <chunk_coordinates>\n\
      \            <list>\n              <item index=\"0\">2</item>\n            </list>\n\
      \          </chunk_coordinates>\n          <chunked_note_id>f79580c9-fc61-4a25-869d-deb2aae72e94</chunked_note_id>\n\
      \          <chunked_note_subject_path>pip_outdated/__init__.py</chunked_note_subject_path>\n\
      \          <chunked_note_subject_type>file</chunked_note_subject_type>\n   \
      \       <chunk_include_previous_content>False</chunk_include_previous_content>\n\
      \        </metadata>\n      </document>\n    </item>\n    <item index=\"5\"\
      >\n      <score>0.72</score>\n      <document>\n        <id>e5a9d68d-cbc4-4e8f-8415-aee2683b47ad</id>\n\
      \        <content>\n## Project Configuration \u2013 `setup.py`\n### Immediate\
      \ actions the user should take\n- **Add required metadata** to the `setup()`\
      \ call, for example:\n  ```python\n  setup(\n      name=\"your-package-name\"\
      ,\n      version=\"0.1.0\",\n      description=\"A short description of the\
      \ project\",\n      author=\"Your Name\",\n      author_email=\"you@example.com\"\
      ,\n      url=\"https://github.com/your/repo\",\n      packages=find_packages(),\n\
      \      install_requires=[\n          # list runtime dependencies here, e.g.\
      \ \"requests>=2.0\"\n      ],\n      python_requires=\">=3.8\",\n  )\n  ```\n\
      - **Import helpers** as needed:\n  - `from setuptools import find_packages`\
      \ if using `find_packages()`.\n  - Any other setuptools extensions (e.g., `entry_points`)\
      \ for command\u2011line tools.\n\n        </content>\n        <metadata>\n \
      \         <document_type>chunk</document_type>\n          <chunk_source_document_type>note</chunk_source_document_type>\n\
      \          <chunk_variant>extracted</chunk_variant>\n          <chunk_coordinates>\n\
      \            <list>\n              <item index=\"0\">0</item>\n            \
      \  <item index=\"1\">2</item>\n            </list>\n          </chunk_coordinates>\n\
      \          <chunked_note_id>946d23cc-e65d-473b-b731-fde4620433e0</chunked_note_id>\n\
      \          <chunked_note_subject_path>setup.py</chunked_note_subject_path>\n\
      \          <chunked_note_subject_type>file</chunked_note_subject_type>\n   \
      \       <chunk_include_previous_content>False</chunk_include_previous_content>\n\
      \        </metadata>\n      </document>\n    </item>\n    <item index=\"6\"\
      >\n      <score>0.68</score>\n      <document>\n        <id>524d1fd5-26c7-4942-80f1-454738f6379a</id>\n\
      \        <content>Purpose comment</content>\n        <metadata>\n          <document_type>chunk</document_type>\n\
      \          <chunk_source_document_type>facts</chunk_source_document_type>\n\
      \          <chunk_variant>simple</chunk_variant>\n          <chunk_coordinates>\n\
      \            <list>\n              <item index=\"0\">1</item>\n            </list>\n\
      \          </chunk_coordinates>\n          <chunked_facts_id>126b57a4-c24e-4ff7-ab30-8371c3cbc96c</chunked_facts_id>\n\
      \          <chunked_facts_subject_path>pip_outdated/verbose.py</chunked_facts_subject_path>\n\
      \          <chunked_facts_subject_type>file</chunked_facts_subject_type>\n \
      \       </metadata>\n      </document>\n    </item>\n  </list>\n</documents>\n\
      <additional_instructions></additional_instructions>"
