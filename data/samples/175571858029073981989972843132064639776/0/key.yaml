  - content: "<purpose>Identify the name of the current project as defined in the\
      \ project's documentation.</purpose>\n<documents>\n  <list>\n    <item index=\"\
      0\">\n      <score>0.9</score>\n      <document>\n        <id>3f7cba76-893c-4f4f-bcf4-0784deaad07f</id>\n\
      \        <content>\n## 5. Project Metadata (from `setup.cfg`)\n```ini\n[metadata]\n\
      name = pip-outdated\nversion = 0.8.0\nauthor = eight\nauthor_email = eight04@gmail.com\n\
      license = MIT\nurl = https://github.com/eight04/pip-outdated\nlong_description\
      \ = file: README.rst\nclassifiers =\n    Development Status :: 4 - Beta\n  \
      \  Environment :: Console\n    Intended Audience :: Developers\n    Programming\
      \ Language :: Python :: 3.7\n    Topic :: Software Development :: Build Tools\n\
      keywords = pip, check, outdate, npm\n\n[options]\ninstall_requires =\n    aiohttp~=3.12\n\
      \    colorama~=0.4.6\n    packaging~=25.0\n    termcolor~=3.1\n    terminaltables~=3.1\n\
      zip_safe = True\n\n[options.entry_points]\nconsole_scripts =\n    pip-outdated\
      \ = pip_outdated:main\n\n[vpip]\ncommand_fallback = python cute.py\n```\n- **Console\
      \ script** `pip-outdated` maps directly to `pip_outdated:main`.\n- Optional\
      \ `[vpip]` section provides a fallback command for the external *vpip* tool.\n\
      \n---\n\n        </content>\n        <metadata>\n          <document_type>chunk</document_type>\n\
      \          <chunk_source_document_type>note</chunk_source_document_type>\n \
      \         <chunk_variant>simple</chunk_variant>\n          <chunk_coordinates>\n\
      \            <list>\n              <item index=\"0\">0</item>\n            \
      \  <item index=\"1\">4</item>\n            </list>\n          </chunk_coordinates>\n\
      \          <chunked_note_id>3a4abb8e-2ce7-4a21-ae65-62dac7fe9c6c</chunked_note_id>\n\
      \          <chunked_note_subject_path></chunked_note_subject_path>\n       \
      \   <chunked_note_subject_type>directory</chunked_note_subject_type>\n     \
      \   </metadata>\n      </document>\n    </item>\n    <item index=\"1\">\n  \
      \    <score>0.86</score>\n      <document>\n        <id>d3dbc167-d046-40d0-affe-cb67e25b96df</id>\n\
      \        <content>The project name is \"pip-outdated\" as specified by the \"\
      name\" field in the [metadata] section.</content>\n        <metadata>\n    \
      \      <document_type>chunk</document_type>\n          <chunk_source_document_type>facts</chunk_source_document_type>\n\
      \          <chunk_variant>simple</chunk_variant>\n          <chunk_coordinates>\n\
      \            <list>\n              <item index=\"0\">0</item>\n            </list>\n\
      \          </chunk_coordinates>\n          <chunked_facts_id>86d2e4ef-e2a1-47e0-ace8-58507aa9377c</chunked_facts_id>\n\
      \          <chunked_facts_subject_path>setup.cfg</chunked_facts_subject_path>\n\
      \          <chunked_facts_subject_type>file</chunked_facts_subject_type>\n \
      \       </metadata>\n      </document>\n    </item>\n    <item index=\"2\">\n\
      \      <score>0.85</score>\n      <document>\n        <id>063b5ea0-3fc0-4610-bde5-243370a20ad8</id>\n\
