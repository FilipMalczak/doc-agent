"## Project Overview  \n- **Name:** `pip-outdated`  \n- **Purpose:** Detect outdated,\
  \ missing, or incompatible dependencies defined in `requirements.txt` or `setup.cfg`.\
  \  \n- **Key Feature:** Presents results in a colored table; compares installed\
  \ versions against version specifiers.  \n- **Alternative:** For a simple list of\
  \ updatable packages, use `pip list --outdated`.\n"
