"## Directory\u2011Level Notes \u2013 `tests/`\n### Overall Role of the `tests/` Package\n\
  ### Summary of Individual Test Files\n\n| File | Primary Focus | Key Behaviours\
  \ Verified | Documentation Take\u2011aways |\n|------|---------------|------------------------|--------------------------|\n\
  | `tests/__init__.py` | Package initializer (empty) |\u202FOnly establishes importability\
  \ of the `tests` package. | Mention that the file does **not** affect execution;\
  \ it simply enables `import tests.*`. |\n| `tests/test_parse_cfg.py` | Unit test\
  \ for `pip_outdated.find_require.parse_cfg` | - Creates a temporary `setup.cfg`\
  \ with sections `setup_requires`, `install_requires`, and `options.extras_require`.<br>-\
  \ Calls `parse_cfg` and extracts requirement **names** (ignoring version specifiers).<br>-\
  \ Asserts the returned order matches the file content. | \u2022 Users can expect\
  \ `parse_cfg` to accept a path to a `setup.cfg` and return requirement objects for\
