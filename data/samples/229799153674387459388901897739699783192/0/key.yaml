"## Project Overview  \n- **File:** `pip_outdated/check_outdated.py`  \n- **Purpose:**\
  \ Checks whether Python packages installed in the current environment are outdated\
  \ compared to the versions available on PyPI, and classifies the status of each\
  \ requirement.  \n- **Target audience:** Users and developers who want to know which\
  \ dependencies need updating, possibly to generate user\u2011facing reports or integrate\
  \ into CI pipelines.  \n\n---\n\n## Core Data Structure  \n\n## Main Asynchronous\
  \ Functions  \n\n| Function | Signature | Key responsibilities |\n|----------|-----------|----------------------|\n\
  | `get_local_version` | `async def get_local_version(name: str) -> Optional[Version]`\
  \ | Executes ``pip show <name>`` via a subprocess, parses the ``Version:`` line,\
  \ and returns a ``Version`` object; returns ``None`` if the package is not installed\
  \ or the command fails. |\n| `get_pypi_versions` | `async def get_pypi_versions(name:\
  \ str, session) -> List[Version]` | Performs an HTTP GET request to ``https://pypi.org/pypi/<name>/json``\
  \ using the provided ``aiohttp`` session, extracts all release keys, filters out\
  \ invalid or pre\u2011release versions, sorts them, and returns the list. |\n| `check_outdated`\
  \ | `async def check_outdated(require, session) -> OutdateResult` | Orchestrates\
  \ the check: canonicalizes the package name, fetches the local version, fetches\
  \ PyPI versions, and constructs an ``OutdateResult``. Prints a verbose message when\
  \ the global ``verbose()`` flag is set. |\n\n**Notes:**  \n- All network and subprocess\
  \ interactions are asynchronous, enabling concurrent checks for many packages. \
  \ \n- The module expects an external ``session`` object (typically an ``aiohttp.ClientSession``)\
  \ to be created and closed by the caller.  \n\n---\n\n## Workflow Summary  \n\n\
  1. **Parse requirement** (from elsewhere in the project) into a ``Requirement``\
  \ object.  \n2. **Canonicalize package name** using ``packaging.utils.canonicalize_name`.\
  \  \n3. **Fetch installed version** with ``get_local_version`.  \n4. **Fetch all\
  \ stable PyPI versions** with ``get_pypi_versions`.  \n5. **Instantiate ``OutdateResult``**\
  \ \u2013 automatically computes the *wanted* and *latest* versions.  \n6. **Interpret\
  \ result** using helper methods (`install_not_found`, `install_not_wanted`, `pypi_not_found`,\
  \ `outdated`).  \n\n---\n\n## Usage Guidance for Users  \n\n- **Calling code** should\
  \ create an ``aiohttp`` session, then schedule ``check_outdated`` for each requirement,\
  \ e.g.:\n\n  ```python\n  import aiohttp\n  import asyncio\n  from packaging.requirements\
  \ import Requirement\n  from pip_outdated.check_outdated import check_outdated\n\
  \n  async def run_checks(requirements):\n      async with aiohttp.ClientSession()\
  \ as session:\n          tasks = [check_outdated(Requirement(r), session) for r\
  \ in requirements]\n          results = await asyncio.gather(*tasks)\n         \
  \ return results\n  ```\n\n- **Interpreting `OutdateResult`**:  \n  - If `install_not_found()`\
  \ \u2192 the package is missing locally.  \n  - If `install_not_wanted()` \u2192\
  \ the installed version violates the specifier (e.g., too old).  \n  - If `pypi_not_found()`\
  \ \u2192 the package could not be located on PyPI.  \n  - If `outdated()` \u2192\
  \ you may want to upgrade to `wanted` (fulfills the requirement) or to `latest`\
  \ (newest available).  \n\n---\n\n## Design Decisions & Rationale  \n\n- **Asynchronous\
  \ implementation** \u2013 avoids blocking on network I/O and subprocess calls, essential\
  \ when checking many dependencies.  \n- **Separation of concerns** \u2013 fetching\
  \ local version, fetching remote versions, and result aggregation are distinct functions,\
  \ making them individually testable.  \n- **Use of `packaging` library** \u2013\
  \ guarantees correct parsing of versions, specifiers, and canonical name handling\
  \ per PEP\u202F508 and PEP\u202F440.  \n- **Filtering of pre\u2011release versions**\
  \ \u2013 ensures that the \u201Clatest\u201D version presented is a stable release,\
  \ matching typical user expectations.  \n\n---\n"
