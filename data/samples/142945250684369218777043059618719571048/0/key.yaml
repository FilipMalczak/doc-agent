      \ that can make use of features of this project, but is not working on this\
      \ project directly</details>\n    </relationship_to_project>\n    <summary>...</summary>\n\
      \  </perspective>\n  <low_level>\n\nYou will be given full content of the input\
      \ documents, as well as their metadata and current score.\nInput score will\
      \ always be in [0.0, 1.0] range.\nYou will use that knowledge to produce integer\
      \ scores in 1-10 range.\nWhen coming up with updated scores, you will treat\
      \ the content as the most important. All the metadata, including previous score,\
      \ should have much lower priority, but otherwise uniform amongst available details.\n\
      You will refer to the input documents by their item index.\nYou will provide\
      \ updated score for each item. \nYou will emit an appropriate rescoring item\
      \ for each input item. \nThere will be exactly one rescoring item for each input\
      \ item. No input item will get duplicated or omitted.  \nYou will explain your\
      \ choices, one at the time, referring to the input data and your inherent knowledge.\n\
      \n  </low_level>\n  <detailed>\n\nWhen choosing the scores for the documents\
      \ you will use 1-10 scale (without 0, all integers). \nThis output scale is\
      \ different from the input one on purpose. \nDO NOT PRODUCE [0.0, 1.0] FLOAT\
      \ SCORES.\nONLY produce integer scores in the 1-10 range.\n\nYou can use the\
      \ following to get the gist of what does each value mean.\n\nFor example, if\
      \ the purpose of the search is solving quantum physics problem, then the scores\
      \ might be:\n- a daily newspaper -> 1\n- high-school physics book -> 3\n- university-level\
      \ quantum physics book -> 7\n- scientific paper explicitly tackling the problem\
      \ -> 10\n\n0 is NOT a valid score, which is why the daily newspaper is given\
      \ score 1. \nDO NOT ever produce score of 0 or higher than 10. ONLY produce\
      \ integer scores.\n\nIf not sure whether to choose a number or one bigger, pick\
      \ the bigger value and explain your dillema.\n\n  </detailed>\n</task>"
