    name: final_result
    outer_typed_dict_key: null
    parameters_json_schema:
      properties:
        explanation:
          type: string
        name:
          type: string
        value:
          type: string
      required:
      - name
      - value
      - explanation
      title: EvaluateVariableOutput
      type: object
    sequential: false
    strict: null
  prompted_output_template: null
