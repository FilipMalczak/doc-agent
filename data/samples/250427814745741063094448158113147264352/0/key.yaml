"## \U0001F4C4 Overview  \n**File:** `pip_outdated/check_outdated.py`  \n**Purpose:**\
  \  \n- Provides the core logic for detecting outdated Python packages in a project's\
  \ environment.  \n- Retrieves the installed version of a package, fetches all released\
  \ versions from PyPI, and determines whether the installed version is missing, not\
  \ wanted by the version specifier, or simply outdated.\n\n## \U0001F3D7\uFE0F Main\
  \ components  \n\n### `OutdateResult` (dataclass)  \n| Attribute | Type | Description\
  \ |\n|---|---|---|\n| `requirement` | `Requirement` | The original requirement (name\u202F\
  +\u202Fspecifier) from the user's `requirements.txt` or similar. |\n| `version`\
  \ | `Optional[Version]` | Currently installed version (or `None` if the package\
  \ is not installed). |\n| `all_versions` | `List[Version]` | All non\u2011prerelease\
  \ versions found on PyPI, sorted ascending. |\n| `wanted` *(computed)* | `Optional[Version]`\
  \ | The newest version that satisfies the requirement's specifier, or `None` if\
  \ none match. |\n| `latest` *(computed)* | `Optional[Version]` | The newest available\
  \ version on PyPI (or `None` if none were fetched). |\n\n**Key methods**  \n- `install_not_found()`:\
  \ *True* if the package is not installed.  \n- `install_not_wanted()`: *True* if\
  \ the installed version does not satisfy the requirement specifier.  \n- `pypi_not_found()`:\
  \ *True* if no versions could be fetched from PyPI.  \n- `outdated()`: *True* when\
  \ the installed version differs from the wanted version **or** from the latest version.\
  \  \n\n### Async helper functions  \n\n| Function | Signature | What it does |\n\
  |---|---|---|\n| `get_local_version(name: str) -> Optional[Version]` | Async | Runs\
  \ `pip show <name>` and parses the `Version:` line. Returns `None` on error or if\
  \ the package isn\u2019t installed. |\n| `get_pypi_versions(name: str, session)\
  \ -> List[Version]` | Async | Queries `https://pypi.org/pypi/<name>/json`, extracts\
  \ release keys, filters out invalid or prerelease versions, sorts them, and returns\
  \ the list. |\n| `check_outdated(require, session) -> OutdateResult` | Async | Orchestrates\
  \ the two helpers, optionally prints a verbose message, and returns a populated\
  \ `OutdateResult`. |\n\n## \U0001F469\u200D\U0001F4BB How the module fits into the\
  \ **pip\u2011outdated** tool  \n\n1. **Input** \u2013 A `Requirement` object (typically\
  \ parsed from a requirements file).  \n2. **Processing** \u2013  \n   - Normalizes\
  \ the package name with `canonicalize_name`.  \n   - Retrieves the local (installed)\
  \ version.  \n   - Retrieves all stable versions from PyPI.  \n   - Constructs an\
  \ `OutdateResult` that encapsulates the status.  \n3. **Output** \u2013 An `OutdateResult`\
  \ instance that downstream code can inspect to decide how to report or act on outdated\
  \ packages.\n\n## \U0001F4CB Notes for maintainers (ensuring a smooth end\u2011\
  user experience)  \n\n- **Verbosity control** \u2013 The global `verbose()` function\
  \ toggles a single debug line. Ensure the flag is exposed or documented for users\
  \ who want more insight.  \n- **Error handling** \u2013  \n  - Network failures\
  \ in `get_pypi_versions` raise an exception via `raise_for_status()`. Consider catching\
  \ these at a higher level to present a user\u2011friendly message (e.g., \u201C\
  Could not reach PyPI, check your internet connection\u201D).  \n  - The subprocess\
  \ call in `get_local_version` silently returns `None` on non\u2011zero exit codes,\
  \ which already signals \u201Cpackage not installed.\u201D  \n- **Performance**\
  \ \u2013 The functions are fully asynchronous, allowing the caller to query many\
  \ packages concurrently (e.g., via `asyncio.gather`). Documentation should stress\
  \ the need for an `aiohttp.ClientSession` (or compatible) when using `check_outdated`.\
  \  \n- **Version filtering** \u2013 Prerelease versions are excluded. If a user\
  \ explicitly wants to consider prereleases, the logic would need to be adjusted;\
  \ note this limitation in the user guide.  \n- **Cross\u2011platform reliability**\
  \ \u2013 `pip show` works wherever the `pip` executable is in `$PATH`. For environments\
  \ with multiple Python installations, ensure the correct `pip` is invoked (e.g.,\
  \ by using `python -m pip`).  \n\n## \U0001F4DA Suggested user\u2011facing documentation\
  \ excerpts  \n\n- **Purpose statement**  \n  > \u201C`pip\u2011outdated` checks\
  \ each dependency in your project, compares the installed version with what\u2019\
  s available on PyPI, and tells you if you\u2019re using an older or unsupported\
  \ version.\u201D  \n\n- **How it works (high\u2011level)**  \n  1. Reads your requirement\
  \ specifications.  \n  2. Looks up the installed version via `pip show`.  \n  3.\
  \ Fetches all stable releases from PyPI.  \n  4. Determines the newest version that\
  \ satisfies your specifier (`wanted`) and the absolute newest release (`latest`).\
  \  \n\n- **Interpreting results**  \n  - **Not installed** \u2013 `install_not_found()`\
  \ \u2192 \u201CPackage not found in your environment; you may need to install it.\u201D\
  \  \n  - **Installed but not wanted** \u2013 `install_not_wanted()` \u2192 \u201C\
  Your current version does not satisfy the declared version range.\u201D  \n  - **Out\u2011\
  of\u2011date** \u2013 `outdated()` \u2192 \u201CA newer version exists; consider\
  \ upgrading.\u201D  \n\n- **Running the check** (example snippet)  \n\n  ```bash\n\
  \  # Install the helper library (if not already present)\n  pip install pip-outdated\n\
  \n  # Run the CLI (internally uses check_outdated)\n  pip-outdated\n  ```\n\n  *Behind\
  \ the scenes* the CLI creates an `aiohttp` session and calls `check_outdated` for\
  \ each requirement.  \n\n---  \n\n*These notes capture the functional essence of\
  \ `check_outdated.py` from the maintainer\u2019s perspective, providing the groundwork\
  \ for clear end\u2011user documentation.*"
