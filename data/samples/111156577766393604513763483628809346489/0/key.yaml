"## Project Component: `pip_outdated/print_outdated.py`\n\n### Overview\n- This module\
  \ is responsible for **displaying the results** of a pip\u2011outdated check in\
  \ a user\u2011friendly, colored table.  \n- It is part of the **`pip_outdated`**\
  \ package and works with the `OutdateResult` data model defined in `check_outdated.py`.\n\
  \n### Key Functions\n\n#### `make_row(outdate: OutdateResult) -> Optional[List[str]]`\n\
  - **Purpose**: Convert a single `OutdateResult` into a table row (list of strings)\
  \ with appropriate color highlighting.\n- **Logic**:\n  - Returns `None` if the\
  \ package is **not outdated**.\n  - **Current version** (`colored_current`):\n \
  \   - Red & bold if the package is not installed or the installation is explicitly\
  \ unwanted.\n    - Otherwise, shown without color.\n  - **Wanted version** (`colored_wanted`):\n\
  \    - Red & bold `\"None\"` if the package cannot be found on PyPI or no wanted\
  \ version is defined.\n    - Green & bold if a newer wanted version exists and the\
  \ package is installed.\n    - Otherwise, shown as plain text.\n  - **Latest version**\
  \ (`colored_latest`):\n    - Red & bold `\"None\"` if the package cannot be found\
  \ on PyPI.\n    - Green & bold if a newer latest version exists and the package\
  \ is installed.\n    - Otherwise, shown as plain text.\n- **Returned Row**:  \n\
  \  ```\n  [name, colored_current, colored_wanted, colored_latest]\n  ```\n\n####\
  \ `print_outdated(outdates: List[Awaitable[OutdateResult]], quiet: bool)`\n- **Purpose**:\
  \ Assemble all rows, render a colored ASCII table, and optionally exit with a non\u2011\
  zero status.\n- **Workflow**:\n  1. Initializes `colorama` for cross\u2011platform\
  \ ANSI support.\n  2. Builds the table header `[\"Name\", \"Installed\", \"Wanted\"\
  , \"Latest\"]`.\n  3. Awaits each `OutdateResult`, generates a row via `make_row`,\
  \ and appends it to the table data.\n  4. Handles three special cases:\n     - **No\
  \ requirements**: prints a red message `\"No requirements found.\"`.\n     - **Everything\
  \ up\u2011to\u2011date**: prints a cyan bold message `\"Everything is up-to-date!\"\
  `.\n  5. Prints legend:\n     - Red = unavailable / outdated / out of version specifier.\n\
  \     - Green = updatable.\n  6. Renders the table using `terminaltables.AsciiTable`.\n\
  \  7. If `quiet` is **False**, terminates the program with `sys.exit(1)` (indicating\
  \ that outdated packages exist).\n"
