"## Project\u2011Level Documentation \u2013 **`pip-outdated`**\n\n> **Version:** `0.8.0`\
  \ (latest release)  \n> **License:** MIT  \n> **Repository:** <https://github.com/eight04/pip-outdated>\
  \  \n\n---\n\n# Scan the default files (requirements.txt & setup.cfg)\npip-outdated\n\
  \n# Scan a custom file or glob pattern\npip-outdated my_deps/*.txt\n\n# Enable verbose\
  \ debugging output\npip-outdated -v\n\n# Do not exit with code\u202F1 when outdated\
  \ packages are found (useful for CI)\npip-outdated -q\n```\n\n#### Command\u2011\
  Line Synopsis\n```\npip-outdated [-h] [-v] [-q] [<file> [<file> ...]]\n```\n\n|\
  \ Option | Shortcut | Description |\n|--------|----------|-------------|\n| `--help`\
  \ | `-h` | Show help message and exit |\n| `--verbose` | `-v` | Print detailed status\
  \ lines (e.g., each package being checked) |\n| `--quiet` | `-q` | Suppress the\
  \ non\u2011zero exit code when outdated packages are found |\n| `<file>` | \u2013\
  \ | Positional arguments; zero or more file paths or glob patterns. Defaults to\
  \ `[\"requirements.txt\", \"setup.cfg\"]` |\n\n---\n\n### 4. Output Overview\n\n\
  - **Table Columns**  \n  - **Name** \u2013 Package name.  \n  - **Installed** \u2013\
  \ Version currently installed locally (red if not installed).  \n  - **Wanted**\
  \ \u2013 Newest version that satisfies the requirement specifier (green if newer\
  \ than installed).  \n  - **Latest** \u2013 Absolute newest stable version on PyPI\
  \ (green if newer than installed).\n\n- **Color Legend**  \n  - **Red** \u2013 Information\
  \ unavailable or version does not satisfy the specifier.  \n  - **Green** \u2013\
  \ A newer version exists and can be upgraded.\n\n- **Exit Codes**  \n  - `0` \u2013\
  \ All dependencies are up\u2011to\u2011date **or** `--quiet` was used.  \n  - `1`\
  \ \u2013 At least one dependency is outdated **and** `--quiet` was **not** used\
  \ (ideal for CI pipelines).\n\n---\n"
