"# Directory\u2011Level Documentation \u2013 `pip_outdated/`\n\n# This installs the\
  \ console script `pip-outdated`\n```\n\n# Scan default files (requirements.txt &\
  \ setup.cfg)\npip-outdated\n\n# Scan a custom file or glob pattern\npip-outdated\
  \ my_deps/*.txt\n\n# Enable verbose debugging output\npip-outdated -v\n\n# Do not\
  \ fail with a non\u2011zero exit code when updates exist\npip-outdated -q\n```\n\
  \n### 4.3 Command\u2011Line Reference\n| Option | Shortcut | Effect |\n|--------|----------|--------|\n\
  | `--verbose` | `-v` | Prints detailed status lines (e.g., each package being checked).\
  \ |\n| `--quiet`   | `-q` | Suppresses the non\u2011zero exit code when outdated\
  \ packages are found. |\n| `file`      | \u2013   | Zero or more positional arguments\
  \ representing file paths or glob patterns. Defaults to `[\"requirements.txt\",\
  \ \"setup.cfg\"]`. |\n"
