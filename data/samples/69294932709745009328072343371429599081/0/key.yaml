"# Project\u2011Level Documentation \u2013 **pip\u2011outdated**\n\n---\n\n## 1. Quick\
  \ Project Summary\n- **Package name**: `pip-outdated` (current version **0.8.0**).\
  \  \n- **Purpose**: A command\u2011line utility that scans a project's dependency\
  \ files (`requirements.txt`, `setup.cfg`, or any glob\u2011matched file) and reports\
  \ which packages are outdated compared with the latest versions on PyPI.\n- **Primary\
  \ entry point**: console script `pip-outdated` (defined in `pip_outdated/__init__.py`).\
  \  \n- **Supported Python**: 3.7\u202F+ (minimum declared in the classifiers).\n\
  - **License**: MIT.\n- **Repository / Homepage**: <https://github.com/eight04/pip-outdated>.\n\
  \n---\n\n## 2. Installation\n```bash\npip install pip-outdated\n```\nThe package\
  \ pulls in the runtime dependencies listed in **setup.cfg**:\n- `aiohttp~=3.12`\n\
  - `colorama~=0.4.6`\n- `packaging~=25.0`\n- `termcolor~=3.1`\n- `terminaltables~=3.1`\n\
  \n---\n\n## 3. Command\u2011Line Interface (CLI)\n```bash\npip-outdated [options]\
  \ [<file> ...]\n```\n## 4. Core Packages and Modules\n| Module | Role | Key Functions\
  \ / Classes |\n|--------|------|--------------------------|\n| `__init__.py` | CLI\
  \ entry point (`main`, `_main`) and argument parsing (`parse_args`). | `main()`,\
  \ `_main()`, `parse_args()` |\n| `__main__.py` | Enables `python -m pip_outdated`.\
  \ | imports and calls `main()` |\n| `find_require.py` | Parses requirement specifications\
  \ from plain files and `setup.cfg`. | `find_require()`, `parse_require*()`, `parse_cfg()`\
  \ |\n| `check_outdated.py` | Asynchronously fetches local and PyPI versions, determines\
  \ status. | `OutdateResult`, `check_outdated()`, `get_local_version()`, `get_pypi_versions()`\
  \ |\n| `print_outdated.py` | Renders the colour\u2011coded result table. | `make_row()`,\
  \ `print_outdated()` |\n| `session.py` | Provides a pre\u2011configured `aiohttp.ClientSession`.\
  \ | `get_session()` |\n| `verbose.py` | Global verbose flag handling. | `set_verbose()`,\
  \ `verbose()` |\n\n---\n"
