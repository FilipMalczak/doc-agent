- content: "**File:** `pip_outdated/print_outdated.py`  \n**Language:** Python  \n\
    \n---  \n\n## Overview  \nThis module renders a table of outdated Python packages.\
    \ It receives a list of asynchronous `OutdateResult` objects, formats each entry\
    \ with colour\u2011coded status indicators, and prints the result to the console.\
    \ If any packages are outdated, the script exits with a non\u2011zero status (unless\
    \ `quiet` is `True`).  \n\n---  \n\n## Key Imports  \n\n- `sys` \u2013 for `sys.exit`.\
    \  \n- `typing` \u2013 `Awaitable`, `List`, `Optional`.  \n- `colorama` \u2013\
    \ initializes colour support on Windows terminals.  \n- `termcolor.colored` \u2013\
    \ wraps strings with ANSI colour codes.  \n- `terminaltables.AsciiTable` (aliased\
    \ as `Table`) \u2013 builds an ASCII\u2011styled table.  \n- `OutdateResult` \u2013\
    \ custom data class representing a single package\u2019s version state (imported\
    \ from `.check_outdated`).  \n\n---  \n\n## Functions  \n\n### `make_row(outdate:\
    \ OutdateResult) -> Optional[List[str]]`  \n\n1. **Purpose** \u2013 Convert a\
    \ single `OutdateResult` into a list of string cells for the output table, applying\
    \ colour based on the package\u2019s status.  \n2. **Logic**  \n   - Returns **`None`**\
    \ if the package is not outdated (`outdate.outdated()` is `False`).  \n   - **`colored_current()`**\
    \ \u2013  \n     - Red\u202F+\u202Fbold if the package is not installed or the\
    \ install requirement is omitted.  \n     - Otherwise returns the plain installed\
    \ version.  \n   - **`colored_wanted()`** \u2013  \n     - Red\u202F+\u202Fbold\
    \ \u201CNone\u201D if the package cannot be found on PyPI or no \u201Cwanted\u201D\
    \ version is defined.  \n     - Green\u202F+\u202Fbold the wanted version if it\
    \ is higher than the installed version and the package is installed.  \n     -\
    \ Otherwise returns the wanted version as a plain string.  \n   - **`colored_latest()`**\
    \ \u2013  \n     - Red\u202F+\u202Fbold \u201CNone\u201D if the package cannot\
    \ be found on PyPI.  \n     - Green\u202F+\u202Fbold the latest version if it\
    \ is newer than the installed version and the package is installed.  \n     -\
    \ Otherwise returns the latest version as a plain string.  \n3. **Return value**\
    \ \u2013 A list `[name, current, wanted, latest]` ready for the table, or `None`\
    \ for a package that is up\u2011to\u2011date.  \n\n### `async def print_outdated(outdates:\
    \ List[Awaitable[OutdateResult]], quiet: bool)`  \n\n1. **Initialisation** \u2013\
    \ Calls `colorama.init()` to ensure colour handling works on all platforms.  \n\
    2. **Table header** \u2013 Starts `data` with column titles: `[\"Name\", \"Installed\"\
    , \"Wanted\", \"Latest\"]`.  \n3. **Iterate over results** \u2013  \n   - Enumerates\
    \ `outdates` (starting at\u202F1) while awaiting each `Awaitable`.  \n   - Calls\
    \ `make_row` on the resolved `OutdateResult`.  \n   - If a non\u2011`None` row\
    \ is produced, it is appended to `data`.  \n   - The loop variable `count` ends\
    \ up holding the total number of processed items.  \n4. **Empty\u2011input handling**\
    \ \u2013 If `count` is zero (no `OutdateResult`s were supplied), prints a red\
    \ \u201CNo requirements found.\u201D message and returns.  \n5. **All\u2011up\u2011\
    to\u2011date handling** \u2013 If only the header row exists (`len(data) == 1`),\
    \ prints a cyan, bold \u201CEverything is up-to-date!\u201D message and returns.\
    \  \n6. **Print status legend** \u2013 Shows colour meanings:  \n   - Red = unavailable/outdated/out\
    \ of version specifier.  \n   - Green = updatable.  \n7. **Render table** \u2013\
    \ Instantiates `Table(data)` and prints `table.table` (the ASCII representation).\
    \  \n8. **Exit behaviour** \u2013 If `quiet` is `False`, the script terminates\
    \ the process with `sys.exit(1)` to signal that outdated packages were found.\
    \  \n\n---  \n\n## Control Flow Summary  \n\n```text\ninit colour support\nprepare\
    \ header row\nfor each awaited OutdateResult:\n    \u2192 generate coloured row\
    \ (or skip if up\u2011to\u2011date)\n    \u2192 add to table data\nif no packages\
    \ supplied \u2192 print \u201CNo requirements found.\u201D\nelif only header present\
    \ \u2192 print \u201CEverything is up\u2011to\u2011date!\u201D\nelse:\n    \u2192\
    \ print colour legend\n    \u2192 print ASCII table\n    \u2192 exit with code\u202F\
    1 unless quiet\n```\n\n---  \n\n## Potential Enhancements (no invented data, purely\
    \ observational)  \n\n- **Type\u2011hint the return of `make_row`** more precisely\
    \ (`Optional[List[str]]` is already present).  \n- **Separate colour handling**\
    \ into a small utility function to reduce duplicate calls to `colored`.  \n- **Allow\
    \ custom exit codes** via an optional parameter, making the function reusable\
    \ in libraries.  \n- **Graceful handling of exceptions** while awaiting each `OutdateResult`\
    \ (e.g., `try/except` around `await outdate`).  \n- **Optionally return a structured\
    \ result** (e.g., a list of rows) instead of directly printing, enabling easier\
    \ testing.  \n\n---  \n\n## Dependencies (as used in this file)  \n\n| Dependency\
    \ | Purpose |\n|------------|----------|\n| `colorama` | Cross\u2011platform ANSI\
    \ colour support |\n| `termcolor` | Simple colour formatting (`colored`) |\n|\
    \ `terminaltables` | ASCII table rendering |\n| Local `OutdateResult` | Encapsulates\
    \ version comparison data |\n\n---  \n\n**End of notes.**"
