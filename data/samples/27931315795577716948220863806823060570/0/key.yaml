"**Notes for Maintainer (Project\u202F`pip_outdated`) \u2013 File `pip_outdated/find_require.py`**\n\
  \n- **Purpose**\n  - Implements utilities to locate and parse Python package requirements\
  \ from various sources:\n    - Plain requirement files (`requirements.txt`\u2011\
  style)\n    - `setup.cfg` files (options `setup_requires`, `install_requires`, and\
  \ `extras_require`)\n\n- **Key Functions**\n  - `iter_files(patterns)` \u2013 yields\
  \ `Path` objects for each glob pattern or direct file path.\n  - `file_to_lines(file)`\
  \ \u2013 reads a file, prints a debug line when `verbose()` is true, and yields\
  \ cleaned lines via `parse_lines`.\n  - `parse_lines(lines)` \u2013 removes `#`\
  \ comments, handles line\u2011continuation (`\\`), and strips trailing newlines.\n\
  \  - `parse_require(text)` \u2013 strips any trailing *option* (`--something`) and\
  \ returns a `packaging.requirements.Requirement` object, or `None` if the text isn\u2019\
  t a valid requirement.\n  - `parse_requirements(file)` \u2013 iterates over a file\u2019\
  s lines, yielding `Requirement` objects.\n  - `parse_requirements_text(text)` \u2013\
  \ same as above, but works on a raw string.\n  - `parse_cfg(file)` \u2013 reads\
  \ a `.cfg` file with `ConfigParser` and extracts requirement strings from:\n   \
  \ - `options.setup_requires`\n    - `options.install_requires`\n    - all keys under\
  \ `options.extras_require`\n  - `find_require(files)` \u2013 iterates over provided\
  \ file paths/patterns, selects the appropriate parser (`parse_cfg` for `.cfg`, otherwise\
  \ `parse_requirements`), and yields all discovered `Requirement` objects.\n\n- **Behaviour\
  \ Details**\n  - **Comment handling** \u2013 Anything after an unescaped `#` (preceded\
  \ by start of line or whitespace) is stripped.\n  - **Line continuation** \u2013\
  \ A line ending with `\\` (followed by newline) is concatenated with the next line\
  \ before further processing.\n  - **Option stripping** \u2013 In a requirement line,\
  \ the first occurrence of `\" -\"` or `\" --\"` removes everything from that point\
  \ onward (e.g., version specifiers with options are kept, but command\u2011line\
  \ options are discarded).\n  - **Error handling** \u2013 Invalid requirement strings\
  \ are silently ignored (function returns `None`).\n\n- **Dependencies**\n  - `packaging.requirements.Requirement`\
  \ \u2013 used to validate and represent requirements.\n  - `configparser.ConfigParser`\
  \ \u2013 for reading `.cfg` files.\n  - `verbose()` \u2013 external helper used\
  \ for optional debug output.\n\n- **Usage Example (high\u2011level)**\n  ```python\n\
  \  from pip_outdated.find_require import find_require\n\n  # Find all requirements\
  \ defined in the given patterns (e.g., [\"requirements.txt\", \"setup.cfg\"])\n\
  \  for req in find_require([\"requirements.txt\", \"setup.cfg\"]):\n      print(req)\
  \          # \u2192 Requirement object (e.g., \"requests>=2.0\")\n  ```\n\n- **Considerations\
  \ for End\u2011User Documentation**\n  - Explain that the tool accepts both plain\
  \ requirement files and `setup.cfg` files.\n  - Mention that comments (`# \u2026\
  `) and line continuations (`\\`) are automatically handled.\n  - Clarify that any\
  \ requirement line containing unsupported syntax or options will be ignored without\
  \ raising an error.\n  - Highlight the need for the optional `pip`\u202F`verbose`\
  \ flag (via `verbose()`) to see parsing progress."
