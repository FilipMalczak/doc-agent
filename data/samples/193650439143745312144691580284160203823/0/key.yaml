"## Project Overview  \n\n- **Name:** `pip-outdated`  \n- **Purpose:** Detect outdated,\
  \ missing, or incompatible dependencies declared in `requirements.txt` or `setup.cfg`\
  \ files and present the results in a colored table.  \n- **Typical Use\u2011Case:**\
  \  \n  - Quickly audit a project's dependency list.  \n  - Spot packages that need\
  \ updating without manually parsing `pip list --outdated`.  \n\n## Key Features\
  \  \n\n- Parses version specifiers from both **requirements files** (`requirements.txt`)\
  \ and **setup configuration** (`setup.cfg`).  \n- Shows a **colored table** indicating\
  \ the status of each dependency (up\u2011to\u2011date, outdated, missing, incompatible).\
  \  \n- Supports **glob patterns** to check multiple files at once.  \n- Provides\
  \ **quiet mode** (`-q/--quiet`) to suppress a non\u2011zero exit code when some\
  \ packages are outdated.  \n- Verbose output (`-v/--verbose`) for detailed processing\
  \ information.  \n\n## Installation  \n\n```bash\npip install pip-outdated\n```\
  \  \n\n> The package is available on PyPI: <https://pypi.org/project/pip-outdated/>\n\
  \n## Command\u2011Line Interface  \n\n```\nusage: pip-outdated [-h] [-v] [-q] [<file>\
  \ [<file> ...]]\n\nFind outdated dependencies in your requirements.txt or setup.cfg\
  \ file.\n```\n\n## Planned Enhancements (TODO)  \n\n- Add commands/options to **auto\u2011\
  update packages**.  \n- Add commands/options to **modify the source `requirements.txt`\
  \ / `setup.cfg`** with updated version specifiers.  \n- Add a **global list** mode\
  \ (e.g., `-g` / `--global`) to list **all installed packages**, not only those declared\
  \ in the files.\n"
