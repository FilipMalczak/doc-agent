"**Project Overview**  \n- *pip-outdated* is a CLI tool that scans `requirements.txt`\
  \ or `setup.cfg` files and reports packages that are missing, outdated, or have\
  \ incompatible version specifiers.  \n- It presents results in a colored table,\
  \ making it easier for end\u2011users to see which dependencies need attention.\
  \  \n\n**Key Features for End\u2011Users**  \n- Detects outdated dependencies **against\
  \ the version specifiers** defined in the project\u2019s requirement files.  \n\
  - Works with both `requirements.txt` and `setup.cfg` (including `setup_requires`\
  \ and `extras_require`).  \n- Supports glob patterns so multiple requirement files\
  \ can be processed in a single command (e.g., `*\u2011requirements.txt`).  \n- Provides\
  \ a **quiet mode** (`-q/--quiet`) that prevents exit code\u202F1 when some packages\
  \ are not up\u2011to\u2011date.  \n- Verbose mode (`-v/--verbose`) prints additional\
  \ diagnostic information.  \n\n**Installation (Maintainer Checklist)**  \n```bash\n\
  pip install pip-outdated\n```  \n- The package is published on PyPI (`https://pypi.org/project/pip-outdated/`).\
  \  \n\n**Usage Synopsis**  \n```bash\npip-outdated [options] [<file> ...]\n``` \
  \ \n\n| Argument | Description |\n|----------|-------------|\n| `<file>` | One or\
  \ more requirement files to scan. Accepts glob patterns. Defaults to `requirements.txt`\
  \ and `setup.cfg` if omitted. |\n| `-h, --help` | Show help message and exit. |\n\
  | `-v, --verbose` | Enable verbose output. |\n| `-q, --quiet` | Do **not** return\
  \ exit code\u202F1 when not all dependencies are up\u2011to\u2011date. |\n\n**Typical\
  \ Commands**  \n- Scan all `*-requirements.txt` files: `pip-outdated *-requirements.txt`\
  \  \n- Scan every file inside a `requirements/` directory: `pip-outdated requirements/*.txt`\
  \  \n\n**Compatibility & Requirements**  \n- Requires **Python\u202F3.7 or newer**\
  \ (breaking change introduced in v0.4.0).  \n- No longer depends on `setuptools`;\
  \ uses `configparse` for reading `setup.cfg`.  \n- Internally fetches installed\
  \ package versions via the `pip` CLI to work correctly inside virtual environments.\
  \  \n\n**Project Health Indicators**  \n- Continuous Integration badge: ![Travis\
  \ CI](https://travis-ci.com/eight04/pip-outdated.svg?branch=master) \u2192 builds\
  \ on the `master` branch.  \n- Code coverage badge: ![Codecov](https://codecov.io/gh/eight04/pip-outdated/branch/master/graph/badge.svg)\
  \ \u2192 shows current test coverage.  \n\n**Planned Enhancements (TODOs)**  \n\
  - Add command\u2011line options to **auto\u2011update** packages.  \n- Add functionality\
  \ to **rewrite** `requirements.txt` / `setup.cfg` with updated versions.  \n- Introduce\
  \ a global listing mode (e.g., `-g, --global`) to show all updatable packages regardless\
  \ of requirement files.  \n\n**Changelog Highlights (maintainer\u2011relevant changes)**\
  \  \n\n- **0.8.0 (2025\u201108\u201109)** \u2013 Dropped `setuptools` dependency;\
  \ switched to `configparse`.  \n- **0.7.0 (2024\u201108\u201113)** \u2013 Ignored\
  \ `InvalidVersion` errors for more robust parsing.  \n- **0.6.0 (2023\u201101\u2011\
  01)** \u2013 Fetches package versions via `pip` CLI, improving virtual\u2011environment\
  \ awareness; removed `cchardet`.  \n- **0.5.0 (2022\u201101\u201112)** \u2013 Added\
  \ type hints  \n- **0.4.0 (2020\u201101\u201130)** \u2013 **Breaking:** raised minimum\
  \ Python version to 3.7; introduced parallel requests and `--quiet` option.  \n\
  - **0.3.0 (2019\u201110\u201113)** \u2013 **Breaking:** exit code\u202F1 on any\
  \ outdated dependency; fixed prerelease handling; added `setup_requires` and `extras_require`\
  \ support.  \n\n**Documentation Tips for End\u2011User Guides**  \n- Emphasize the\
  \ distinction between **listing all updatable packages** (`pip list --outdated`)\
  \ and **checking against version constraints** (the primary purpose of *pip-outdated*).\
  \  \n- Highlight the glob\u2011pattern capability for projects with multiple requirement\
  \ files (e.g., development vs. testing).  \n- Include the `--quiet` flag in \u201C\
  non\u2011blocking CI\u201D examples where a non\u2011zero exit code would otherwise\
  \ fail the pipeline.  \n- Reference the CI and coverage badges to assure users of\
  \ ongoing maintenance.  "
