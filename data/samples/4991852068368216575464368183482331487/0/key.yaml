"## Project Overview  \n- **Package name:** `pip-outdated`  \n- **Current version:**\
  \ `\"0.8.0\"`  \n- **Primary goal:** Scan a Python project's dependency files (`requirements.txt`,\
  \ `setup.cfg`, or any glob\u2011matched file) and report which packages have newer\
  \ releases available.  \n\n## How the CLI Works  \n\n| Entry point | Function |\
  \ Description |\n|-------------|----------|-------------|\n| `python -m pip_outdated`\
  \ (or the installed script `pip-outdated`) | `main()` | Starts the asynchronous\
  \ workflow that parses arguments, discovers requirements, checks each for newer\
  \ versions, and prints results. |\n\n### Argument parsing (`parse_args`)  \n\n|\
  \ Option | Flags | Type | Default | Effect |\n|--------|-------|------|---------|--------|\n\
  | **Verbose** | `-v`, `--verbose` | `store_true` | `False` | Enables detailed internal\
  \ logging (via `verbose.set_verbose`). |\n| **Quiet** | `-q`, `--quiet` | `store_true`\
  \ | `False` | Suppresses the non\u2011zero exit code when some dependencies are\
  \ outdated. |\n| **File list** | positional `<file>` | `nargs=\"*\"` | `[\"requirements.txt\"\
  , \"setup.cfg\"]` | Accepts one or more file paths or glob patterns to locate dependency\
  \ specifications. If omitted, the tool searches the two default files. |\n"
