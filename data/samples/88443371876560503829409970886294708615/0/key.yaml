"## Summary of `tests/test_parse_cfg.py`\n\n- **File purpose** \u2013 Unit test that\
  \ verifies the **`parse_cfg`** function (imported from `pip_outdated.find_require`)\
  \ correctly extracts package names from a `setup.cfg` file.  \n- **Testing framework**\
  \ \u2013 Uses **pytest** with the built\u2011in `tmp_path` fixture to create a temporary\
  \ configuration file.\n\n### Key Test Steps\n\n1. **Create a temporary `setup.cfg`**\
  \  \n   ```python\n   file = tmp_path / \"setup.cfg\"\n   file.write_text(\"\"\"\
  \n   [options]\n   setup_requires =\n       setuptools_scm >= 1.15.0\n       setuptools_scm_git_archive\
  \ >= 1.0\n   \n   install_requires =\n       ansible >= 2.5\n       ansible-lint\
  \ >= 4.0.2, < 5\n   \n   [options.extras_require]\n   docs =\n       alabaster\n\
  \       Sphinx\"\"\")\n   ```\n   - The file contains three sections:\n     - **`[options]`**\
  \ \u2013 `setup_requires` and `install_requires`\n     - **`[options.extras_require]`**\
  \ \u2013 a `docs` extra\n\n2. **Invoke `parse_cfg`**  \n   ```python\n   names =\
  \ [r.name for r in parse_cfg(str(file))]\n   ```\n   - `parse_cfg` receives the\
  \ path to the config file and returns an **iterable of requirement objects** (each\
  \ exposing a `.name` attribute).\n\n3. **Assert extracted names**  \n   ```python\n\
  \   assert names == [\n       \"setuptools_scm\",\n       \"setuptools_scm_git_archive\"\
  ,\n       \"ansible\",\n       \"ansible-lint\",\n       \"alabaster\",\n      \
  \ \"Sphinx\"\n   ]\n   ```\n   - Expected order matches the order of appearance\
  \ in the file.\n   - **Version constraints are stripped** (e.g., `>= 1.15.0` is\
  \ ignored).\n   - All sections (`setup_requires`, `install_requires`, and `extras_require`)\
  \ are flattened into a single list.\n\n### What the Test Reveals About `parse_cfg`\n\
  \n- **Supported Sections**\n  - `setup_requires`\n  - `install_requires`\n  - Any\
  \ key under `[options.extras_require]` (e.g., `docs`)\n\n- **Parsing Rules**\n \
  \ - Handles **multiline, indented requirement lists**.\n  - **Ignores version specifications**\
  \ and any extra markers, returning only the package name.\n  - Preserves the **original\
  \ order** of entries as they appear in the file.\n\n- **Return Type**\n  - An **iterable**\
  \ (likely a list or generator) of objects with at least a `.name` attribute.  \n\
  \  - The test does not depend on the full requirement object, only the name string.\n"
