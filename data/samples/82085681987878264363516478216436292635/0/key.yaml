"## \U0001F3D7\uFE0F Main components  \n\n### `OutdateResult` (dataclass)  \n| Attribute\
  \ | Type | Description |\n|---|---|---|\n| `requirement` | `Requirement` | The original\
  \ requirement (name\u202F+\u202Fspecifier) from the user's `requirements.txt` or\
  \ similar. |\n| `version` | `Optional[Version]` | Currently installed version (or\
  \ `None` if the package is not installed). |\n| `all_versions` | `List[Version]`\
  \ | All non\u2011prerelease versions found on PyPI, sorted ascending. |\n| `wanted`\
  \ *(computed)* | `Optional[Version]` | The newest version that satisfies the requirement's\
  \ specifier, or `None` if none match. |\n| `latest` *(computed)* | `Optional[Version]`\
  \ | The newest available version on PyPI (or `None` if none were fetched). |\n\n\
  **Key methods**  \n- `install_not_found()`: *True* if the package is not installed.\
  \  \n- `install_not_wanted()`: *True* if the installed version does not satisfy\
  \ the requirement specifier.  \n- `pypi_not_found()`: *True* if no versions could\
  \ be fetched from PyPI.  \n- `outdated()`: *True* when the installed version differs\
  \ from the wanted version **or** from the latest version.  \n\n### Async helper\
  \ functions  \n\n| Function | Signature | What it does |\n|---|---|---|\n| `get_local_version(name:\
  \ str) -> Optional[Version]` | Async | Runs `pip show <name>` and parses the `Version:`\
  \ line. Returns `None` on error or if the package isn\u2019t installed. |\n| `get_pypi_versions(name:\
  \ str, session) -> List[Version]` | Async | Queries `https://pypi.org/pypi/<name>/json`,\
  \ extracts release keys, filters out invalid or prerelease versions, sorts them,\
  \ and returns the list. |\n| `check_outdated(require, session) -> OutdateResult`\
  \ | Async | Orchestrates the two helpers, optionally prints a verbose message, and\
  \ returns a populated `OutdateResult`. |\n"
