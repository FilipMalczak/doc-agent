      \  \n- `packaging~=25.0`  \n- `termcolor~=3.1`  \n- `terminaltables~=3.1`  \n\
      \n**Packaging Options**  \n- The package is **zip\u2011safe** (`zip_safe = True`).\
      \  \n- Packages are discovered automatically (`packages = find:`) with the `tests`\
      \ directory excluded.  \n\n**Command\u2011Line Interface**  \n- A console script\
      \ is defined:  \n\n  ```bash\n  pip-outdated = pip_outdated:main\n  ```  \n\n\
      \  Running `pip-outdated` invokes the `main` function in the `pip_outdated`\
      \ module.  \n\n**Additional Configuration (`[vpip]` section)**  \n- `command_fallback\
      \ = \"python cute.py\"` \u2013 defines a fallback command that can be used by\
      \ tools that read the `vpip` configuration.  \n\n**Typical User Workflow** (for\
      \ documentation purposes)  \n1. **Install** the tool via `pip install pip-outdated`.\
      \  \n2. **Run** the command in a project directory containing `requirements.txt`\
      \ or `setup.cfg`:  \n\n   ```bash\n   pip-outdated\n   ```  \n\n3. The tool\
      \ will scan the listed dependencies and report any that are newer than the versions\
      \ currently specified.  \n\n**Notes for Documentation Writers**  \n- Emphasize\
      \ that the tool works with both `requirements.txt` **and** `setup.cfg`.  \n\
      - Highlight that the project is still in **Beta**, so users might encounter\
      \ edge cases.  \n- Mention the required Python version (3.7) based on the classifier.\
      \  \n- Provide examples of the output format (e.g., a table of outdated packages)\
      \ using the `terminaltables` dependency.  \n\n**Future Documentation Topics**\
      \  \n- How to customize the fallback command (`[vpip]`).  \n- Extending the\
      \ tool to support additional package managers.  \n- Contributing guidelines\
      \ (not present in `setup.cfg` but useful for a contributor guide).  \n     \
      \ </content>\n    </item>\n    <item index=\"2\">\n      <subject_path>README.rst</subject_path>\n\
      \      <subject_type>file</subject_type>\n      <notes_format>markdown</notes_format>\n\
      \      <content>\n## Project Overview  \n- **Name:** `pip-outdated`  \n- **Purpose:**\
      \ Detect outdated, missing, or incompatible dependencies defined in `requirements.txt`\
      \ or `setup.cfg`.  \n- **Key Feature:** Presents results in a colored table;\
      \ compares installed versions against version specifiers.  \n- **Alternative:**\
      \ For a simple list of updatable packages, use `pip list --outdated`.\n\n##\
      \ Badges  \n- **Build:** ![Travis CI](https://travis-ci.com/eight04/pip-outdated.svg?branch=master)\
      \ \u2192 <https://travis-ci.com/eight04/pip-outdated>  \n- **Coverage:** ![Codecov](https://codecov.io/gh/eight04/pip-outdated/branch/master/graph/badge.svg)\
      \ \u2192 <https://codecov.io/gh/eight04/pip-outdated>\n\n## Installation  \n\
      ```bash\npip install pip-outdated\n```\n*Published on PyPI*: <https://pypi.org/project/pip-outdated/>\n\
      \n## Usage Synopsis  \n```bash\npip-outdated [-h] [-v] [-q] [<file> [<file>\
      \ ...]]\n```\n\n### Positional arguments  \n- `<file>`: One or more requirement\
      \ files (supports glob patterns).  \n  - Default: `requirements.txt`, `setup.cfg`\
      \  \n\n### Optional arguments  \n- `-h, --help`: Show help message and exit.\
      \  \n- `-v, --verbose`: Enable verbose output (default: `False`).  \n- `-q,\
      \ --quiet`: Do **not** exit with code\u202F1 when any dependency is outdated\
      \ (default: `False`).  \n\n### Practical examples  \n- **Check multiple requirement\
      \ files**  \n  ```bash\n  pip-outdated *-requirements.txt\n  ```\n- **Check\
      \ all files in a folder**  \n  ```bash\n  pip-outdated requirements/*.txt\n\
      \  ```\n\n## TODO (Future Enhancements)  \n- Add commands to automatically update\
      \ packages.  \n- Add commands to rewrite `requirements.txt` / `setup.cfg` with\
      \ updated versions.  \n- Add a global\u2011list mode (e.g., `-g, --global`)\
      \ to list *all* installed packages.\n\n## Changelog Highlights  \n\n| Version\
      \ | Date | Notable Changes |\n|---------|------|-----------------|\n| **0.8.0**\
      \ | Aug\u202F9\u202F2025 | Dropped `setuptools` dependency; switched to `configparse`\
      \ for reading `setup.cfg`. |\n| **0.7.0** | Aug\u202F13\u202F2024 | Silently\
      \ ignore `InvalidVersion` errors. |\n| **0.6.0** | Jan\u202F1\u202F2023 | \u2022\
      \ Bumped dependencies.<br>\u2022 Removed `cchardet`.<br>\u2022 Fetch package\
      \ version via `pip` CLI (works inside virtualenvs). |\n| **0.5.0** | Jan\u202F\
      12\u202F2022 | Added type hints; bumped dependencies. |\n| **0.4.0** | Jan\u202F\
      30\u202F2020 | **Breaking:** Minimum Python 3.7.<br>Added parallel request handling\
      \ and `--quiet` flag. |\n| **0.3.0** | Oct\u202F13\u202F2019 | **Breaking:**\
      \ Exit code\u202F1 when any dependency is outdated.<br>Fixed prerelease handling.<br>Added\
      \ support for `setup_requires` and `extras_require`. |\n| **0.2.0** | Feb\u202F\
      10\u202F2019 | Updated core dependencies (colorama, packaging, requests, termcolor,\
      \ terminaltables). |\n| **0.1.0** | May\u202F12\u202F2018 | Initial release.\
      \ |\n\n## Key Takeaways for Documentation Authors  \n- Emphasize that `pip-outdated`\
      \ is a **reporting** tool, not a package updater.  \n- Highlight the flexibility\
      \ of file globbing for multi\u2011file projects.  \n- Note the `--quiet` flag\
      \ for CI pipelines where a non\u2011zero exit code may be undesirable.  \n-\
      \ Mention the upcoming features in the TODO section to set user expectations.\
      \  \n- Include the changelog table for quick reference on breaking changes and\
      \ major improvements.  \n      </content>\n    </item>\n    <item index=\"3\"\
      >\n      <subject_path>pip_outdated</subject_path>\n      <subject_type>directory</subject_type>\n\
      \      <notes_format>markdown</notes_format>\n      <content>\n# Directory\u2011\
      Level Documentation Extract for **pip\u2011outdated**\n\n---\n\n## Project Summary\n\
      **pip\u2011outdated** is a command\u2011line utility that scans one or more\
      \ requirement files (e.g., `requirements.txt`, `setup.cfg`) and reports any\
      \ packages that have newer releases available on PyPI.  \nIt is implemented\
      \ with asynchronous I/O to query PyPI concurrently and presents results as a\
      \ colored table.\n\n---\n\n## Entry Points\n- **Console script** (installed\
      \ via `setup.cfg`/`pyproject.toml`):  \n  ```bash\n  pip-outdated\n  ```\n \
      \ maps to `pip_outdated.__init__:main`.\n- **Module\u2011as\u2011script**: \
      \ \n  ```bash\n  python -m pip_outdated\n  ```\n  runs `pip_outdated.__main__:main`,\
      \ which simply imports and executes the same `main()` function.\n\n> **Note:**\
      \ Users never edit `__main__.py`; it only provides the standard \u201Cmodule\u2011\
      as\u2011script\u201D entry point.\n\n---\n\n## High\u2011Level Workflow (`pip_outdated/__init__.py`)\n\
      1. **Parse CLI arguments** (`--verbose/-v`, `--quiet/-q`, positional `file`\
      \ patterns).  \n2. **Set the global verbose flag** (`pip_outdated.verbose.set_verbose`).\
      \  \n3. **Lazy\u2011import heavy modules** (`find_require`, `check_outdated`,\
      \ `print_outdated`, `session`).  \n4. **Discover requirements** via `find_require.find_require`.\
      \  \n5. **Create a single aiohttp session** (`session.get_session`).  \n6. **Schedule\
      \ an asynchronous check** (`check_outdated.check_outdated`) for each requirement.\
      \  \n7. **Render the results** with `print_outdated.print_outdated`.  \n8. **Exit\
      \ code**: `0` if everything is up\u2011to\u2011date *or* `--quiet` is set; otherwise\
      \ `1`.\n\n---\n\n## Core Modules\n\n### `pip_outdated/find_require.py`\n- **Purpose**:\
      \ Locate and parse requirement specifications from various file types.\n- **Key\
      \ Functions**\n  - `iter_files(patterns)`: yields `Path` objects for each glob\u2011\
      matched file.\n  - `parse_lines(lines)`: removes comments, joins line continuations,\
      \ strips new\u2011lines.\n  - `parse_require(text)`: strips trailing pip options\
      \ and builds a `packaging.requirements.Requirement`; returns `None` on failure.\n\
      \  - `find_require(files)`: high\u2011level entry point that selects the appropriate\
      \ parser (`parse_cfg` for `.cfg`, otherwise `parse_requirements`) and yields\
      \ `Requirement` objects.\n- **Supported Sources**\n  - Plain requirement files\
      \ (`*.txt`, `*.pip`, etc.).\n  - `setup.cfg` (INI format) \u2013 extracts `setup_requires`,\
      \ `install_requires`, and all `extras_require` entries.\n- **Limitations**\n\
      \  - Inline `#` inside URLs may be incorrectly truncated.\n  - Only backslash\
      \ (`\\`) line continuations are handled.\n  - Invalid lines are silently ignored.\n\
      \n### `pip_outdated/check_outdated.py`\n- **Purpose**: Asynchronously determine\
      \ whether a requirement is outdated.\n- **Data Structure**: `OutdateResult`\
      \ (dataclass) containing:\n  - Original `Requirement`.\n  - Local version (`Version`\
      \ or `None`).\n  - All stable PyPI versions (sorted).\n  - \u201CWanted\u201D\
      \ version that satisfies the specifier.\n  - \u201CLatest\u201D version on PyPI.\n\
      - **Helper Functions**\n  - `get_local_version(name)`: runs `pip show` in a\
      \ subprocess; returns `Version` or `None`.\n  - `get_pypi_versions(name, session)`:\
      \ fetches stable releases from the PyPI JSON API via the provided aiohttp session.\n\
      \  - `check_outdated(require, session)`: combines the above, applies `canonicalize_name`,\
      \ and returns an `OutdateResult`.\n- **Verbosity**: Controlled by `pip_outdated.verbose.verbose()`;\
      \ each check can print a status line when enabled.\n- **Design Decisions**\n\
      \  - Ignores prerelease versions (users typically care about the latest stable\
      \ release).\n  - Gracefully returns empty/`None` results instead of raising\
      \ exceptions.\n\n### `pip_outdated/print_outdated.py`\n- **Purpose**: Render\
      \ `OutdateResult` objects as a colored ASCII table.\n- **Key Functions**\n \
      \ - `make_row(outdate)`: returns a list of formatted cells or `None` if the\
      \ package is up\u2011to\u2011date.\n  - `print_outdated(outdates, quiet)`: builds\
      \ the table, prints a legend, handles three states:\n    1. No requirements\
      \ \u2192 red warning.\n    2. All up\u2011to\u2011date \u2192 cyan \u201CEverything\
      \ is up\u2011to\u2011date!\u201D message.\n    3. Out\u2011of\u2011date packages\
      \ \u2192 colored table (red = unavailable/outdated, green = updatable).\n- **Exit\
      \ Behavior**: Calls `sys.exit(1)` when outdated packages are found **and** `quiet`\
      \ is `False`; otherwise exits with `0`.\n- **Dependencies**: `colorama`, `termcolor`,\
      \ `terminaltables`.\n\n### `pip_outdated/session.py`\n- **Purpose**: Centralize\
      \ creation of an `aiohttp.ClientSession`.\n- **Configuration**\n  - `User-Agent`\
      \ header set to `\"pip-outdated\"`.\n  - Connection limit set to **5** via `aiohttp.TCPConnector(limit=5)`.\n\
      - **Usage Pattern**\n  ```python\n  async with get_session() as session:\n \
      \     # use session for all PyPI requests\n  ```\n- **Rationale**: Guarantees\
      \ consistent headers and limits concurrent connections to avoid overloading\
      \ remote servers.\n\n### `pip_outdated/verbose.py`\n- **Purpose**: Provide a\
      \ shared global verbose flag.\n- **API**\n  - `set_verbose(value)`: sets the\
      \ flag.\n  - `verbose()`: returns the current flag value (`True`, `False`, or\
      \ `None` if unset).\n- **Scope**: Imported by any module that wishes to emit\
      \ optional diagnostic output.\n\n---\n\n## Installation\n```bash\npip install\
      \ pip-outdated\n```\nThe package registers the console script `pip-outdated`,\
      \ which invokes `pip_outdated.__init__:main`.\n\n---\n\n## Typical Usage Examples\n\
      ```bash\n# Scan default files (requirements.txt, setup.cfg)\npip-outdated\n\n\
      # Scan a custom glob pattern\npip-outdated my_deps/*.txt\n\n# Enable verbose\
      \ debugging output\npip-outdated -v\n\n# Run without causing a non\u2011zero\
      \ exit code when outdated packages are found\npip-outdated -q\n```\n\n---\n\n\
      ## Exit Codes\n| Code | Meaning |\n|------|---------|\n| `0` | All dependencies\
      \ are up\u2011to\u2011date **or** `--quiet` was supplied. |\n| `1` | At least\
      \ one dependency is outdated **and** `--quiet` was **not** supplied. |\n\nThese\
      \ codes make `pip-outdated` suitable for CI pipelines.\n\n---\n\n## Known Limitations\
      \ & Considerations\n- **Asyncio Loop Management**: Uses `asyncio.get_event_loop().run_until_complete`\
      \ instead of `asyncio.run` to work around an aiohttp bug that closes the loop\
      \ (`aiohttp#1925`).  \n- **Prereleases Ignored**: Only stable releases are considered\
      \ when determining \u201Clatest\u201D.  \n- **Transitive Dependencies Not Resolved**:\
      \ Only packages explicitly listed in the supplied files are checked.  \n- **Comment\
      \ Handling**: Inline `#` inside URLs may be stripped unintentionally.  \n- **No\
      \ Thread\u2011Safety Guarantees** for the global verbose flag; changing it after\
      \ startup may affect modules that have already read the flag.\n\n---\n\n## Dependencies\n\
      - **Runtime**: `aiohttp`, `colorama`, `termcolor`, `terminaltables`, `packaging`.\n\
      - **Standard Library**: `asyncio`, `subprocess`, `pathlib`, `configparser`,\
      \ `re`, `sys`.\n\n---\n\n## Documentation Checklist for Authors\n- [ ] Explain\
      \ the purpose and high\u2011level flow of the tool.  \n- [ ] Document each CLI\
      \ option (`--verbose`, `--quiet`, file patterns).  \n- [ ] Provide installation\
      \ and basic usage examples.  \n- [ ] Describe the output format (colored table,\
      \ legend, exit codes).  \n- [ ] Mention the async architecture and why a custom\
      \ event\u2011loop handling is used.  \n- [ ] List known limitations and how\
      \ they may affect users.  \n- [ ] Outline the role of each core module (`find_require`,\
      \ `check_outdated`, `print_outdated`, `session`, `verbose`).  \n\nThese notes\
      \ capture the essential information needed to produce user\u2011facing documentation\
      \ for the **pip\u2011outdated** project.\n      </content>\n    </item>\n  \
      \  <item index=\"4\">\n      <subject_path>tests</subject_path>\n      <subject_type>directory</subject_type>\n\
      \      <notes_format>markdown</notes_format>\n      <content>\n## Directory\u2011\
      level notes for **`tests/`** (Markdown)\n\n### Purpose & Context\n- The `tests`\
      \ folder is a **Python package** (thanks to the empty `tests/__init__.py`).\
      \  \n- Its presence tells us that the project ships a **test suite** that can\
      \ be imported and executed with standard tools like `pytest`.  \n- Currently\
      \ the suite contains two concrete test modules that verify core utility functions\
      \ of the `pip_outdated` package.\n\n### Test modules included\n| Test file |\
      \ Primary function under test | Key aspects verified |\n|-----------|----------------------------|----------------------|\n\
      | `tests/test_parse_cfg.py` | `pip_outdated.find_require.parse_cfg` | \u2022\
      \ Correct extraction of requirement **names** from a `setup.cfg` file.<br>\u2022\
      \ Handles multiple sections (`setup_requires`, `install_requires`, `options.extras_require`).<br>\u2022\
      \ Ignores version specifiers and preserves the order of appearance. |\n| `tests/test_pytz.py`\
      \ | `pip_outdated.check_outdated.get_pypi_versions` (async) | \u2022 Successful\
      \ asynchronous retrieval of version data for the `pytz` package from PyPI.<br>\u2022\
      \ Demonstrates the required **async context manager** pattern (`async with get_session()`).<br>\u2022\
      \ Passes if no exception is raised (basic connectivity & parsing sanity check).\
      \ |\n\n### Common testing patterns\n- **Framework:** `pytest` is used throughout.\n\
      - **Async support:** Tests that involve network I/O (`test_pytz.py`) are marked\
      \ with `@pytest.mark.asyncio` and employ `async with` to manage HTTP sessions.\n\
      - **Temporary resources:** `test_parse_cfg.py` creates a temporary `setup.cfg`\
      \ file via the `tmp_path` fixture, ensuring isolation from the project\u2019\
      s actual configuration.\n\n### How to run the suite\n```bash\n# From the repository\
      \ root\npytest tests/\n```\n- The command discovers the `tests` package automatically\
      \ because of `__init__.py`.\n- No additional setup is required; the suite uses\
      \ only standard `pytest` fixtures and the library\u2019s own public APIs.\n\n\
      ### Implications for user\u2011facing documentation\n- **`parse_cfg` API:**\
      \ Users can rely on `parse_cfg(path_to_setup.cfg)` to return an iterable of\
      \ requirement objects that expose at least a `.name` attribute. Version constraints\
      \ are stripped, making the output suitable for downstream checks (e.g., \u201C\
      are these packages outdated?\u201D).  \n- **Async version fetching:** The library\u2019\
      s public async function `get_pypi_versions(package_name, session)` must be called\
      \ inside an `async with get_session()` block. This pattern should be highlighted\
      \ in any \u201CGetting started\u201D or \u201CAdvanced usage\u201D sections.\
      \  \n- **Extensibility:** Adding new test modules (e.g., `tests/test_core.py`)\
      \ will automatically become part of the package; the directory is intentionally\
      \ left open for future coverage expansion.\n\n### Suggested documentation snippet\
      \ (for a README or developer guide)\n\n> The project includes a `tests/` package\
      \ that you can execute with `pytest`.  \n> - **Parsing configuration files:**\
      \ `parse_cfg()` reads a `setup.cfg` and returns the plain package names found\
      \ in `setup_requires`, `install_requires`, and any `extras_require` sections,\
      \ preserving their order.  \n> - **Asynchronous PyPI queries:** Use `async with\
      \ get_session() as sess` followed by `await get_pypi_versions(\"your_pkg\",\
      \ sess)` to fetch version data without blocking.  \n> The current test suite\
      \ validates these behaviours with examples for `setup.cfg` parsing and a real\u2011\
      world package (`pytz`). Feel free to add more tests to cover additional modules.\n\
      \      </content>\n    </item>\n</list>"
