      `  \n\n**Project Home & License**  \n- **Repository URL**: `\"https://github.com/eight04/pip-outdated\"\
      `  \n- **License**: `\"MIT\"`  \n\n**Classifiers (PyPI metadata)**  \n- Development\
      \ Status :: 4 - Beta  \n- Environment :: Console  \n- Intended Audience :: Developers\
      \  \n- Programming Language :: Python :: 3.7  \n- Topic :: Software Development\
      \ :: Build Tools  \n\n**Keywords**  \n- `\"pip\"`, `\"check\"`, `\"outdate\"\
