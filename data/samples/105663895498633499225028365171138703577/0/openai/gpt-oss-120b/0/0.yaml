- content: "# Directory\u2011Level Documentation Extract  \n**Project:** `pip-outdated`\
    \  \n\n---\n\n## 1. Project Overview  \n\n- **Name:** `pip-outdated`  \n- **Purpose:**\
    \ Detect outdated, missing, or incompatible dependencies defined in `requirements.txt`\
    \ or `setup.cfg`.  \n- **Key Feature:** Asynchronous querying of PyPI and presentation\
    \ of results in a colored ASCII table.  \n- **Intended Audience:** Developers\
    \ who need a quick report of packages that can be upgraded.  \n- **Current Status:**\
    \ **Beta** (see classifiers in `setup.cfg`).  \n- **Supported Python Version:**\
    \ `>=3.7` (classifier `Programming Language :: Python :: 3.7`).  \n\n---\n\n##\
    \ 2. Packaging & Distribution  \n\n### 2.1 `setup.cfg` (metadata)  \n\n```toml\n\
    [metadata]\nname = \"pip-outdated\"\nversion = \"0.8.0\"\ndescription = \"Find\
    \ outdated dependencies in your requirements.txt or setup.cfg\"\nauthor = \"eight\"\
    \nauthor_email = \"eight04@gmail.com\"\nurl = \"https://github.com/eight04/pip-outdated\"\
    \nlicense = \"MIT\"\nclassifiers =\n    Development Status :: 4 - Beta\n    Environment\
    \ :: Console\n    Intended Audience :: Developers\n    Programming Language ::\
    \ Python :: 3.7\n    Topic :: Software Development :: Build Tools\nkeywords =\
    \ \"pip\", \"check\", \"outdate\", \"npm\"\n\n[options]\nzip_safe = true\npackages\
    \ = find:\ninstall_requires =\n    aiohttp~=3.12\n    colorama~=0.4.6\n    packaging~=25.0\n\
    \    termcolor~=3.1\n    terminaltables~=3.1\n\n[options.entry_points]\nconsole_scripts\
    \ =\n    pip-outdated = pip_outdated:main\n\n[vpip]\ncommand_fallback = \"python\
    \ cute.py\"\n```\n\n### 2.2 `setup.py` (placeholder)  \n\n- Contains a shebang\
    \ (`#!/usr/bin/env python3`) and an empty `setup()` call.  \n- No metadata is\
    \ defined here; the project relies on `setup.cfg` (or a future `pyproject.toml`).\
    \  \n\n**Implication:** Developers should edit `setup.cfg` (or migrate to `pyproject.toml`)\
    \ to add or modify packaging metadata; `setup.py` can remain a minimal placeholder.\n\
    \n---\n\n## 3. Installation  \n\n```bash\npip install pip-outdated\n```\n\n*Published\
    \ on PyPI:* <https://pypi.org/project/pip-outdated/>\n\nThe installation registers\
    \ the console script `pip-outdated`.\n\n---\n\n## 4. Command\u2011Line Interface\
    \  \n\n```\npip-outdated [-h] [-v] [-q] [<file> [<file> ...]]\n```\n\n| Option\
    \ | Description |\n|--------|-------------|\n| `-h, --help` | Show help message\
    \ and exit. |\n| `-v, --verbose` | Enable verbose diagnostic output. |\n| `-q,\
    \ --quiet` | Do **not** exit with code\u202F1 when outdated packages are found.\
    \ |\n| `<file>` | One or more requirement files (supports glob patterns). Default:\
    \ `requirements.txt`, `setup.cfg`. |\n\n### Typical Usage  \n\n```bash\n# Scan\
    \ default files\npip-outdated\n\n# Scan a custom glob pattern\npip-outdated my_deps/*.txt\n\
    \n# Enable verbose output\npip-outdated -v\n\n# Suppress non\u2011zero exit code\
    \ in CI\npip-outdated -q\n```\n\n### Exit Codes  \n\n| Code | Meaning |\n|------|---------|\n\
    | `0` | All dependencies are up\u2011to\u2011date **or** `--quiet` was supplied.\
    \ |\n| `1` | At least one dependency is outdated **and** `--quiet` was **not**\
    \ supplied. |\n\n---\n\n## 5. High\u2011Level Architecture  \n\n```\npip_outdated/\n\
    \u251C\u2500\u2500 __init__.py          # parses CLI, orchestrates workflow\n\u251C\
    \u2500\u2500 find_require.py      # discovers & parses requirement specs\n\u251C\
    \u2500\u2500 check_outdated.py    # async PyPI queries, builds OutdateResult\n\
    \u251C\u2500\u2500 print_outdated.py    # renders colored table, handles exit\
    \ codes\n\u251C\u2500\u2500 session.py           # provides shared aiohttp.ClientSession\n\
    \u251C\u2500\u2500 verbose.py           # global verbose flag handling\n\u2514\
    \u2500\u2500 __main__.py          # module\u2011as\u2011script entry point\n```\n\
    \n### Workflow (in `__init__.py`)  \n\n1. Parse CLI arguments.  \n2. Set global\
    \ verbose flag.  \n3. Lazily import heavy modules.  \n4. Discover requirements\
    \ via `find_require.find_require`.  \n5. Create a single `aiohttp` session (`session.get_session`).\
    \  \n6. Schedule asynchronous checks for each requirement (`check_outdated.check_outdated`).\
    \  \n7. Render results with `print_outdated.print_outdated`.  \n8. Exit with the\
    \ appropriate code (see Section\u202F4).  \n\n---\n\n## 6. Core Modules Detail\
    \  \n\n### `find_require.py`  \n- **Goal:** Locate and parse requirements from\
    \ plain files and `setup.cfg`.  \n- **Key Functions:** `iter_files`, `parse_lines`,\
    \ `parse_require`, `find_require`.  \n- **Supported Sources:** `*.txt`, `*.pip`,\
    \ and `setup.cfg` (extracts `setup_requires`, `install_requires`, `extras_require`).\
    \  \n- **Limitations:**  \n  - Inline `#` inside URLs may be truncated.  \n  -\
    \ Only backslash (`\\`) line continuations are handled.  \n  - Invalid lines are\
    \ silently ignored.  \n\n### `check_outdated.py`  \n- **Goal:** Determine if a\
    \ requirement is outdated.  \n- **Data Class:** `OutdateResult` (holds requirement,\
    \ local version, PyPI versions, wanted version, latest version).  \n- **Helpers:**\
    \ `get_local_version` (uses `pip show`), `get_pypi_versions` (PyPI JSON API via\
    \ aiohttp).  \n- **Behaviour:** Ignores prereleases, returns `None`/empty results\
    \ instead of raising.  \n\n### `print_outdated.py`  \n- **Goal:** Render `OutdateResult`\
    \ objects as a colored table.  \n- **Functions:** `make_row`, `print_outdated`.\
    \  \n- **Output Scenarios:**  \n  1. No requirements \u2192 red warning.  \n \
    \ 2. All up\u2011to\u2011date \u2192 cyan success message.  \n  3. Out\u2011of\u2011\
    date packages \u2192 colored table with legend.  \n\n### `session.py`  \n- Provides\
    \ a shared `aiohttp.ClientSession` with:  \n  - `User-Agent: \"pip-outdated\"\
    `  \n  - Connection limit **5** (`aiohttp.TCPConnector(limit=5)`).  \n\n### `verbose.py`\
    \  \n- Global verbose flag with `set_verbose(value)` and `verbose()` getters.\
    \  \n\n---\n\n## 7. Testing Suite (`tests/`)  \n\n- **Package:** `tests` (contains\
    \ `__init__.py`).  \n- **Framework:** `pytest` (including async support via `@pytest.mark.asyncio`).\
    \  \n\n### Test Modules  \n\n| Test File | Target Function | Coverage Highlights\
    \ |\n|-----------|----------------|---------------------|\n| `test_parse_cfg.py`\
    \ | `find_require.parse_cfg` | Extraction of package names from `setup.cfg`; handling\
    \ of multiple sections; order preservation; version specifiers stripped. |\n|\
    \ `test_pytz.py` | `check_outdated.get_pypi_versions` | Async retrieval of version\
    \ data for the `pytz` package; verifies session usage and basic connectivity.\
    \ |\n\n### Running Tests  \n\n```bash\npytest tests/\n```\n\n**Documentation Implications:**\
    \  \n- Emphasize the `parse_cfg` API for users needing to read `setup.cfg`.  \n\
    - Highlight the async pattern `async with get_session() as sess` for PyPI queries.\
    \  \n\n---\n\n## 8. Known Limitations & Considerations  \n\n- **Async Loop Handling:**\
    \ Uses `asyncio.get_event_loop().run_until_complete` to work around an aiohttp\
    \ bug.  \n- **Prereleases Ignored:** Only stable releases are considered when\
    \ determining \u201Clatest\u201D.  \n- **No Transitive Dependency Resolution:**\
    \ Only packages explicitly listed are checked.  \n- **Comment Handling:** Inline\
    \ `#` inside URLs may be removed unintentionally.  \n- **Global Verbose Flag:**\
    \ Not thread\u2011safe; changing it after modules have read it may have inconsistent\
    \ effects.  \n\n---\n\n## 9. Documentation Checklist for Authors  \n\n- [ ] Summarize\
    \ purpose and high\u2011level flow.  \n- [ ] Document each CLI option (`--verbose`,\
    \ `--quiet`, file patterns).  \n- [ ] Provide installation instructions and basic\
    \ usage examples.  \n- [ ] Describe output format (colored table, legend, exit\
    \ codes).  \n- [ ] Explain the async architecture and custom event\u2011loop handling.\
    \  \n- [ ] List known limitations and how they affect users.  \n- [ ] Outline\
    \ the role of each core module (`find_require`, `check_outdated`, `print_outdated`,\
    \ `session`, `verbose`).  \n- [ ] Reference the test suite and its relevance to\
    \ developers.  \n\nThese notes capture the essential information needed to produce\
    \ user\u2011facing documentation for the **pip\u2011outdated** project."
