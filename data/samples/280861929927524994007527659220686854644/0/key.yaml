  \  \n9. **Testing** \u2013 Running the test suite, overview of covered features,\
  \ guidelines for extending tests.  \n10. **Packaging & Distribution** \u2013 Summary\
  \ of `setup.cfg` metadata, entry point, and notes on the stub `setup.py`.  \n11.\
