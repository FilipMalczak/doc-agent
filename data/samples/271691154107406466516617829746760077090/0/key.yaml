      \                </perspective>\n              </details>\n            </item>\n\
      \          </list>\n        </provenance>\n        <content>\n## Usage Recommendations\
      \ for Maintainers\n- **Integration point** \u2013 Expose `find_require` as the\
      \ public function for any part of the project that needs to collect dependencies.\
      \ It already accepts glob patterns, making it flexible for varied project layouts.\n\
      - **Error handling** \u2013 Since unparsable lines are dropped silently, consider\
