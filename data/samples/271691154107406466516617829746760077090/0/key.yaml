      \ into malformed requirement entries.\n- **Testing** \u2013 Unit\u2011test each\
      \ parser with a combination of:  \n  - Simple requirement lines (`\"requests>=2.0\"\
      `).  \n  - Lines containing comments and continuation characters.  \n  - `setup.cfg`\
