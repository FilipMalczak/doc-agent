      \    <content>\n## Project Overview  \n\n- **Name:** `pip-outdated`  \n- **Purpose:**\
      \ Detect outdated, missing, or incompatible dependencies declared in `requirements.txt`\
      \ or `setup.cfg` files and present the results in a colored table.  \n- **Typical\
      \ Use\u2011Case:**  \n  - Quickly audit a project's dependency list.  \n  -\
      \ Spot packages that need updating without manually parsing `pip list --outdated`.\
      \  \n\n## Key Features  \n\n- Parses version specifiers from both **requirements\
      \ files** (`requirements.txt`) and **setup configuration** (`setup.cfg`).  \n\
      - Shows a **colored table** indicating the status of each dependency (up\u2011\
      to\u2011date, outdated, missing, incompatible).  \n- Supports **glob patterns**\
      \ to check multiple files at once.  \n- Provides **quiet mode** (`-q/--quiet`)\
      \ to suppress a non\u2011zero exit code when some packages are outdated.  \n\
      - Verbose output (`-v/--verbose`) for detailed processing information.  \n\n\
      ## Installation  \n\n```bash\npip install pip-outdated\n```  \n\n> The package\
      \ is available on PyPI: <https://pypi.org/project/pip-outdated/>\n\n## Command\u2011\
      Line Interface  \n\n```\nusage: pip-outdated [-h] [-v] [-q] [<file> [<file>\
      \ ...]]\n\nFind outdated dependencies in your requirements.txt or setup.cfg\
      \ file.\n```\n\n### Positional Arguments  \n\n- `<file>` \u2013 One or more\
      \ requirement files to read.  \n  - Accepts **glob patterns** (e.g., `*-requirements.txt`).\
      \  \n  - Default values: `[\"requirements.txt\", \"setup.cfg\"]`.\n\n### Optional\
      \ Flags  \n\n- `-h, --help` \u2013 Show help message and exit.  \n- `-v, --verbose`\
      \ \u2013 Print verbose information (default: `False`).  \n- `-q, --quiet` \u2013\
      \ Do **not** return exit code\u202F1 when any dependency is outdated (default:\
      \ `False`).\n\n### Example Commands  \n\n- **Check multiple requirement files:**\
      \  \n\n  ```bash\n  pip-outdated *-requirements.txt\n  ```\n\n- **Check all\
      \ files inside a `requirements` folder:**  \n\n  ```bash\n  pip-outdated requirements/*.txt\n\
      \  ```\n\n## Planned Enhancements (TODO)  \n\n- Add commands/options to **auto\u2011\
      update packages**.  \n- Add commands/options to **modify the source `requirements.txt`\
      \ / `setup.cfg`** with updated version specifiers.  \n- Add a **global list**\
      \ mode (e.g., `-g` / `--global`) to list **all installed packages**, not only\
      \ those declared in the files.\n\n## Changelog Highlights  \n\n| Version | Date\
      \ | Notable Changes |\n|--------|------|-----------------|\n| **0.8.0** | Aug\u202F\
      9\u202F2025 | Dropped `setuptools` dependency; switched to `configparse` for\
      \ reading `setup.cfg`. |\n| **0.7.0** | Aug\u202F13\u202F2024 | Ignored `InvalidVersion`\
      \ errors. |\n| **0.6.0** | Jan\u202F1\u202F2023 | \u2013 Bumped dependencies.<br>\u2013\
      \ Removed `cchardet`.<br>\u2013 Fetched package versions via the **pip CLI**\
      \ to correctly resolve versions inside virtual environments. |\n| **0.5.0**\
      \ | Jan\u202F12\u202F2022 | Added type hints; bumped dependencies. |\n| **0.4.0**\
      \ | Jan\u202F30\u202F2020 | **Breaking:** Minimum Python version raised to **3.7**.<br>Added\
      \ parallel request handling and `--quiet` flag. |\n| **0.3.0** | Oct\u202F13\u202F\
      2019 | **Breaking:** Exit code set to\u202F1 when any dependency is not up\u2011\
      to\u2011date.<br>Stopped checking pre\u2011releases.<br>Added support for `setup_requires`\
      \ and `extras_require` in `setup.cfg`. |\n| **0.2.0** | Feb\u202F10\u202F2019\
      \ | Updated core dependencies (e.g., `colorama`, `packaging`, `requests`, `termcolor`,\
      \ `terminaltables`). |\n| **0.1.0** | May\u202F12\u202F2018 | Initial release.\
      \ |\n\n## Additional Resources  \n\n- **CI status:** <https://travis-ci.com/eight04/pip-outdated>\
      \ (badge shown in README)  \n- **Code coverage:** <https://codecov.io/gh/eight04/pip-outdated>\
      \  \n\nThese badges indicate that the project is actively tested and maintained.\
      \  \n    </content>\n    </item>\n    <item index=\"1\">\n    <subject_path>pip_outdated</subject_path>\n\
      \    <subject_type>directory</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n# Directory\u2011Level Notes for **`pip_outdated/`**\n\nThese\
      \ notes synthesize the file\u2011level documentation for the *pip\u2011outdated*\
      \ package.  \nThey are organized to support the creation of user\u2011facing\
      \ documentation, onboarding material, or a quick\u2011reference guide.\n\n---\
      \  \n\n## 1. Project Overview  \n\n- **Package name:** `pip-outdated`  \n- **Current\
      \ version:** `\"0.8.0\"`  \n- **Primary purpose:** Scan a Python project\u2019\
      s dependency specifications (e.g., `requirements.txt`, `setup.cfg`, or any glob\u2011\
      matched files) and report which packages have newer releases available on PyPI.\
      \  \n- **Execution entry points:**  \n  - `python -m pip_outdated` (via `pip_outdated/__main__.py`)\
      \  \n  - Installed console script `pip-outdated` (calls `pip_outdated.main.main()`)\
      \  \n\n---  \n\n## 2. High\u2011Level Workflow  \n\n1. **Argument parsing**\
      \ \u2013 `parse_args` builds the CLI surface (flags `--verbose`, `--quiet`,\
      \ and positional file\u2011list).  \n2. **Requirement discovery** \u2013 `find_require.find_require()`\
      \ resolves the supplied file/glob patterns, parses `requirements.txt`\u2011\
      style files and `setup.cfg` sections, and yields `packaging.requirements.Requirement`\
      \ objects.  \n3. **HTTP session creation** \u2013 `session.get_session()` returns\
      \ a pre\u2011configured `aiohttp.ClientSession` (User\u2011Agent `\"pip-outdated\"\
      `; connection limit `5`).  \n4. **Concurrent version checks** \u2013 For each\
      \ requirement, `check_outdated.check_outdated()` is scheduled as an `asyncio`\
      \ task. This function:  \n   - Retrieves the locally installed version (`get_local_version`).\
      \  \n   - Retrieves all stable PyPI releases (`get_pypi_versions`).  \n   -\
      \ Populates an `OutdateResult` dataclass that contains the installed, wanted,\
      \ and latest versions plus helper predicates.  \n5. **Result rendering** \u2013\
      \ `print_outdated.print_outdated()` gathers completed `OutdateResult`s, builds\
      \ a colored ASCII table, prints a legend, and (unless `--quiet`) exits with\
      \ status\u202F1 if any package is outdated.  \n\n---  \n\n## 3. Core Modules\
      \  \n\n| Module | Primary Responsibility | Key Public API |\n|--------|------------------------|----------------|\n\
      | `__init__.py` | Package metadata & CLI description | \u2013 |\n| `__main__.py`\
      \ | Bootstrap script for `python -m pip_outdated` | Calls `main()` |\n| `main.py`\
      \ *(referenced but not shown)* | Orchestrates argument parsing, requirement\
      \ discovery, session handling, task scheduling, and final printing. |\n| `find_require.py`\
      \ | Parse requirement sources (plain files, `setup.cfg`, raw text). | `find_require(files:\
      \ List[str]) \u2192 Iterator[Requirement]` |\n| `check_outdated.py` | Async\
      \ logic to compare local vs. PyPI versions. | `check_outdated(require: Requirement,\
      \ session) \u2192 OutdateResult` |\n| `print_outdated.py` | Render results in\
      \ a colored table and manage exit status. | `print_outdated(outdates, quiet:\
      \ bool)` |\n| `session.py` | Provide a reusable aiohttp session with sensible\
      \ defaults. | `get_session() \u2192 aiohttp.ClientSession` |\n| `verbose.py`\
      \ | Global verbose flag handling. | `set_verbose(bool)`, `verbose() \u2192 bool`\
      \ |\n\n---  \n\n## 4. Important Data Structures  \n\n### `OutdateResult` *(in\
      \ `check_outdated.py`)*  \n\n| Field | Type | Meaning |\n|-------|------|---------|\n\
      | `requirement` | `Requirement` | Parsed requirement line (name, specifier,\
      \ extras). |\n| `version` | `Optional[Version]` | Currently installed version\
      \ (or `None`). |\n| `all_versions` | `List[Version]` | All stable releases retrieved\
      \ from PyPI, sorted. |\n| `wanted` | `Optional[Version]` | Highest PyPI version\
      \ satisfying the requirement\u2019s specifier. |\n| `latest` | `Optional[Version]`\
      \ | Newest stable release on PyPI. |\n| **Computed helpers** |  | `name`, `install_not_found()`,\
      \ `install_not_wanted()`, `pypi_not_found()`, `outdated()` |\n\nThese helpers\
      \ drive the coloring logic in `print_outdated.py`.\n\n---  \n\n## 5. Verbosity\
      \ & Quiet Modes  \n\n- **Verbose (`-v / --verbose`)** \u2013 Enables extra diagnostic\
      \ prints (e.g., file parsing traces, per\u2011package status). Implemented via\
      \ the global flag in `verbose.py`.  \n- **Quiet (`-q / --quiet`)** \u2013 Suppresses\
      \ the non\u2011zero exit code when outdated packages are detected, allowing\
      \ callers (scripts, CI) to handle results themselves.\n\n---  \n\n## 6. Concurrency\
      \ Model  \n\n- The tool uses **`asyncio`** together with **`aiohttp`**:  \n\
      \  - Subprocess calls (`pip show`) and HTTP GET requests are wrapped in `async`\
      \ functions.  \n  - Tasks are scheduled concurrently, limited only by the aiohttp\
      \ connector\u2019s `limit=5`.  \n- **Why not `asyncio.run`?** \u2013 To avoid\
      \ closing the event loop prematurely, which can clash with aiohttp\u2019s connection\
      \ cleanup (see aiohttp issue #1925). The code instead fetches the current loop\
      \ via `asyncio.get_event_loop()`.\n\n---  \n\n## 7. Extensibility Points  \n\
      \n| Area | Current Implementation | Possible Enhancements |\n|------|------------------------|-----------------------|\n\
      | **Requirement Sources** | Handles `requirements.txt`\u2011style files and\
      \ `setup.cfg`. | Add support for `pyproject.toml`, `Pipfile`, or custom config\
      \ formats. |\n| **Version Filtering** | Excludes pre\u2011releases; uses `packaging`\
      \ for canonical handling. | Provide toggles for pre\u2011release inclusion or\
      \ ignore yanked releases. |\n| **Local Version Retrieval** | Runs `pip show`\
      \ via subprocess. | Switch to `importlib.metadata.version` for a pure\u2011\
      Python approach. |\n| **Output Formats** | ASCII table with `terminaltables`.\
      \ | Offer JSON, CSV, or Markdown table exporters. |\n| **Session Configuration**\
      \ | Fixed User\u2011Agent and connection limit. | Allow caller\u2011provided\
      \ headers, proxy settings, or adjustable concurrency. |\n| **Logging** | Simple\
      \ `print` when verbose. | Integrate Python `logging` for structured, level\u2011\
      based output. |\n\n---  \n\n## 8. Suggested Documentation Structure  \n\n1.\
      \ **Introduction** \u2013 Problem statement and high\u2011level solution overview.\
      \  \n2. **Installation** \u2013 `pip install pip-outdated`; supported Python\
      \ versions.  \n3. **Quick Start** \u2013 Running `pip-outdated` in a project\
      \ directory (default files).  \n4. **Command\u2011Line Reference** \u2013 Detailed\
      \ table of flags and positional arguments, including examples of glob usage.\
      \  \n5. **Workflow Diagram** \u2013 Visual flow: parse args \u2192 discover\
      \ requirements \u2192 async version checks \u2192 render table.  \n6. **Concurrency\
      \ Details** \u2013 Why `asyncio` is used; limits and event\u2011loop handling.\
      \  \n7. **Result Interpretation** \u2013 Explanation of table columns, color\
      \ meaning, \u201CWanted\u201D vs. \u201CLatest\u201D.  \n8. **Configuration\
      \ & Extensibility** \u2013 Custom session, alternate output formats, adding\
      \ new requirement sources.  \n9. **Troubleshooting** \u2013 Common errors (network\
      \ failures, malformed requirement lines, missing packages).  \n10. **Developer\
      \ Guide** \u2013 Overview of internal modules, data structures, and how to contribute.\
      \  \n\n---  \n\n## 9. Quick Example Output  \n\n```\n+----------+-----------+--------+--------+\n\
      | Name     | Installed | Wanted | Latest |\n+----------+-----------+--------+--------+\n\
      | requests | 2.25.1    | 2.28.2 | 2.28.2 |\n| numpy    | 1.21.0    | 1.24.0\
      \ | 1.24.0 |\n+----------+-----------+--------+--------+\n\nRed = missing /\
      \ out\u2011of\u2011specifier\nGreen = upgradable\n```\n\nIf everything is up\u2011\
      to\u2011date:\n\n```\nEverything is up-to-date!   (cyan, bold)\n```\n\n--- \
      \ \n\n### End of Directory\u2011Level Notes  \n\nThese notes can be directly\
      \ used as the backbone for user\u2011facing documentation or as a reference\
      \ for developers extending the *pip\u2011outdated* project.\n    </content>\n\
      \    </item>\n    <item index=\"2\">\n    <subject_path>setup.cfg</subject_path>\n\
      \    <subject_type>file</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n## Project Overview\n- **Name**: `pip-outdated`  \n- **Current\
      \ version**: `0.8.0`  \n- **Purpose**: Scans a `requirements.txt` or `setup.cfg`\
      \ file and reports outdated Python dependencies.  \n- **Target audience**: Developers\
      \ who want an easy way to keep their project dependencies up\u2011to\u2011date.\
      \  \n\n## Metadata (for documentation)\n- **Description**: `\"Find outdated\
      \ dependencies in your requirements.txt or setup.cfg\"`  \n- **Author**: `\"\
      eight\"` (`eight04@gmail.com`)  \n- **License**: `\"MIT\"`  \n- **Project homepage**:\
      \ `\"https://github.com/eight04/pip-outdated\"`  \n- **Keywords**: `\"pip, check,\
      \ outdate, npm\"`  \n\n## Classifiers (useful for PyPI listing)\n- Development\
      \ Status :: 4 - Beta  \n- Environment :: Console  \n- Intended Audience :: Developers\
      \  \n- Programming Language :: Python :: 3.7  \n- Topic :: Software Development\
      \ :: Build Tools  \n\n## Packaging Details\n- **Packaging type**: Pure\u2011\
      Python (`zip_safe = True`)  \n- **Package discovery**: `find:` (automatically\
      \ includes all packages except those listed under `[options.packages.find]`)\
      \  \n- **Excluded packages**: `tests`  \n\n## Dependencies (runtime)\n- `aiohttp~=3.12`\
      \ \u2013 asynchronous HTTP client  \n- `colorama~=0.4.6` \u2013 cross\u2011\
      platform colored terminal text  \n- `packaging~=25.0` \u2013 utilities for version\
      \ handling  \n- `termcolor~=3.1` \u2013 simple ANSI color formatting  \n- `terminaltables~=3.1`\
      \ \u2013 ASCII table rendering  \n\n## Console Entry Point\n- A command\u2011\
      line script is installed as `pip-outdated` that maps to the Python function\
      \ `pip_outdated:main`.  \n  - Users can invoke it directly after installation:\
      \  \n\n    ```bash\n    pip-outdated [options] <path-to-requirements-or-setup.cfg>\n\
      \    ```\n\n## Additional Configuration (`[vpip]` section)\n- **`command_fallback`**:\
      \ `\"python cute.py\"`  \n  - Indicates a custom fallback command used by the\
      \ `vpip` tool (if the project is used within that environment).  \n\n## Documentation\
      \ Notes\n- Include a **quick\u2011start** section showing how to install the\
      \ package (e.g., `pip install pip-outdated`) and run the command.  \n- Explain\
      \ each **runtime dependency** briefly, especially `aiohttp` if the tool performs\
      \ network checks.  \n- Mention the **beta status** and expected compatibility\
      \ with Python\u202F3.7+.  \n- Provide a link to the **GitHub repository** for\
      \ contributing, issue tracking, and further details.  \n- Highlight the **console\
      \ script** usage and any supported command\u2011line options (to be detailed\
      \ from the project's README).  \n\nThese points can be organized into user\u2011\
      facing documentation such as the README, online docs, or help output for the\
      \ `pip-outdated` CLI.\n    </content>\n    </item>\n    <item index=\"3\">\n\
      \    <subject_path>setup.py</subject_path>\n    <subject_type>file</subject_type>\n\
      \    <notes_format>markdown</notes_format>\n    <content>\n## Project Notes\
      \ \u2013 `setup.py`\n\n- **File Path**: `setup.py`  \n- **Language**: Python\
      \  \n- **Purpose**: Acts as the entry point for packaging the project with **setuptools**.\
      \  \n- **Current Implementation**  \n  ```python\n  #! python3\n\n  from setuptools\
      \ import setup\n\n  setup()\n  ```  \n  - The script imports the `setup` function\
      \ from **setuptools** but calls it with **no arguments**, meaning no package\
      \ metadata, dependencies, or entry points are defined yet.  \n- **Implications\
      \ for Users**  \n  - As\u2011is, running `python setup.py` will not produce\
      \ a distributable package.  \n  - Users cannot install the project via `pip\
      \ install .` because essential metadata (e.g., `name`, `version`, `packages`)\
      \ is missing.  \n- **Recommendations for Future Documentation**  \n  - Populate\
      \ the `setup()` call with at least the following fields:  \n    - `\"name\"\
      ` \u2013 the package name users will install.  \n    - `\"version\"` \u2013\
      \ current version string.  \n    - `\"author\"` / `\"author_email\"` \u2013\
      \ contact information.  \n    - `\"description\"` \u2013 short summary of the\
      \ project.  \n    - `\"long_description\"` \u2013 detailed description, often\
      \ read from a `README.md`.  \n    - `\"long_description_content_type\"` \u2013\
      \ typically `\"text/markdown\"` for Markdown readme files.  \n    - `\"url\"\
      ` \u2013 project homepage or repository link.  \n    - `\"packages\"` \u2013\
      \ list of packages to include, often generated with `setuptools.find_packages()`.\
      \  \n    - `\"install_requires\"` \u2013 runtime dependencies.  \n    - `\"\
      classifiers\"` \u2013 PyPI classifiers for audience, license, programming language,\
      \ etc.  \n    - Optional: `\"entry_points\"` for console scripts or plugins.\
      \  \n  - Provide an example `setup.py` snippet in the user documentation to\
      \ illustrate a minimal working configuration.  \n  - Mention that modern projects\
      \ often prefer a declarative `setup.cfg` or `pyproject.toml` configuration;\
      \ `setup.py` can serve as a fallback for dynamic setup logic.  \n- **Potential\
      \ Next Steps**  \n  1. Add required metadata to make the package installable.\
      \  \n  2. Include a `README.md` and reference it in `long_description`.  \n\
      \  3. Create a `requirements.txt` or include dependencies directly in `install_requires`.\
      \  \n  4. Update documentation with installation instructions, e.g., `pip install\
      \ .` or `python -m pip install .`.  \n\nThese notes capture the current state\
      \ of `setup.py` and outline the information needed to produce clear, user\u2011\
      oriented documentation for packaging and installation.\n    </content>\n   \
      \ </item>\n    <item index=\"4\">\n    <subject_path>tests</subject_path>\n\
      \    <subject_type>directory</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n## \U0001F4C2 Directory\u2011Level Notes \u2013 `tests/`\n\n\
      ### Overview\n- The **`tests`** directory is a **Python package** (contains\
      \ an empty `__init__.py`) that groups all test modules for the project.\n- It\
      \ provides the foundation for running the suite with tools such as **`pytest`**\
      \ or **`unittest`** via commands like `python -m pytest`.\n\n### Package Initialization\
      \ (`tests/__init__.py`)\n- **Purpose**: Marks `tests` as a package, enabling\
      \ relative imports and future shared fixtures.\n- **Current state**: Empty (no\
      \ code, imports, or docstrings).\n- **Implications**:\n  - Allows execution\
      \ of the test suite with standard discovery mechanisms.\n  - No global test\
      \ configuration is present yet; developers can add shared fixtures in this file\
      \ or in a `conftest.py` later.\n\n### Test Modules\n\n| Test File | Primary\
      \ Focus | Key Behaviours Verified | Documentation Take\u2011aways |\n|-----------|---------------|------------------------|--------------------------|\n\
      | `tests/test_parse_cfg.py` | **`parse_cfg`** \u2013 parsing `setup.cfg` for\
      \ plain package names | - Handles `[options]` and `[options.extras_require]`\
      \ sections<br>- Correctly parses multi\u2011line values<br>- Strips version\
      \ specifiers and whitespace<br>- Preserves order of appearance (setup \u2192\
      \ install \u2192 extras) | - Feature: `parse_cfg` returns an iterable of requirement\
      \ objects with `.name` containing only the package name.<br>- Supported sections:\
      \ `setup_requires`, `install_requires`, any extras under `[options.extras_require]`.<br>-\
      \ Behavior: version constraints are ignored; original order is kept. |\n| `tests/test_pytz.py`\
      \ | **`get_pypi_versions`** \u2013 async retrieval of PyPI version data | -\
      \ Executes an asynchronous request via `get_session`.<br>- Confirms the function\
      \ completes without raising errors for the real package **`pytz`**.<br>- Serves\
      \ as a smoke\u2011test for the async fetching pipeline. | - Provides a concrete\
      \ example that the project's async utilities can query PyPI successfully.<br>-\
      \ Running this test validates network access and proper setup of `pytest\u2011\
      asyncio` (or equivalent).<br>- Suggests future enhancements: add assertions\
      \ on returned data and parameterize across multiple packages. |\n\n### Common\
      \ Themes Across Tests\n- **Reliance on Async Utilities**: `test_pytz.py` demonstrates\
      \ the asynchronous architecture used for PyPI queries.\n- **Emphasis on Clean\
      \ Dependency Extraction**: `test_parse_cfg.py` ensures that dependency parsing\
      \ isolates package names, a core requirement for the project's outdated\u2011\
      package analysis.\n- **Minimal Assertions in Smoke Tests**: Some tests (e.g.,\
      \ `test_pytz.py`) verify successful execution rather than detailed output, encouraging\
      \ developers to add richer checks over time.\n\n### Recommendations for User\u2011\
      Facing Documentation\n1. **Explain the Role of the Empty `__init__.py`** \u2013\
      \ Emphasize that it intentionally creates a test package and can host shared\
      \ fixtures later.\n2. **Highlight Core Tested Features**  \n   - *Dependency\
      \ parsing*: `parse_cfg` reads `setup.cfg` and yields clean package names, ignoring\
      \ version constraints.  \n   - *Async PyPI querying*: `get_pypi_versions` works\
      \ with real packages like `pytz`, confirming network\u2011enabled functionality.\n\
      3. **Provide Guidance on Running the Suite**  \n   - Basic command: `python\
      \ -m pytest` (or simply `pytest` if the async plugin is installed).  \n   -\
      \ Mention additional flags for async tests if needed (e.g., `-m asyncio`).\n\
      4. **Encourage Extending Tests**  \n   - Add assertions to verify output structures.\
