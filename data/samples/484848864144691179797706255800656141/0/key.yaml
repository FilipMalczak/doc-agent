"### Important Implementation Notes for Documentation Authors\n- **Error Handling**\
  \ \u2013 The functions gracefully return empty/`None` results instead of raising;\
  \ this simplifies downstream reporting.\n- **Version Filtering** \u2013 Only stable\
  \ releases are considered; prereleases are deliberately excluded, matching typical\
  \ user expectations for \u201Clatest stable\u201D.\n- **Naming Normalization** \u2013\
  \ Uses `canonicalize_name` to ensure the package name matches PyPI\u2019s canonical\
  \ format (e.g., case\u2011insensitive, hyphens vs. underscores).\n- **Extensibility**\
  \ \u2013 The module is deliberately small and pure\u2011async; it can be reused\
  \ in other tools that need to compare local installations against PyPI without blocking.\n\
  \n---\n"
