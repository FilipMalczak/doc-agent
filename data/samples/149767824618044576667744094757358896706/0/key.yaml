  \    module.\n  fact: In document with ID f9275b32-c38a-5f7e-b2c4-6196d2e25f73,\
  \ the 'console_scripts'\n    entry in options.entry_points defines a command 'pip-outdated'\
  \ that points to\n    pip_outdated:main\n- explanation: The vpip section in setup.cfg\
  \ provides a fallback command for running\n    the package as 'python cute.py'.\n\
  \  fact: In document with ID f9275b32-c38a-5f7e-b2c4-6196d2e25f73, the 'vpip' section\n\
