  \ the 'license' for\n    pip-outdated is specified as MIT\n- explanation: The setup.cfg\
  \ references an external file, README.rst, as the source\n    for long_description.\n\
  \  fact: In document with ID f9275b32-c38a-5f7e-b2c4-6196d2e25f73, the 'long_description'\n\
  \    for pip-outdated is obtained from the README.rst file\n- explanation: The setup.cfg\
