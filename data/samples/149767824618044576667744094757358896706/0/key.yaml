  - explanation: The options section of setup.cfg specifies that pip-outdated is zip-safe.\n\
  \  fact: In document with ID f9275b32-c38a-5f7e-b2c4-6196d2e25f73, 'zip_safe' is\
  \ set\n    to True in pip-outdated's options\n- explanation: The options section\
  \ instructs setup.cfg to find and include packages\n    for pip-outdated.\n  fact:\
  \ In document with ID f9275b32-c38a-5f7e-b2c4-6196d2e25f73, 'packages' in pip-outdated's\n\
  \    options are determined by a 'find' command\n- explanation: The setup.cfg lists\
