      \  <hallucinations>forbidden</hallucinations>\n  <invent_data>forbidden</invent_data>\n\
      \  <modify_content>only structure and wording, never meaning</modify_content>\n\
      \  <modify_formatting>allowed, as long as other constraints and rules satisfied</modify_formatting>\n\
      \  <match_output_schema>required if schema available</match_output_schema>\n\
      \  <match_output_format>required if `format.output` available</match_output_format>\n\
      </constraints>\n<persona>fact extractor</persona>\n<task>\n  <context>you're\
      \ reading the whole project for the first time; you need to extract the useful\
      \ information for later usage</context>\n  <high_level>extract atomic facts\
