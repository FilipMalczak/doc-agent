"- **Project name**: `pip-outdated` \u2013 a command\u2011line tool that scans `requirements.txt`\
  \ or `setup.cfg` files and reports missing, outdated, or incompatible packages with\
  \ a colored table.  \n\n- **Target audience**: End\u2011users who need an easy way\
  \ to verify that the dependencies declared in their project files are up to date,\
  \ beyond what `pip list --outdated` offers.  \n\n- **Installation (maintainer note)**:\
  \  \n  - Distribute via PyPI; users install with `pip install pip-outdated`.  \n\
  \  - No external system dependencies required.  \n\n- **Primary command syntax**:\
  \  \n\n  ```text\n  pip-outdated [-h] [-v] [-q] [<file> [<file> ...]]\n  ```  \n\
  \n  - **Positional `<file>`**: one or more dependency files (supports glob patterns).\
  \  \n    - Default files: `requirements.txt`, `setup.cfg`.  \n    - Example: `pip-outdated\
  \ *-requirements.txt` scans all files matching the pattern.  \n    - Example: `pip-outdated\
  \ requirements/*.txt` scans every file in a `requirements/` directory.  \n\n- **Options\
  \ for end\u2011users**:  \n  - `-h, --help` \u2013 show help.  \n  - `-v, --verbose`\
  \ \u2013 enable verbose output (default: off).  \n  - `-q, --quiet` \u2013 suppress\
  \ exit code\u202F1 when some dependencies are outdated (default: off).  \n\n- **Behavior\
  \ details useful for documentation**:  \n  - Returns exit code\u202F1 when any dependency\
  \ is not up to date, unless `--quiet` is supplied.  \n  - Prints a colored table\
  \ summarizing status of each dependency.  \n  - Handles version specifiers from\
  \ `requirements.txt` / `setup.cfg`; for a simple list of updatable packages, users\
  \ can fall back to `pip list --outdated`.  \n\n- **Continuous\u2011integration badges**\
  \ (include in README for visibility):  \n  - Travis CI build status badge.  \n \
  \ - Codecov coverage badge.  \n\n- **Changelog highlights for maintainers** (to\
  \ keep documentation current):  \n  - **0.8.0 (Aug\u202F9\u202F2025)** \u2013 removed\
  \ `setuptools` dependency; now uses `configparse` for `setup.cfg`.  \n  - **0.7.0\
  \ (Aug\u202F13\u202F2024)** \u2013 ignored `InvalidVersion` errors.  \n  - **0.6.0\
  \ (Jan\u202F1\u202F2023)** \u2013 fetched package versions via `pip` CLI for correct\
  \ venv handling; dropped `cchardet`.  \n  - **0.5.0 (Jan\u202F12\u202F2022)** \u2013\
  \ added type hints.  \n  - **0.4.0 (Jan\u202F30\u202F2020)** \u2013 bumped minimum\
  \ Python to\u202F3.7; added parallel requests and `--quiet` option.  \n  - **0.3.0\
  \ (Oct\u202F13\u202F2019)** \u2013 changed exit\u2011code behavior to non\u2011\
  zero on failures; added `setup_requires` and `extras_require` checks; disabled prerelease\
  \ checks.  \n\n- **Open TODOs (future documentation updates)**:  \n  - Add command\u2011\
  line options to automatically update packages.  \n  - Add options to modify `requirements.txt`\
  \ / `setup.cfg` in place.  \n  - Add a global\u2011list option (e.g., `-g, --global`)\
  \ to list *all* packages, not just those declared in files.  \n\n- **Key maintainer\
  \ responsibility**: Ensure the README stays synchronized with the latest release\
  \ notes, CI badge URLs, and the supported Python versions (currently \u2265\u202F\
  3.7). Include clear installation and usage examples, and note the effect of the\
  \ `--quiet` flag on exit codes for CI pipelines.  "
