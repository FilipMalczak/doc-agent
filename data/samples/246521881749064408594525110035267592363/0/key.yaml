"# Project\u2011Level Documentation \u2013 **pip\u2011outdated**\n## 1. Quick Project\
  \ Summary\n## 2. Installation\n## 3. Command\u2011Line Interface (CLI)\n```bash\n\
  pip-outdated [options] [<file> ...]\n```\n### Options\n- `-v, --verbose` \u2013\
  \ Enable verbose output (extra diagnostic prints).\n- `-q, --quiet`   \u2013 Suppress\
  \ the non\u2011zero exit status when outdated packages are found (useful for CI\
  \ pipelines).\n\n### File arguments\n- Zero or more positional arguments. If none\
  \ are supplied the tool uses the default list `['requirements.txt', 'setup.cfg']`.\n\
  - Glob patterns are allowed (e.g., `requirements/*.txt`).\n\n### Behaviour Summary\n\
  1. **Locate requirements** via `pip_outdated.find_require.find_require`.\n2. **Check\
  \ each requirement** asynchronously with `pip_outdated.check_outdated.check_outdated`.\n\
  3. **Display results** using a colour\u2011coded ASCII table (`pip_outdated.print_outdated`).\n\
  4. **Exit code**: `0` when everything is up\u2011to\u2011date **or** `--quiet` is\
  \ set; otherwise `1`.\n\n---\n"
