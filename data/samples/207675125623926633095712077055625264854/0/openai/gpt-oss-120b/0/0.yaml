- content: "## Project Overview  \n\n- **Goal** \u2013 Locate and parse Python package\
    \ requirements from various file types (e.g., `requirements.txt`, `setup.cfg`).\
    \  \n- **Reference** \u2013 Implements the [pip requirements file format](https://pip.pypa.io/en/stable/reference/pip_install/#requirements-file-format).\
    \  \n\n## Core Modules & Functions  \n\n| Function | Description | Return |\n\
    |----------|-------------|--------|\n| `iter_files(patterns)` | Accepts a list\
    \ of glob patterns or file paths and yields a `pathlib.Path` object for each matching\
    \ file. Handles both explicit files and pattern\u2011based searches. | Generator\
    \ of `Path` objects |\n| `file_to_lines(file)` | Opens a file (UTF\u20118) and\
    \ streams its lines through `parse_lines`. Shows a debug message when `verbose()`\
    \ is `True`. | Generator of processed lines |\n| `parse_lines(lines)` | Normalises\
    \ raw lines: removes comments (`# \u2026`), concatenates line continuations (`\\\
    \\`), and strips trailing new\u2011lines. | Generator of cleaned strings |\n|\
    \ `parse_requirements(file)` | Reads a file, cleans each line with `parse_lines`,\
    \ converts it to a `Requirement` object via `parse_require`, and yields only successful\
    \ parses. | Generator of `Requirement` objects |\n| `parse_requirements_text(text)`\
    \ | Same as `parse_requirements` but works on an in\u2011memory string (useful\
    \ for cfg values). | Generator of `Requirement` objects |\n| `parse_cfg(file)`\
    \ | Parses a `setup.cfg` (or any INI\u2011style) file: extracts `setup_requires`,\
    \ `install_requires`, and all `extras_require` entries, then feeds each block\
    \ through `parse_requirements_text`. | Generator of `Requirement` objects |\n\
    | `find_require(files)` | High\u2011level entry point: iterates over supplied\
    \ file patterns, selects the appropriate parser (`parse_cfg` for `.cfg` files,\
    \ otherwise `parse_requirements`), and yields every discovered requirement. |\
    \ Generator of `Requirement` objects |\n| `parse_require(text)` | Strips any trailing\
    \ pip options (e.g., `--no-binary`) from a requirement line, attempts to build\
    \ a `packaging.requirements.Requirement` instance, and returns `None` on failure.\
    \ | `Requirement` or `None` |\n\n## How the Parser Works  \n\n1. **File Discovery**\
    \ \u2013 `iter_files` expands each input pattern.  \n2. **Line Normalisation**\
    \ \u2013 `parse_lines` removes comments, joins continuation lines, and strips\
    \ line\u2011endings.  \n3. **Option Stripping** \u2013 `parse_require` discards\
    \ any command\u2011line style options (`--something` or `-s`) that may follow\
    \ a requirement specifier.  \n4. **Requirement Construction** \u2013 Uses `packaging.requirements.Requirement`\
    \ which validates PEP\u202F508 syntax. Invalid lines are silently ignored (returned\
    \ as `None`).  \n\n## Typical Usage  \n\n```python\nfrom pip_outdated.find_require\
    \ import find_require\n\n# Example: find all requirements in the current directory\n\
    for req in find_require([\"requirements.txt\", \"setup.cfg\", \"src/*.txt\"]):\n\
    \    print(req)          # -> Requirement object, e.g. \"requests>=2.25\"\n```\n\
    \n- Pass a list of file paths or glob patterns to `find_require`.  \n- The function\
    \ yields `Requirement` objects that can be inspected (`.name`, `.specifier`, `.extras`,\
    \ etc.).  \n\n## Supported File Types  \n\n- **Plain requirement files** (`.txt`,\
    \ `.pip`, any file without `.cfg` suffix).  \n- **`setup.cfg`** (INI format) \u2013\
    \ extracts sections:  \n\n  - `options.setup_requires`  \n  - `options.install_requires`\
    \  \n  - All entries under `options.extras_require`  \n\n## Edge Cases & Limitations\
    \  \n\n- **Comments** \u2013 Only `#` that start a comment after optional whitespace\
    \ are stripped. Inline `#` inside a URL (e.g., `git+https://example.com#egg=pkg`)\
    \ may be incorrectly truncated.  \n- **Continuation Lines** \u2013 Only a backslash\
    \ (`\\`) followed by a newline is treated as a line continuation. Other whitespace\u2011\
    based continuations are not supported.  \n- **Option Parsing** \u2013 The regex\
    \ `r\"(.*?)\\s--?[a-z]\"` removes anything from the first whitespace before an\
    \ option flag. Complex option syntax (e.g., `--hash=sha256:...`) may cause premature\
    \ truncation.  \n- **Invalid Requirements** \u2013 Lines that cannot be parsed\
    \ into a `Requirement` are silently dropped; no error is raised.  \n\n## Configuration\
    \ & Debugging  \n\n- **Verbose Mode** \u2013 The helper `verbose()` (imported\
    \ from `.verbose`) controls whether each file being parsed is printed to stdout.\
    \ Enable it in your environment to trace parsing activity.  \n\n## Dependencies\
    \  \n\n- `packaging` \u2013 Provides the `Requirement` and validation logic. \
    \ \n- Standard library modules: `collections.abc`, `configparser`, `pathlib`,\
    \ `re`.  \n\n## Extensibility  \n\n- To support additional file formats (e.g.,\
    \ `pyproject.toml`), add a new branch in `find_require` that selects an appropriate\
    \ parser and yields `Requirement` objects in the same way.  \n- Custom comment\
    \ or continuation handling can be introduced by modifying `parse_lines`.  \n\n\
    ---  \n\n*These notes capture the essential functionality and usage patterns of\
    \ `pip_outdated/find_require.py` and are intended to aid the authoring of user\u2011\
    focused documentation.*"
