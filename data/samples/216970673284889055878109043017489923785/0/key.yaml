  - content: "<list>\n    <item index=\"0\">\n    <subject_path>README.rst</subject_path>\n\
      \    <subject_type>file</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n## pip-outdated \u2013 Quick Reference\n\n### Overview\n- **Purpose**:\
      \ Detect outdated, missing, or incompatible dependencies listed in `requirements.txt`\
      \ or `setup.cfg`.\n- **Output**: Shows a table with color\u2011coded status\
      \ for each dependency.\n- **Note**: For a simple list of updatable packages\
      \ you can also run `pip list --outdated`.\n\n---\n### Installation\n```bash\n\
      pip install pip-outdated\n```\n\n---\n### Usage\n```bash\npip-outdated [options]\
      \ [<file> ...]\n```\n- **Positional arguments** \u2013 one or more requirement\
      \ files (supports glob patterns). Default: `['requirements.txt', 'setup.cfg']`.\n\
      - **Options**\n  - `-h`, `--help` \u2013 Show help message and exit.\n  - `-v`,\
      \ `--verbose` \u2013 Print verbose information (default: `false`).\n  - `-q`,\
      \ `--quiet` \u2013 Do **not** return exit code\u202F1 when everything is up\u2011\
      to\u2011date (default: `false`).\n\n#### Example commands\n- Check multiple\
      \ files (e.g., `test-requirements.txt` and `dev-requirements.txt`):\n  ```bash\n\
      \  pip-outdated *-requirements.txt\n  ```\n- Check all files in a folder:\n\
      \  ```bash\n  pip-outdated requirements/*.txt\n  ```\n\n---\n### TODO (planned\
      \ features)\n- Add an option to automatically update the package.\n- Add an\
      \ option to update the `requirements.txt` / `setup.cfg` file.\n- Add a global\
      \ list option (e.g., `-g, --global`).\n\n---\n### Changelog (selected)\n- **0.8.0**\
      \ (2025\u201108\u201109) \u2013 Dropped `setuptools` dependency; switched to\
      \ `configparse` for reading `setup.cfg`.\n- **0.7.0** (2024\u201108\u201113)\
      \ \u2013 Ignored `InvalidVersion` errors.\n- **0.6.0** (2023\u201101\u201101)\
      \ \u2013 Fetch package versions via the `pip` CLI (supports virtual\u2011env\
      \ versions); removed `cchardet`.\n- **0.5.0** (2022\u201101\u201112) \u2013\
      \ Added type hints; bumped dependencies.\n- **0.4.0** (2020\u201101\u201130)\
      \ \u2013 **Breaking:** Python\u202F\u2265\u202F3.7 required; added parallel\
      \ requests and `--quiet`.\n- **0.3.0** (2019\u201110\u201113) \u2013 **Breaking:**\
      \ non\u2011zero exit code when any dependency is outdated; stopped checking\
      \ prereleases; added `setup_requires` & `extras_require` handling.\n- **0.2.0**\
      \ (2019\u201102\u201110) \u2013 Updated core dependencies (colorama, packaging,\
      \ requests, termcolor, terminaltables).\n- **0.1.0** (2018\u201105\u201112)\
      \ \u2013 Initial release.\n\n---\n### Quick Start Checklist for Users\n1. **Install**\
      \ the tool (`pip install pip-outdated`).\n2. **Run** it in your project root\
      \ (or specify files):\n   - `pip-outdated` \u2013 checks default files.\n  \
      \ - `pip-outdated *-requirements.txt` \u2013 custom pattern.\n   - `pip-outdated\
      \ requirements/*.txt` \u2013 folder scan.\n3. **Interpret** the table:\n   -\
      \ **Green** \u2192 up\u2011to\u2011date.\n   - **Yellow** \u2192 newer version\
      \ available.\n   - **Red** \u2192 version specifier is not satisfied or package\
      \ missing.\n4. **Optional**: Use `-q` to suppress non\u2011zero exit status,\
      \ or `-v` for more details.\n\n---\n### References\n- PyPI: <https://pypi.org/project/pip-outdated/>\n\
      - CI status: <https://travis-ci.com/eight04/pip-outdated>\n- Test coverage:\
      \ <https://codecov.io/gh/eight04/pip-outdated>\n\n    </content>\n    </item>\n\
      \    <item index=\"1\">\n    <subject_path>pip_outdated</subject_path>\n   \
      \ <subject_type>directory</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n## `pip_outdated` \u2013 Directory\u2011Level Documentation\
      \ Notes\n\n*Compiled from the individual file\u2011level notes for the package\u2019\
      s source files.*\n\n---\n\n### 1. Project Overview\n- **Package name**: `pip-outdated`\
      \ (version\u202F0.8.0).\n- **Purpose**: Command\u2011line utility that scans\
      \ a project's dependency files (`requirements.txt`, `setup.cfg`, or any glob\u2011\
      matched file) and reports which packages are outdated compared with the latest\
      \ versions on PyPI.\n- **Primary entry points**:\n  - **Console script** \u2013\
      \ defined in `pip_outdated/__init__.py` (`main()` function).\n  - **`python\
      \ -m pip_outdated`** \u2013 provided by `pip_outdated/__main__.py` which simply\
      \ imports and calls the same `main()`.\n\n---\n\n### 2. Command\u2011Line Interface\
      \ (CLI)\n- **Usage**: ```bash\\n  pip-outdated [options] [<file> ...]\\n```\
      \ \n- **Options** (parsed in `parse_args()`):\n  - `-v, --verbose` \u2013 enable\
      \ verbose output.\n  - `-q, --quiet`   \u2013 suppress the non\u2011zero exit\
      \ status when outdated packages are found.\n- **File arguments**:\n  - Zero\
      \ or more positional arguments.\n  - Default list [\"requirements.txt\", \"\
      setup.cfg\"] is used when none are supplied.\n  - Globbing is supported (e.g.,\
      \ \"requirements/*.txt\").\n- **Behaviour**:\n  - Finds all requirements via\
      \ `find_require`.\n  - Checks each requirement asynchronously with `check_outdated`.\n\
      \  - Displays results with `print_outdated`.\n  - Returns exit code **0** if\
      \ everything is up\u2011to\u2011date or `--quiet` is set; otherwise **1**.\n\
      \n---\n\n### 3. Core Modules & Their Responsibilities\n| Module | Key Responsibilities\
      \ | Notable Functions / Classes |\n|--------|----------------------|------------------------------|\n\
      | `__init__.py` | Defines the CLI entry point (`main`, `_main`) and argument\
      \ parsing. | `parse_args()`, `main()`, `_main()` (async) |\n| `__main__.py`\
      \ | Allows execution via `python -m pip_outdated`. | Guarded import of `main`\
      \ and `main()` call |\n| `find_require.py` | Locates and parses requirement\
      \ specifications from files and `setup.cfg`. | `find_require()`, `iter_files()`,\
      \ `parse_requirements*()`, `parse_cfg()`, `parse_require()` |\n| `check_outdated.py`\
      \ | Performs the asynchronous version checks against PyPI. | `OutdateResult`\
      \ dataclass, `get_local_version()`, `get_pypi_versions()`, `check_outdated()`\
      \ |\n| `print_outdated.py` | Formats and prints a colour\u2011coded ASCII table\
      \ of outdated packages. | `make_row()`, `print_outdated()` |\n| `session.py`\
      \ | Provides a pre\u2011configured `aiohttp.ClientSession` for HTTP requests.\
      \ | `get_session()` |\n| `verbose.py` | Global flag handling for verbose mode.\
      \ | `set_verbose()`, `verbose()` |\n\n---\n\n### 4. Detailed Module Highlights\n\
      #### `find_require.py`\n- Supports both plain requirements files and `setup.cfg`.\n\
      - Handles comments (`#`) and line continuations (`\\\\`).\n- Strips command\u2011\
      line style options before creating `packaging.Requirement` objects.\n- Silently\
      \ ignores invalid lines.\n\n#### `check_outdated.py`\n- Uses `canonicalize_name`\
      \ to match PyPI naming.\n- `OutdateResult` captures:\n  - Original requirement,\
      \ local version, all PyPI versions, newest version satisfying the specifier\
      \ (`wanted`), and absolute latest (`latest`).\n- Provides helper properties\
      \ (`install_not_found`, `outdated`, etc.) for easy status checks.\n- Retrieves\
      \ local version via `pip show` subprocess; fetches PyPI data via `aiohttp`.\n\
      - Verbose flag toggles per\u2011package diagnostic prints.\n\n#### `print_outdated.py`\n\
      - Initializes `colorama` for cross\u2011platform colour support.\n- Builds an\
      \ ASCII table (`terminaltables.AsciiTable`).\n- Colour logic:\n  - **Red** \u2013\
      \ missing, unavailable, or outdated.\n  - **Green** \u2013 updatable.\n- Prints\
      \ a legend, the table, and exits with status\u202F1 unless `quiet` is true.\n\
      - Handles three terminal states: no requirements, everything up\u2011to\u2011\
      date, or some packages outdated.\n\n#### `session.py`\n- Returns a fresh `aiohttp.ClientSession`\
      \ each call.\n- Sets default `User-Agent: pip-outdated`.\n- Limits concurrent\
      \ connections to 5 via `TCPConnector`.\n\n#### `verbose.py`\n- Simple module\u2011\
      level storage of a global `VERBOSE` flag.\n- Functions `set_verbose(bool)` and\
      \ `verbose()` access or modify the flag.\n- Not thread\u2011safe \u2013 intended\
      \ for single\u2011threaded CLI usage.\n\n---\n\n### 5. Extensibility Points\
      \ (where developers might add features)\n- **New input formats** \u2013 extend\
      \ `find_require` with additional parsers.\n- **Alternative output formats**\
      \ \u2013 replace or augment `print_outdated` (e.g., JSON, HTML).\n- **Different\
      \ version sources** \u2013 modify `check_outdated` to query private indexes\
      \ or use alternative resolution strategies.\n- **Session configuration** \u2013\
      \ expose parameters in `session.get_session` (timeout, proxy, etc.) or implement\
      \ session reuse.\n- **Verbosity handling** \u2013 enhance `verbose` module for\
      \ thread safety or hierarchical logging.\n\n---\n\n### 6. User\u2011Facing Behaviour\
      \ Summary\n- Run the tool directly (`pip-outdated`) or via `python -m pip_outdated`.\n\
      - By default it checks `requirements.txt` and `setup.cfg`.\n- Use `-v/--verbose`\
      \ for detailed processing logs.\n- Use `-q/--quiet` to avoid a failing exit\
      \ status in CI pipelines.\n- Output is a colour\u2011coded table; red entries\
      \ indicate problems, green entries show upgrades.\n- Exit code **1** signals\
      \ at least one upgrade is available (unless `--quiet`).\n\n---\n\n### 7. Quick\
      \ Reference Cheat\u2011Sheet\n```bash\n# Basic run (default files)\npip-outdated\n\
      \n# Specify custom files or glob patterns\npip-outdated requirements/dev/*.txt\n\
      \n# Verbose mode\npip-outdated -v\n\n# Quiet mode for CI (non\u2011zero exit\
      \ suppressed)\npip-outdated -q\n```\n\n---\n\n*These directory\u2011level notes\
      \ gather the essential information needed to write user\u2011facing documentation,\
      \ README sections, or a quick\u2011start guide for the `pip_outdated` project.*\n\
      \    </content>\n    </item>\n    <item index=\"2\">\n    <subject_path>setup.cfg</subject_path>\n\
      \    <subject_type>file</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n# Project Notes: **pip-outdated** (from `setup.cfg`)\n\n## Overview\n\
      - **Name**: `pip-outdated`\n- **Version**: `0.8.0`\n- **Purpose**: Finds outdated\
      \ dependencies in `requirements.txt` or `setup.cfg` files.\n- **Author**: `eight`\
      \ (email: `eight04@gmail.com`)\n- **License**: MIT\n- **Homepage / Repository**:\
      \ <https://github.com/eight04/pip-outdated>\n- **Long description**: Sourced\
      \ from `README.rst` (specified via `long_description = file: README.rst`).\n\
      \n## Classification (PyPI classifiers)\n- Development Status :: 4 - Beta\n-\
      \ Environment :: Console\n- Intended Audience :: Developers\n- Programming Language\
      \ :: Python :: 3.7\n- Topic :: Software Development :: Build Tools\n\n## Keywords\n\
      - `pip`\n- `check`\n- `outdate`\n- `npm`\n\n## Packaging Details\n- Packages\
      \ are discovered automatically (`packages = find:`) with the `tests` directory\
      \ excluded.\n- The distribution is zip\u2011safe (`zip_safe = True`).\n\n##\
      \ Runtime Dependencies\n| Package | Version Specifier |\n|--------|------------------|\n\
      | aiohttp | `~=3.12` |\n| colorama | `~=0.4.6` |\n| packaging | `~=25.0` |\n\
      | termcolor | `~=3.1` |\n| terminaltables | `~=3.1` |\n\n## Command\u2011Line\
      \ Interface\n- **Console script**: `pip-outdated`\n  - Entry point defined as\
      \ `pip_outdated:main`.\n  - Installing the package adds the `pip-outdated` command\
      \ to the user's PATH.\n\n## Additional Configuration (`[vpip]` section)\n- **`command_fallback`**:\
      \ `python cute.py`\n  - Provides a fallback command that can be invoked by the\
      \ `vpip` tool (if such a tool is used in the ecosystem).\n\n---\n### Points\
      \ for User\u2011Facing Documentation\n1. **Installation**\n   - Use `pip install\
      \ pip-outdated` (the package pulls in the listed dependencies automatically).\n\
      2. **Running the Tool**\n   - After installation, execute `pip-outdated` in\
      \ a terminal to scan the current directory's `requirements.txt` or `setup.cfg`\
      \ for outdated packages.\n3. **Configuration**\n   - Users can customize behavior\
      \ via the optional `[vpip]` section in their own `setup.cfg` files, e.g., setting\
      \ a different `command_fallback`.\n4. **Supported Python Versions**\n   - Declared\
      \ compatibility with Python 3.7 (the classifier suggests this is the minimum\
      \ supported version).\n5. **Contribution & Issues**\n   - Contributions, bug\
      \ reports, and feature requests should be directed to the GitHub repository\
      \ linked above.\n\nThese notes capture all metadata and configuration details\
      \ needed to draft comprehensive user documentation for the **pip\u2011outdated**\
      \ project.\n    </content>\n    </item>\n    <item index=\"3\">\n    <subject_path>setup.py</subject_path>\n\
      \    <subject_type>file</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n## Project Configuration \u2013 `setup.py`\n\n**File path:**\
      \ `setup.py`  \n**Language:** Python  \n\n### What the file currently does\n\
      - Imports the `setup` function from **setuptools**.\n- Calls `setup()` with\
      \ **no arguments**, meaning the package metadata and configuration are currently\
      \ empty.\n\n### Why this matters to the user\n- `setup.py` is the traditional\
      \ entry point for building, distributing, and installing a Python package.\n\
      - Without supplied arguments, tools like `pip install .` or `python setup.py\
      \ sdist` will not produce a usable distribution because essential metadata (name,\
      \ version, packages, etc.) is missing.\n\n### Immediate actions the user should\
      \ take\n- **Add required metadata** to the `setup()` call, for example:\n  ```python\n\
      \  setup(\n      name=\"your-package-name\",\n      version=\"0.1.0\",\n   \
      \   description=\"A short description of the project\",\n      author=\"Your\
      \ Name\",\n      author_email=\"you@example.com\",\n      url=\"https://github.com/your/repo\"\
      ,\n      packages=find_packages(),\n      install_requires=[\n          # list\
      \ runtime dependencies here, e.g. \"requests>=2.0\"\n      ],\n      python_requires=\"\
      >=3.8\",\n  )\n  ```\n- **Import helpers** as needed:\n  - `from setuptools\
      \ import find_packages` if using `find_packages()`.\n  - Any other setuptools\
      \ extensions (e.g., `entry_points`) for command\u2011line tools.\n\n### Common\
      \ fields to consider adding\n- `long_description` (often read from a `README.md`\
      \ or `README.rst`).\n- `long_description_content_type` (e.g., \"text/markdown\"\
      ).\n- `license` (e.g., \"MIT\").\n- `classifiers` (list of trove classifiers\
      \ indicating development status, supported Python versions, etc.).\n- `extras_require`\
      \ for optional dependency groups (e.g., testing, docs).\n\n### Typical workflow\
      \ after completing `setup.py`\n1. **Build the distribution**  \n   ```bash\n\
      \   python -m build\n   ```\n2. **Test installation locally**  \n   ```bash\n\
      \   pip install .\n   ```\n3. **Upload to PyPI** (if publishing)  \n   ```bash\n\
      \   twine upload dist/*\n   ```\n\n### Recommendations\n- Keep `setup.cfg` or\
      \ `pyproject.toml` for static metadata where possible; they can reduce the amount\
      \ of code needed in `setup.py`.\n- Pin versions of critical dependencies to\
      \ avoid accidental breakage.\n- Include a `README` and a `LICENSE` file in the\
      \ repository root; they can be referenced from `setup()`.\n\n---  \n\n*These\
      \ notes capture the current state of `setup.py` and outline the steps a user\
      \ should follow to turn it into a functional package configuration.*\n    </content>\n\
      \    </item>\n    <item index=\"4\">\n    <subject_path>tests</subject_path>\n\
      \    <subject_type>directory</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n# Directory\u2011Level Documentation: `tests`\n\n## Purpose\
      \ of the `tests` Package\n- Provides a **pytest\u2011compatible test suite**\
      \ for the `pip_outdated` project.\n- The presence of an ``__init__.py`` file\
      \ marks the directory as a Python package, allowing test modules to be imported\
      \ via package syntax.\n\n## Overview of Test Files\n| File | Primary Focus |\
      \ Key Take\u2011aways |\n|------|---------------|----------------|\n| `tests/__init__.py`\
      \ | Package marker | Empty file; its sole role is to make `tests` importable.\
      \ |\n| `tests/test_parse_cfg.py` | Unit test for `parse_cfg` (in `pip_outdated.find_require`)\
      \ | Verifies that `parse_cfg` correctly extracts **package names** from a `setup.cfg`\
      \ file, handling `setup_requires`, `install_requires`, and any `extras_require`\
      \ sections. Version specifiers are stripped and the original order is preserved.\
      \ |\n| `tests/test_pytz.py` | Async integration test for PyPI lookup | Uses\
      \ `pytest\u2011asyncio` to ensure `get_pypi_versions` can fetch version data\
      \ for the `pytz` package via an async HTTP session (`get_session`). Passes if\
      \ no exception is raised. |\n\n## Common Testing Patterns\n- **pytest** is the\
      \ test runner throughout the suite.\n- **`tmp_path` fixture** (in `test_parse_cfg.py`)\
      \ is used to create temporary configuration files on\u2011the\u2011fly.\n- **Async\
      \ tests** are enabled with the `pytest\u2011asyncio` plugin and the `@pytest.mark.asyncio`\
      \ decorator (see `test_pytz.py`).\n- Tests focus on **behavioural verification**\
      \ rather than exhaustive assertions; e.g., `test_pytz.py` succeeds if the network\
      \ call completes without error.\n\n## How to Run the Tests\n```bash\n# Install\
      \ test dependencies\npip install pytest pytest-asyncio\n\n# Install the package\
      \ in editable mode (optional but useful for development)\npip install -e .\n\
      \n# Execute the full test suite\npytest tests\n```\n- An internet connection\
      \ is required for `test_pytz.py` because it contacts PyPI.\n\n## Guidance for\
      \ Extending the Test Suite\n- **Adding new requirement\u2011parsing tests**:\
      \ emulate the structure of `test_parse_cfg.py` \u2013 create a temporary `setup.cfg`,\
      \ write the desired sections, invoke `parse_cfg`, and assert the extracted names.\n\
      - **Adding async PyPI tests**: follow the pattern in `test_pytz.py` \u2013 decorate\
      \ the async function with `@pytest.mark.asyncio`, open a session via `get_session()`,\
      \ call `get_pypi_versions` for the target package, and consider adding assertions\
      \ on the returned version list (e.g., non\u2011empty, valid semver strings).\n\
      \n## Documentation Use Cases\n- The notes above can be incorporated into **user\u2011\
      facing documentation** to explain:\n  - The role of the `tests` directory within\
      \ the project.\n  - How each test file validates core functionality of `pip_outdated`.\n\
      \  - Instructions for developers to run or extend the test suite.\n\n---\n*Compiled\
      \ from file\u2011level notes to provide a concise, high\u2011level overview\
      \ of the `tests` directory for documentation purposes.*\n    </content>\n  \
      \  </item>\n</list>"
