- content: "{\n  \"response\": \"# Project\u2011Level Documentation \u2013 **pip\u2011\
    outdated**\\n\\n---\\n\\n## 1. Quick Project Summary\\n- **Package name**: `pip-outdated`\
    \ (current version **0.8.0**).  \\n- **Purpose**: A command\u2011line utility\
    \ that scans a project's dependency files (`requirements.txt`, `setup.cfg`, or\
    \ any glob\u2011matched file) and reports which packages are outdated compared\
    \ with the latest versions on PyPI.\\n- **Primary entry point**: console script\
    \ `pip-outdated` (defined in `pip_outdated/__init__.py`).  \\n- **Supported Python**:\
    \ 3.7\u202F+ (minimum declared in the classifiers).\\n- **License**: MIT.\\n-\
    \ **Repository / Homepage**: <https://github.com/eight04/pip-outdated>.\\n\\n---\\\
    n\\n## 2. Installation\\n```bash\\npip install pip-outdated\\n```\\nThe package\
    \ pulls in the runtime dependencies listed in **setup.cfg**:\\n- `aiohttp~=3.12`\\\
    n- `colorama~=0.4.6`\\n- `packaging~=25.0`\\n- `termcolor~=3.1`\\n- `terminaltables~=3.1`\\\
    n\\n---\\n\\n## 3. Command\u2011Line Interface (CLI)\\n```bash\\npip-outdated\
    \ [options] [<file> ...]\\n```\\n### Options\\n- `-v, --verbose` \u2013 Enable\
    \ verbose output (extra diagnostic prints).\\n- `-q, --quiet`   \u2013 Suppress\
    \ the non\u2011zero exit status when outdated packages are found (useful for CI\
    \ pipelines).\\n\\n### File arguments\\n- Zero or more positional arguments. If\
    \ none are supplied the tool uses the default list `['requirements.txt', 'setup.cfg']`.\\\
    n- Glob patterns are allowed (e.g., `requirements/*.txt`).\\n\\n### Behaviour\
    \ Summary\\n1. **Locate requirements** via `pip_outdated.find_require.find_require`.\\\
    n2. **Check each requirement** asynchronously with `pip_outdated.check_outdated.check_outdated`.\\\
    n3. **Display results** using a colour\u2011coded ASCII table (`pip_outdated.print_outdated`).\\\
    n4. **Exit code**: `0` when everything is up\u2011to\u2011date **or** `--quiet`\
    \ is set; otherwise `1`.\\n\\n---\\n\\n## 4. Core Packages and Modules\\n| Module\
    \ | Role | Key Functions / Classes |\\n|--------|------|--------------------------|\\\
    n| `__init__.py` | CLI entry point (`main`, `_main`) and argument parsing (`parse_args`).\
    \ | `main()`, `_main()`, `parse_args()` |\\n| `__main__.py` | Enables `python\
    \ -m pip_outdated`. | imports and calls `main()` |\\n| `find_require.py` | Parses\
    \ requirement specifications from plain files and `setup.cfg`. | `find_require()`,\
    \ `parse_require*()`, `parse_cfg()` |\\n| `check_outdated.py` | Asynchronously\
    \ fetches local and PyPI versions, determines status. | `OutdateResult`, `check_outdated()`,\
    \ `get_local_version()`, `get_pypi_versions()` |\\n| `print_outdated.py` | Renders\
    \ the colour\u2011coded result table. | `make_row()`, `print_outdated()` |\\n|\
    \ `session.py` | Provides a pre\u2011configured `aiohttp.ClientSession`. | `get_session()`\
    \ |\\n| `verbose.py` | Global verbose flag handling. | `set_verbose()`, `verbose()`\
    \ |\\n\\n---\\n\\n## 5. Project Metadata (from `setup.cfg`)\\n```ini\\n[metadata]\\\
    nname = pip-outdated\\nversion = 0.8.0\\nauthor = eight\\nauthor_email = eight04@gmail.com\\\
    nlicense = MIT\\nurl = https://github.com/eight04/pip-outdated\\nlong_description\
    \ = file: README.rst\\nclassifiers =\\n    Development Status :: 4 - Beta\\n \
    \   Environment :: Console\\n    Intended Audience :: Developers\\n    Programming\
    \ Language :: Python :: 3.7\\n    Topic :: Software Development :: Build Tools\\\
    nkeywords = pip, check, outdate, npm\\n\\n[options]\\ninstall_requires =\\n  \
    \  aiohttp~=3.12\\n    colorama~=0.4.6\\n    packaging~=25.0\\n    termcolor~=3.1\\\
    n    terminaltables~=3.1\\nzip_safe = True\\n\\n[options.entry_points]\\nconsole_scripts\
    \ =\\n    pip-outdated = pip_outdated:main\\n\\n[vpip]\\ncommand_fallback = python\
    \ cute.py\\n```\\n- **Console script** `pip-outdated` maps directly to `pip_outdated:main`.\\\
    n- Optional `[vpip]` section provides a fallback command for the external *vpip*\
    \ tool.\\n\\n---\\n\\n## 6. Test Suite (directory `tests`)\\n- **Purpose**: validates\
    \ core functionality with **pytest** and **pytest\u2011asyncio**.\\n- **Key test\
    \ files**:\\n  - `tests/test_parse_cfg.py` \u2013 checks that `find_require.parse_cfg`\
    \ correctly extracts package names from a `setup.cfg` file, preserving order and\
    \ handling `setup_requires`, `install_requires`, and `extras_require`.\\n  - `tests/test_pytz.py`\
    \ \u2013 async integration test that ensures `check_outdated.get_pypi_versions`\
    \ can retrieve version data for the `pytz` package via an `aiohttp` session.\\\
    n- **Running the tests**:\\n  ```bash\\n  pip install pytest pytest-asyncio  \
    \ # test dependencies\\n  pip install -e .                     # optional editable\
    \ install\\n  pytest tests\\n  ```\\n- An active internet connection is required\
    \ for `test_pytz.py`.\\n- Adding new tests should follow the existing patterns:\
    \ use `tmp_path` for temporary files, decorate async tests with `@pytest.mark.asyncio`,\
    \ and focus on behavioural verification.\\n\\n---\\n\\n## 7. Development Note\
    \ \u2013 `setup.py`\\n- The repository contains a **bare `setup.py`** that calls\
    \ `setuptools.setup()` with no arguments.  \\n- All actual package metadata lives\
    \ in **`setup.cfg`**, which is the modern, declarative configuration format. \
    \ \\n- For developers who prefer a classic `setup.py`, the notes in the original\
    \ file suggest populating fields such as `name`, `version`, `description`, `author`,\
    \ `url`, `packages`, and `install_requires`.  \\n- However, for the current project\
    \ the empty `setup.py` is harmless because `pip` reads the configuration from\
    \ `setup.cfg`.\\n\\n---\\n\\n## 8. Changelog (selected entries)\\n- **0.8.0**\
    \ (2025\u201108\u201109) \u2013 Dropped `setuptools` dependency; switched to `configparse`\
    \ for reading `setup.cfg`.\\n- **0.7.0** (2024\u201108\u201113) \u2013 Ignored\
    \ `InvalidVersion` errors.\\n- **0.6.0** (2023\u201101\u201101) \u2013 Fetch package\
    \ versions via the `pip` CLI (supports virtual\u2011env versions); removed `cchardet`.\\\
    n- **0.5.0** (2022\u201101\u201112) \u2013 Added type hints; bumped dependencies.\\\
    n- **0.4.0** (2020\u201101\u201130) \u2013 **Breaking:** Python\u202F\u2265\u202F\
    3.7 required; added parallel requests and `--quiet`.\\n- **0.3.0** (2019\u2011\
    10\u201113) \u2013 **Breaking:** non\u2011zero exit code when any dependency is\
    \ outdated; stopped checking prereleases; added `setup_requires` & `extras_require`\
    \ handling.\\n\\n---\\n\\n## 9. Quick\u2011Start Cheat\u2011Sheet\\n```bash\\\
    n# Install the tool\\npip install pip-outdated\\n\\n# Run with default files (requirements.txt,\
    \ setup.cfg)\\npip-outdated\\n\\n# Run against custom patterns\\npip-outdated\
    \ requirements/dev/*.txt\\n\\n# Verbose mode for debugging\\npip-outdated -v\\\
    n\\n# Quiet mode \u2013 CI\u2011friendly (no failing exit status)\\npip-outdated\
    \ -q\\n```\\n\\n---\\n\\n## 10. References\\n- PyPI page: <https://pypi.org/project/pip-outdated/>\\\
    n- CI status (Travis CI): <https://travis-ci.com/eight04/pip-outdated>\\n- Test\
    \ coverage (Codecov): <https://codecov.io/gh/eight04/pip-outdated>\\n\\n---\\\
    n\\n*These compiled notes bring together the file\u2011level documentation for\
    \ `README.rst`, `setup.cfg`, `setup.py`, the `pip_outdated` package, and its test\
    \ suite, providing a ready\u2011to\u2011publish overview for users and contributors.*\"\
    \n}"
