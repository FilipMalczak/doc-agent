      \ resolves actual files via `iter_files`, and for each file yields requirements\
      \ parsed either by `parse_cfg` (if the file ends with `.cfg`) or by `parse_requirements`\
      \ (otherwise).**  \n  *Explanation: The function checks `file.suffix == \".cfg\"\
      ` to decide which parser to invoke and yields from the resulting generator.*\n\
      \n- **`parse_require(text)` strips any option flag (e.g., \u201C--no-binary\u201D\
      ) that follows a space and begins with a hyphen, then attempts to build a `Requirement`\
      \ object; it returns `None` if `InvalidRequirement` is raised.**  \n  *Explanation:\
      \ The regex `r\"(.*?)\\s--?[a-z]\"` captures the part before the option, the\
      \ code calls `Requirement(text)` inside a `try` block, and catches `InvalidRequirement`\
