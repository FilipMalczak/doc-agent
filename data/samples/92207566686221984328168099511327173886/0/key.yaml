  parts:
  - content: 'We need to extract atomic facts from this source file. Provide list
      with explanation why each is a fact. Must be self-contained, include details.
      We''ll output probably in markdown bullet list, each fact with explanation.
      Follow formatting rules: double quotes for strings, hyphen bullet points. Use
      yaml? Not required; we can just list bullets. Provide facts like module imports,
      purpose of functions, behavior, etc.


      Let''s craft facts:


      - The file defines utilities for finding Python package requirements from requirement
      files and setup.cfg.

      - It imports Iterable from collections.abc, ConfigParser, pathlib, re, Requirement
      and InvalidRequirement from packaging.requirements, and verbose from .verbose.

      - iter_files yields pathlib.Path objects for each pattern; if pattern is a file,
      yields that path; otherwise yields all paths matching pattern via glob in current
      directory.

      - file_to_lines reads a file, prints "Parse: {file}" when verbose() returns
      True, and yields lines processed by parse_lines.

      - parse_lines handles comments denoted by ''#'' and line continuation using
      backslash; it concatenates continued lines and strips newline characters.

      - parse_requirements iterates over lines from file_to_lines, parses each line
      via parse_require, yielding non-None Requirement objects.

      - parse_requirements_text does the same for a raw string, splitting into lines
      preserving line endings.

      - parse_cfg reads a .cfg file using ConfigParser, extracts ''setup_requires'',
      ''install_requires'', and extras_require sections under [options] and [options.extras_require],
      then parses each text block for Requirement objects.

      - find_require takes an iterable of file patterns, iterates over actual files
      using iter_files, and for each file, if its suffix is ".cfg" calls parse_cfg,
      otherwise calls parse_requirements; it yields all Requirement objects found.

      - parse_require removes any option flags (e.g., "--no-binary") by matching pattern
      "(.*?)\s--?[a-z]" and keeping the first group; then attempts to construct a
      packaging.requirements.Requirement; returns None if InvalidRequirement is raised.

      - The module documentation string states it deals with finding requirements
      and references pip''s requirements file format URL.

      - The functions treat lines ending with "\\" followed by newline as continuation
      and combine them.

      - The regex used in parse_lines to strip comments: r"(.*?)(^|\s)#".

      - The regex in parse_require to strip options: r"(.*?)\s--?[a-z]".


      We need to explain why each statement is a fact (i.e., derived from code). Provide
      maybe a bullet with fact and sub-bullet with justification? Might follow format:
      "- fact. Explanation: ...". Ensure double quotes for strings.


      Let''s produce output in markdown bullet list with each fact and brief justification.'
