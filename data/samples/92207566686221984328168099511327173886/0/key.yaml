      utf-8\"`, calls `verbose()` and prints if true, then `yield from parse_lines(f)`.*\n\
      \n- **`parse_lines(lines)` removes comments (text after a `#` preceded by whitespace\
      \ or start\u2011of\u2011line) and joins lines that end with a backslash\u2011\
      newline (`\\\\\\n`) into a single logical line.**  \n  *Explanation: The function\
      \ uses `re.match(r\"(.*?)(^|\\s)#\", line)` to cut off comments, checks `line.endswith(\"\
      \\\\\\n\")` to accumulate continuation text, and yields the assembled line without\
      \ the trailing newline.*\n\n- **`parse_requirements(file)` iterates over lines\
      \ produced by `file_to_lines`, parses each line with `parse_require`, and yields\
      \ only non\u2011`None` `Requirement` objects.**  \n  *Explanation: The loop\
      \ calls `parse_require(line)` and `if require: yield require`.*\n\n- **`parse_requirements_text(text)`\
      \ performs the same parsing logic as `parse_requirements` but operates on a\
