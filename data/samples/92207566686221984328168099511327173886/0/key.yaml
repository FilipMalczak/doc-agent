      \ is `r\"(.*?)(^|\\s)#`.**  \n  *Explanation: This pattern is compiled directly\
      \ in the `re.match` call inside `parse_lines`.*\n\n- **The option\u2011stripping\
      \ regex used in `parse_require` is `r\"(.*?)\\s--?[a-z]`.**  \n  *Explanation:\
      \ This pattern appears in the `re.match` call at the start of `parse_require`.*\n\
      \n- **Line continuation handling treats a line ending with a backslash followed\
