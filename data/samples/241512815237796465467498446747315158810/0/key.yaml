"**Project Component:** `pip_outdated/check_outdated.py`  \n**Language:** Python \
  \ \n\n---\n\n### Overview\n- This module provides **asynchronous utilities** to\
  \ determine whether a given Python package is outdated compared to the versions\
  \ available on PyPI.\n- It is designed for use in a CLI tool that checks installed\
  \ packages against the latest releases, offering **verbose output** when enabled.\n\
  \n---\n\n### Key Data Structure\n- **`OutdateResult` (dataclass)**\n  - **Fields**\n\
  \    - `requirement: Requirement` \u2013 the original package requirement (name\
  \ + version specifier).\n    - `version: Optional[Version]` \u2013 the version currently\
  \ installed locally (or `None` if not installed).\n    - `all_versions: List[Version]`\
  \ \u2013 *all* non\u2011prerelease versions retrieved from PyPI, sorted ascending.\n\
  \    - `wanted: Optional[Version]` \u2013 the newest version that **satisfies**\
  \ the requirement\u2019s specifier (computed in `__post_init__`).\n    - `latest:\
  \ Optional[Version]` \u2013 the absolute newest version on PyPI (last element of\
  \ `all_versions`).\n  - **Properties / Helpers**\n    - `name` \u2013 shortcut for\
  \ `requirement.name`.\n    - `install_not_found()` \u2013 `True` when the package\
  \ is not installed locally.\n    - `install_not_wanted()` \u2013 `True` when the\
  \ installed version does **not** satisfy the requirement specifier.\n    - `pypi_not_found()`\
  \ \u2013 `True` when no versions could be fetched from PyPI.\n    - `outdated()`\
  \ \u2013 `True` when the installed version differs from either the wanted or the\
  \ latest version.\n\n---\n\n### Core Functions (asynchronous)\n\n| Function | Purpose\
  \ | Important Details |\n|----------|---------|-------------------|\n| `get_local_version(name:\
  \ str) -> Optional[Version]` | Retrieves the locally installed version of a package\
  \ via `pip show`. | - Executes `pip show {name}` in a subprocess. <br> - Parses\
  \ the `Version:` line. <br> - Returns `None` if the package is not installed or\
  \ the command fails. |\n| `get_pypi_versions(name: str, session) -> List[Version]`\
  \ | Fetches all *stable* (non\u2011prerelease) releases for a package from PyPI.\
  \ | - Uses an async HTTP session (`session.get`). <br> - Ignores any version string\
  \ that `packaging.version` marks as `InvalidVersion`. <br> - Skips prereleases (`version.is_prerelease`).\
  \ <br> - Returns a **sorted** list of `Version` objects. |\n| `check_outdated(require,\
  \ session) -> OutdateResult` | Orchestrates the check for a single requirement.\
  \ | - Optionally prints a verbose message (`Checking: {require.name} {require.specifier}`).\
  \ <br> - Normalizes the package name with `canonicalize_name`. <br> - Calls `get_local_version`\
  \ and `get_pypi_versions`. <br> - Returns an `OutdateResult` populated with the\
  \ gathered data. |\n\n---\n"
