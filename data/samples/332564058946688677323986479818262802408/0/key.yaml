"# Directory\u2011Level Notes for **`pip_outdated/`**\n\nThese notes synthesize the\
  \ file\u2011level documentation for the *pip\u2011outdated* package.  \nThey are\
  \ organized to support the creation of user\u2011facing documentation, onboarding\
  \ material, or a quick\u2011reference guide.\n\n---  \n\n## 1. Project Overview\
  \  \n\n- **Package name:** `pip-outdated`  \n- **Current version:** `\"0.8.0\"`\
  \  \n- **Primary purpose:** Scan a Python project\u2019s dependency specifications\
  \ (e.g., `requirements.txt`, `setup.cfg`, or any glob\u2011matched files) and report\
  \ which packages have newer releases available on PyPI.  \n- **Execution entry points:**\
  \  \n  - `python -m pip_outdated` (via `pip_outdated/__main__.py`)  \n  - Installed\
  \ console script `pip-outdated` (calls `pip_outdated.main.main()`)  \n\n---  \n\n\
  ## 2. High\u2011Level Workflow  \n\n1. **Argument parsing** \u2013 `parse_args`\
  \ builds the CLI surface (flags `--verbose`, `--quiet`, and positional file\u2011\
  list).  \n2. **Requirement discovery** \u2013 `find_require.find_require()` resolves\
  \ the supplied file/glob patterns, parses `requirements.txt`\u2011style files and\
  \ `setup.cfg` sections, and yields `packaging.requirements.Requirement` objects.\
  \  \n3. **HTTP session creation** \u2013 `session.get_session()` returns a pre\u2011\
  configured `aiohttp.ClientSession` (User\u2011Agent `\"pip-outdated\"`; connection\
  \ limit `5`).  \n4. **Concurrent version checks** \u2013 For each requirement, `check_outdated.check_outdated()`\
  \ is scheduled as an `asyncio` task. This function:  \n   - Retrieves the locally\
  \ installed version (`get_local_version`).  \n   - Retrieves all stable PyPI releases\
  \ (`get_pypi_versions`).  \n   - Populates an `OutdateResult` dataclass that contains\
  \ the installed, wanted, and latest versions plus helper predicates.  \n5. **Result\
  \ rendering** \u2013 `print_outdated.print_outdated()` gathers completed `OutdateResult`s,\
  \ builds a colored ASCII table, prints a legend, and (unless `--quiet`) exits with\
  \ status\u202F1 if any package is outdated.  \n\n---  \n\n## 3. Core Modules  \n\
  \n| Module | Primary Responsibility | Key Public API |\n|--------|------------------------|----------------|\n\
  | `__init__.py` | Package metadata & CLI description | \u2013 |\n| `__main__.py`\
  \ | Bootstrap script for `python -m pip_outdated` | Calls `main()` |\n| `main.py`\
  \ *(referenced but not shown)* | Orchestrates argument parsing, requirement discovery,\
  \ session handling, task scheduling, and final printing. |\n| `find_require.py`\
  \ | Parse requirement sources (plain files, `setup.cfg`, raw text). | `find_require(files:\
  \ List[str]) \u2192 Iterator[Requirement]` |\n| `check_outdated.py` | Async logic\
  \ to compare local vs. PyPI versions. | `check_outdated(require: Requirement, session)\
  \ \u2192 OutdateResult` |\n| `print_outdated.py` | Render results in a colored table\
  \ and manage exit status. | `print_outdated(outdates, quiet: bool)` |\n| `session.py`\
  \ | Provide a reusable aiohttp session with sensible defaults. | `get_session()\
  \ \u2192 aiohttp.ClientSession` |\n| `verbose.py` | Global verbose flag handling.\
  \ | `set_verbose(bool)`, `verbose() \u2192 bool` |\n\n---  \n\n## 4. Important Data\
  \ Structures  \n\n## 5. Verbosity & Quiet Modes  \n\n- **Verbose (`-v / --verbose`)**\
  \ \u2013 Enables extra diagnostic prints (e.g., file parsing traces, per\u2011package\
  \ status). Implemented via the global flag in `verbose.py`.  \n- **Quiet (`-q /\
  \ --quiet`)** \u2013 Suppresses the non\u2011zero exit code when outdated packages\
  \ are detected, allowing callers (scripts, CI) to handle results themselves.\n\n\
  ---  \n\n## 6. Concurrency Model  \n\n- The tool uses **`asyncio`** together with\
  \ **`aiohttp`**:  \n  - Subprocess calls (`pip show`) and HTTP GET requests are\
  \ wrapped in `async` functions.  \n  - Tasks are scheduled concurrently, limited\
  \ only by the aiohttp connector\u2019s `limit=5`.  \n- **Why not `asyncio.run`?**\
  \ \u2013 To avoid closing the event loop prematurely, which can clash with aiohttp\u2019\
  s connection cleanup (see aiohttp issue #1925). The code instead fetches the current\
  \ loop via `asyncio.get_event_loop()`.\n\n---  \n"
