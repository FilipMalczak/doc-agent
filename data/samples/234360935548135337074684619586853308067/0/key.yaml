"## How the CLI Works  \n\n| Entry point | Function | Description |\n|-------------|----------|-------------|\n\
  | `python -m pip_outdated` (or the installed script `pip-outdated`) | `main()` |\
  \ Starts the asynchronous workflow that parses arguments, discovers requirements,\
  \ checks each for newer versions, and prints results. |\n\n### Asynchronous handling\
  \  \n\n- The script cannot use `asyncio.run` because that would close the event\
  \ loop, which conflicts with `aiohttp`\u2019s known issue (see https://github.com/aio-libs/aiohttp/issues/1925).\
  \  \n- Instead, it retrieves the current event loop with `asyncio.get_event_loop()`\
  \ and runs `_main()` until completion.  \n"
