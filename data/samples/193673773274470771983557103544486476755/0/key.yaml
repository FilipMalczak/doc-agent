"## Project Component: `pip_outdated/print_outdated.py`\n\n### Key Functions\n\n####\
  \ `make_row(outdate: OutdateResult) -> Optional[List[str]]`\n- **Purpose**: Convert\
  \ a single `OutdateResult` into a table row (list of strings) with appropriate color\
  \ highlighting.\n- **Logic**:\n  - Returns `None` if the package is **not outdated**.\n\
  \  - **Current version** (`colored_current`):\n    - Red & bold if the package is\
  \ not installed or the installation is explicitly unwanted.\n    - Otherwise, shown\
  \ without color.\n  - **Wanted version** (`colored_wanted`):\n    - Red & bold `\"\
  None\"` if the package cannot be found on PyPI or no wanted version is defined.\n\
  \    - Green & bold if a newer wanted version exists and the package is installed.\n\
  \    - Otherwise, shown as plain text.\n  - **Latest version** (`colored_latest`):\n\
  \    - Red & bold `\"None\"` if the package cannot be found on PyPI.\n    - Green\
  \ & bold if a newer latest version exists and the package is installed.\n    - Otherwise,\
  \ shown as plain text.\n- **Returned Row**:  \n  ```\n  [name, colored_current,\
  \ colored_wanted, colored_latest]\n  ```\n"
