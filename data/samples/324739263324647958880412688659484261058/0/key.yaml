"# Directory\u2011Level Documentation \u2013 `pip_outdated/`\n\n## 1. Package Overview\n\
  - **Name:** `pip\u2011outdated`  \n- **Version:** `0.8.0`  \n- **Purpose:** A command\u2011\
  line tool that scans dependency files (`requirements.txt`, `setup.cfg`, or any glob\u2011\
  matched files) and reports packages that have newer releases on PyPI.  \n- **Entry\
  \ Points**\n  - Console script `pip-outdated` \u2192 `pip_outdated.__init__:main`\
  \  \n  - Python module execution `python -m pip_outdated` \u2192 `pip_outdated.__main__:main`\
  \  \n\n## 2. High\u2011Level Workflow\n1. **Argument Parsing** \u2013 `parse_args()`\
  \ (in `__init__.py`) defines `--verbose/-v`, `--quiet/-q`, and positional file/glob\
  \ arguments.  \n2. **Verbosity Control** \u2013 Global flag handled by `pip_outdated.verbose`\
  \ (`set_verbose` / `verbose`).  \n3. **Requirement Discovery** \u2013 `find_require.find_require(files)`\
  \ walks the supplied paths/patterns, parses plain requirement files and `setup.cfg`\
  \ files, and yields `packaging.requirements.Requirement` objects.  \n4. **HTTP Session**\
  \ \u2013 `session.get_session()` creates a single `aiohttp.ClientSession` with a\
  \ custom *User\u2011Agent* header and a connection limit of **5**.  \n5. **Out\u2011\
  of\u2011date Checks** \u2013 For each requirement, `check_outdated.check_outdated(require,\
  \ session)`:\n   - Retrieves the locally installed version (`pip show`).\n   - Pulls\
  \ all stable releases from PyPI.\n   - Populates an `OutdateResult` dataclass containing\
  \ `installed`, `wanted`, and `latest` versions plus helper predicates (`outdated()`,\
  \ `install_not_found()`, etc.).  \n6. **Result Presentation** \u2013 `print_outdated.print_outdated(outdates,\
  \ quiet)` builds a colored ASCII table:\n   - Columns: **Name**, **Installed**,\
  \ **Wanted**, **Latest**.  \n   - Red\u202F=\u202Fmissing/unavailable, Green\u202F\
  =\u202Fnewer version exists.  \n   - Exits with code `1` when any package is outdated\
  \ unless `--quiet` is set.  \n\n## 3. Module Summaries\n\n| Module | Core Responsibility\
  \ | Key Public API |\n|-------|----------------------|----------------|\n| `__init__.py`\
  \ | CLI orchestration (argument parsing, async loop handling) | `main()`, `_main()`,\
  \ `parse_args()` |\n| `__main__.py` | Standard \u201Cmodule\u2011as\u2011script\u201D\
  \ entry point | `python -m pip_outdated` |\n| `find_require.py` | Locate and parse\
  \ requirement specifications from files/globs | `find_require(files)`, `parse_require(text)`\
  \ |\n| `check_outdated.py` | Async version comparison against PyPI | `OutdateResult`\
  \ (dataclass), `check_outdated(require, session)` |\n| `session.py` | Provide a\
  \ pre\u2011configured `aiohttp.ClientSession` | `get_session()` |\n| `print_outdated.py`\
  \ | Render results as a colored table and manage exit status | `print_outdated(outdates,\
  \ quiet)` |\n| `verbose.py` | Global verbose flag storage | `set_verbose(bool)`,\
  \ `verbose()` |\n"
