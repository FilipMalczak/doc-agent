  - content: "<document_type>source_file</document_type>\n<type>file</type>\n<repo_item_type>code</repo_item_type>\n\
      <path>pip_outdated/check_outdated.py</path>\n<language>python</language>\n<content>\n\
      import asyncio\nfrom dataclasses import dataclass\nfrom typing import List,\
      \ Optional\n\nfrom packaging.requirements import Requirement\nfrom packaging.utils\
      \ import canonicalize_name\nfrom packaging.version import Version, InvalidVersion\n\
      from packaging.version import parse as parse_version\n\nfrom .verbose import\
      \ verbose\n\n\n@dataclass\nclass OutdateResult:\n    requirement: Requirement\n\
      \    version: Optional[Version]\n    all_versions: List[Version]\n\n    wanted:\
      \ Optional[Version] = None\n    latest: Optional[Version] = None\n\n    def\
      \ __post_init__(self):\n        if self.all_versions:\n            try:\n  \
      \              self.wanted = next(v for v in reversed(self.all_versions)\n \
      \                                  if v in self.requirement.specifier)\n   \
      \         except StopIteration:\n                pass\n            self.latest\
      \ = self.all_versions[-1]\n\n    @property\n    def name(self) -> str:\n   \
      \     return self.requirement.name\n\n    def install_not_found(self) -> bool:\n\
      \        return self.version is None\n        \n    def install_not_wanted(self)\
      \ -> bool:\n        if self.version is None:\n            return False\n   \
      \     return self.version not in self.requirement.specifier\n        \n    def\
      \ pypi_not_found(self) -> bool:\n        return self.latest is None\n      \
      \  \n    def outdated(self) -> bool:\n        return self.version != self.wanted\
      \ or self.version != self.latest\n\nasync def get_local_version(name: str) ->\
      \ Optional[Version]:\n    p = await asyncio.create_subprocess_shell(\n     \
      \   f\"pip show {name}\",\n        stdout=asyncio.subprocess.PIPE,\n       \
      \ stderr=asyncio.subprocess.PIPE,\n        )\n    stdout, _ = await p.communicate()\n\
      \    if p.returncode != 0:\n        return None\n    for line in stdout.decode().splitlines():\n\
      \        if line.startswith(\"Version: \"):\n            return parse_version(line[9:])\n\
      \        \nasync def get_pypi_versions(name: str, session) -> List[Version]:\n\
      \    async with session.get(f\"https://pypi.org/pypi/{name}/json\") as r:\n\
      \        r.raise_for_status()\n        keys = []\n        for s in (await r.json())[\"\
      releases\"].keys():\n            try:\n                version = parse_version(s)\n\
      \            except InvalidVersion:\n                continue\n            if\
      \ version.is_prerelease:\n                continue\n            keys.append(version)\n\
      \        keys.sort()\n        return keys\n    \nasync def check_outdated(require,\
      \ session) -> OutdateResult:\n    if verbose():\n        print(f\"Checking:\
      \ {require.name} {require.specifier}\")\n    name = canonicalize_name(require.name)\n\
      \    current_version = await get_local_version(name)\n    pypi_versions = await\
      \ get_pypi_versions(name, session)\n    return OutdateResult(require, current_version,\
      \ pypi_versions)\n\n</content>"
