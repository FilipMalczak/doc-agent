"# Example: find all requirements in the current directory\nfor req in find_require([\"\
  requirements.txt\", \"setup.cfg\", \"src/*.txt\"]):\n    print(req)          # ->\
  \ Requirement object, e.g. \"requests>=2.25\"\n```\n\n- Pass a list of file paths\
  \ or glob patterns to `find_require`.  \n- The function yields `Requirement` objects\
  \ that can be inspected (`.name`, `.specifier`, `.extras`, etc.).  \n\n## Supported\
  \ File Types  \n\n- **Plain requirement files** (`.txt`, `.pip`, any file without\
  \ `.cfg` suffix).  \n- **`setup.cfg`** (INI format) \u2013 extracts sections:  \n\
  \n  - `options.setup_requires`  \n  - `options.install_requires`  \n  - All entries\
  \ under `options.extras_require`  \n"
