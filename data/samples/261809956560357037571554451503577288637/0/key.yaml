"- **File:** `tests/test_parse_cfg.py`  \n- **Purpose:** Unit test for the `parse_cfg`\
  \ function in the `pip_outdated.find_require` module.  \n\n- **Key Test Scenario:**\
  \  \n  - Creates a temporary `setup.cfg` file containing typical sections:\n   \
  \ - `[options]` with `setup_requires` and `install_requires` entries that include\
  \ version constraints and whitespace formatting.\n    - `[options.extras_require]`\
  \ with a `docs` extra listing additional packages.  \n  - Calls `parse_cfg` with\
  \ the path to this file.  \n  - Verifies that the returned iterable yields requirement\
  \ objects whose `name` attributes match the expected list of package names **without**\
  \ version specifiers or extra formatting.  \n\n- **What Maintainers Should Note:**\
  \  \n  - `parse_cfg` is expected to correctly parse:\n    - Multiline requirement\
  \ specifications.\n    - Requirements that include version specifiers (e.g., `>=`,\
  \ `<`) and should strip these to return just the package name.  \n    - Extras sections\
  \ (e.g., `options.extras_require`) and include those packages in the result.  \n\
  \  - The order of returned requirement names follows the order they appear in the\
  \ configuration file.  \n  - The test uses the `tmp_path` fixture from `pytest`\
  \ to avoid side\u2011effects on the repository.  \n\n- **Implications for Documentation:**\
  \  \n  - When describing `parse_cfg` for end\u2011users, emphasize that it extracts\
  \ **only the package names** from a `setup.cfg` file, ignoring any version constraints\
  \ and handling both standard and extra requirement sections.  \n  - Mention that\
  \ the function works with typical `setup.cfg` formatting, including indented, multiline\
  \ entries.  "
