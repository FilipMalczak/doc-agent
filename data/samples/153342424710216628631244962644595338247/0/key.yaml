"## Project Overview  \n## Core Functionality  \n\n| Function | Description | Key\
  \ Behaviors |\n|----------|-------------|----------------|\n| `iter_files(patterns)`\
  \ | Yields `pathlib.Path` objects for each file matching one or more glob patterns.\
  \ | - If a pattern points to an existing file, yields that file directly.<br>- Otherwise,\
  \ treats the pattern as a glob relative to the current working directory. |\n| `file_to_lines(file)`\
  \ | Reads a file and streams its processed lines. | - Prints a parsing trace when\
  \ `verbose()` is true.<br>- Delegates line processing to `parse_lines`. |\n| `parse_lines(lines)`\
  \ | Normalises an iterable of raw lines. | - Strips trailing comments that start\
  \ with `#` (ignores `#` inside quoted strings).<br>- Joins lines ending with a backslash\
  \ (`\\\\`) to support multi\u2011line requirements.<br>- Removes trailing newline\
  \ characters. |\n| `parse_requirements(file)` | Generates `Requirement` objects\
  \ from a requirement file. | - Uses `file_to_lines` \u2192 `parse_require` for each\
  \ processed line. |\n| `parse_requirements_text(text)` | Same as `parse_requirements`\
  \ but works on a raw string. | - Splits the string into lines preserving line endings\
  \ before passing to `parse_lines`. |\n| `parse_cfg(file)` | Extracts requirement\
  \ specifications from a `setup.cfg` file. | - Reads the file with `ConfigParser`.<br>-\
  \ Looks for `setup_requires`, `install_requires`, and any extras under `options.extras_require`.<br>-\
  \ Parses each found text block via `parse_requirements_text`. |\n| `find_require(files)`\
  \ | Public entry point: yields all `Requirement` objects from a list of file patterns.\
  \ | - Calls `iter_files` to resolve patterns.<br>- Uses `parse_cfg` for `.cfg` files,\
  \ otherwise `parse_requirements`. |\n| `parse_require(text)` | Converts a requirement\
  \ line to a `Requirement` object, discarding trailing option flags. | - Strips any\
  \ `--option` or `-o` suffix using a regex.<br>- Returns `None` if the line is not\
  \ a valid requirement (`InvalidRequirement`). |\n"
