- content: "Let's craft.**Project:** `pip-outdated` \u2013 Find outdated dependencies\
    \ in `requirements.txt` or `setup.cfg`\n\n---\n\n### What the tool does\n- Scans\
    \ your Python project\u2019s dependency files (`requirements.txt`, `setup.cfg`)\
    \ and reports packages that are **missing**, **outdated**, or **incompatible**.\n\
    - Shows results in a colored table for quick visual inspection.\n- Works by comparing\
    \ the installed version (via `pip`) with the version specifier in the file.\n\
    - If you only want a simple list of updatable packages, you can still use the\
    \ standard `pip list --outdated` command.\n\n---\n\n### Why a user would care\n\
    - Quickly spot which libraries need to be upgraded to satisfy the version constraints\
    \ you\u2019ve defined.\n- Avoid runtime errors caused by incompatible package\
    \ versions.\n- Get an at\u2011a\u2011glance view (colored table) rather than parsing\
    \ raw `pip` output.\n\n---\n\n### Installation (for end\u2011users)\n```bash\n\
    pip install pip-outdated\n```\n*(Package is available on PyPI)*\n\n---\n\n###\
    \ Basic usage\n```bash\npip-outdated [options] [<file> ...]\n```\n- **Default\
    \ files:** `requirements.txt` and `setup.cfg` (if no file argument is given).\n\
    - **File arguments** accept glob patterns, e.g.:\n  - `pip-outdated *-requirements.txt`\
    \ \u2013 scan all `*-requirements.txt` files.\n  - `pip-outdated requirements/*.txt`\
    \ \u2013 scan every `.txt` file inside a `requirements` folder.\n\n---\n\n###\
    \ Command\u2011line options\n- `-h`, `--help` \u2013 Show help message.\n- `-v`,\
    \ `--verbose` \u2013 Enable verbose output (default: **False**).\n- `-q`, `--quiet`\
    \ \u2013 Suppress exit code\u202F1 when not everything is up\u2011to\u2011date\
    \ (default: **False**).\n\n---\n\n### Example workflow for a typical user\n1.\
    \ **Check your main dependencies**\n   ```bash\n   pip-outdated\n   ```\n2. **Check\
    \ additional requirement files**\n   ```bash\n   pip-outdated dev-requirements.txt\
    \ test-requirements.txt\n   ```\n3. **Run quietly in CI pipelines** (don\u2019\
    t fail the build on outdated packages)\n   ```bash\n   pip-outdated -q\n   ```\n\
    \n---\n\n### Planned enhancements (TODOs) \u2013 helpful to know what may appear\
    \ in future releases\n- Option to automatically **update packages**.\n- Option\
    \ to **modify `requirements.txt` / `setup.cfg`** with the newer versions.\n- Global\
    \ listing flag (e.g., `-g` / `--global`) to show *all* available package updates,\
    \ not just those constrained by your files.\n\n---\n\n### Recent changes (high\u2011\
    level, useful for users)\n| Version | Date | Notable user\u2011impacting changes\
    \ |\n|---------|------|--------------------------------|\n| **0.8.0** | Aug\u202F\
    9\u202F2025 | Switched from `setuptools` to `configparse` for reading `setup.cfg`.\
    \ |\n| **0.7.0** | Aug\u202F13\u202F2024 | Now ignores `InvalidVersion` errors,\
    \ reducing false\u2011positive failures. |\n| **0.6.0** | Jan\u202F1\u202F2023\
    \ | Retrieves package versions directly from the `pip` CLI, ensuring correct versions\
    \ inside virtual environments. |\n| **0.4.0** | Jan\u202F30\u202F2020 | Required\
    \ Python\u202F3.7+, added parallel request handling and the `--quiet` flag. |\n\
    | **0.3.0** | Oct\u202F13\u202F2019 | Exit code\u202F1 is now set when any requirement\
    \ is unsatisfied (useful for CI). Also added support for `setup_requires` and\
    \ `extras_require`. |\n\n---\n\n### Quick reference cheat\u2011sheet (copy\u2011\
    paste for end\u2011users)\n\n```bash\n# Install\npip install pip-outdated\n\n\
    # Basic scan (default files)\npip-outdated\n\n# Scan specific files (supports\
    \ glob)\npip-outdated *-requirements.txt\npip-outdated requirements/*.txt\n\n\
    # Quiet mode (no non\u2011zero exit code)\npip-outdated -q\n\n# Verbose output\n\
    pip-outdated -v\n```\n\n--- \n\n*These notes capture the essential information\
    \ an end\u2011user needs to understand, install, and operate `pip-outdated` effectively.*"
