"# pip\u2011outdated \u2013 Quick Reference for End\u2011Users  \n\n## What it does\
  \  \n- Scans `requirements.txt` or `setup.cfg` and reports **outdated, missing,\
  \ or incompatible** packages.  \n- Shows results in a **colored table** for easy\
  \ visual inspection.  \n\n## Key features  \n- Compares installed versions with\
  \ version specifiers in requirement files.  \n- Accepts **multiple files** (glob\
  \ patterns supported).  \n- Provides **verbose** mode for detailed output and **quiet**\
  \ mode to suppress non\u2011zero exit status.  \n\n## Installation  \n```bash\n\
  pip install pip-outdated\n```  \n*Published on PyPI.*  \n\n## Basic usage  \n```bash\n\
  pip-outdated\n```  \n- By default reads `requirements.txt` and `setup.cfg`.  \n\n\
  ### Command\u2011line options  \n\n| Option | Description |\n|--------|-------------|\n\
  | `-h`, `--help` | Show help and exit. |\n| `-v`, `--verbose` | Print additional\
  \ information (default: `False`). |\n| `-q`, `--quiet` | Do **not** return exit\
  \ code\u202F1 when some packages are outdated (default: `False`). |\n| `<file>`\
  \ (positional) | One or more requirement files; accepts glob patterns. Default:\
  \ `['requirements.txt','setup.cfg']`. |\n\n### Example commands  \n\n- **Check several\
  \ requirement files**  \n  ```bash\n  pip-outdated *-requirements.txt\n  ```\n-\
  \ **Check all files in a folder**  \n  ```bash\n  pip-outdated requirements/*.txt\n\
  \  ```\n\n## Compatibility  \n- Requires **Python\u202F3.7+** (since version\u202F\
  0.4.0).  \n\n## Planned enhancements (Todo)  \n- Option to **update packages** automatically.\
  \  \n- Ability to **modify** `requirements.txt` / `setup.cfg` with new versions.\
  \  \n- Global listing mode (`-g`, `--global`).  \n\n## Recent changelog highlights\
  \  \n\n- **0.8.0** (2025\u201108\u201109): Dropped `setuptools`; now uses `configparse`\
  \ for `setup.cfg`.  \n- **0.7.0** (2024\u201108\u201113): Silently ignore `InvalidVersion`\
  \ errors.  \n- **0.6.0** (2023\u201101\u201101): Retrieves package versions via\
  \ the `pip` CLI (works inside virtual environments); removed `cchardet`.  \n- **0.5.0**\
  \ (2022\u201101\u201112): Added type hints.  \n- **0.4.0** (2020\u201101\u201130):\
  \ Bumped minimum Python to 3.7; added parallel requests and `--quiet`.  \n- **0.3.0**\
  \ (2019\u201110\u201113): Exit code\u202F1 on any outdated package; disabled prerelease\
  \ checks; added `setup_requires` and `extras_require` support.  \n\nThese notes\
  \ capture the most relevant information for end\u2011users who want to install,\
  \ run, and understand the capabilities of **pip\u2011outdated**."
