"## Project Overview\n- **Name**: `pip-outdated`\n- **Version**: `0.8.0` (Beta)\n\
  - **Description**: Finds outdated dependencies in your `requirements.txt` or `setup.cfg`.\n\
  - **Author**: `eight` (`eight04@gmail.com`)\n- **License**: MIT\n- **Homepage**:\
  \ <https://github.com/eight04/pip-outdated>\n\n## Installation\n```bash\npip install\
  \ pip-outdated==0.8.0\n```\n*The package is marked as \u201CDevelopment Status ::\
  \ 4 - Beta\u201D, so expect possible updates.*\n\n## Runtime Requirements\n- **Python**:\
  \ 3.7 or newer (indicated by classifiers)\n- **Dependencies**:\n  - `aiohttp~=3.12`\n\
