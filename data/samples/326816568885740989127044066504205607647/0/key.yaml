"## Project Notes \u2013 `pip_outdated/find_require.py`\n### Overview\n### Key Functions\n\
  ### Supporting Details\n- **Dependencies**: \n  - `packaging.requirements.Requirement`\
  \ for robust requirement parsing.\n  - `configparser.ConfigParser` for handling\
  \ `setup.cfg` files.\n  - Local `verbose` utility (`.verbose.verbose`) to enable\
  \ optional debug printing.\n- **Error Handling**: Invalid requirement lines are\
  \ silently ignored (function returns `None`).\n- **Comment & Continuation Logic**:\
  \ Implemented in `parse_lines` using a regular expression that matches the first\
  \ `#` preceded by start or whitespace, and string concatenation for lines ending\
  \ with a backslash followed by a newline.\n"
