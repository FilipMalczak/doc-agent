      \                <document_type>note</document_type>\n              </subject>\n\
      \              <details>\n                <perspective>\n                  <role>enduser</role>\n\
      \                  <relationship_to_project>user</relationship_to_project>\n\
      \                </perspective>\n              </details>\n            </item>\n\
      \          </list>\n        </provenance>\n        <content>\n## Overview  \n\
      ## Version  \n## Command\u2011line interface  \n## Behaviour  \n## Implementation\
      \ notes (relevant for users)  \n        </content>\n        <additional_details>None</additional_details>\n\
      \      </document>\n    </item>\n    <item index=\"1\">\n      <index>1</index>\n\
      \      <score>0.6189814507961273</score>\n      <document>\n        <id>645f27df-fc5a-5346-a555-b3f71f155ef4</id>\n\
