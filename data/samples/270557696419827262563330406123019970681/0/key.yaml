      \        </details>\n        <provenance>\n          <list>\n            <item\
      \ index=\"0\">\n              <subject>\n                <id>e66496b8-e454-5538-92b9-b2023e11adea</id>\n\
      \                <document_type>source_file</document_type>\n              </subject>\n\
      \              <details>\n                <path>pip_outdated/__init__.py</path>\n\
      \              </details>\n            </item>\n            <item index=\"1\"\
      >\n              <subject>\n                <id>cfa6a0a5-98ae-5a7b-8f68-5bac5ab68270</id>\n\
      \                <document_type>note</document_type>\n              </subject>\n\
      \              <details>\n                <perspective>\n                  <role>enduser</role>\n\
      \                  <relationship_to_project>user</relationship_to_project>\n\
      \                </perspective>\n              </details>\n            </item>\n\
      \          </list>\n        </provenance>\n        <content>\n## Command\u2011\
      line interface  \n### Typical usage pattern  \n\n```bash\npip-outdated     \
      \           # checks requirements.txt and setup.cfg\npip-outdated -v       \
      \      # same, but with verbose information\npip-outdated -q my*.txt     # checks\
      \ files matching the glob `my*.txt` and does not exit with code\u202F1 on success\n\
      ```\n\n*(No example is generated beyond what is directly implied by the argument\
      \ definitions.)*  \n\n        </content>\n        <additional_details>None</additional_details>\n\
      \      </document>\n    </item>\n  </list>\n</documents>\n<additional_instructions>Prefer\
      \ documents containing explicit variable definitions or interface naming standards</additional_instructions>"
