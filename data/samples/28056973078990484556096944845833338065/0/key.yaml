"# Example: find all requirements from given glob patterns\nfor requirement in find_require([\"\
  requirements.txt\", \"setup.cfg\", \"src/**/*.txt\"]):\n    print(requirement)\n\
  ```\n\n- The function returns an iterator of `Requirement` objects that can be inspected\
  \ for attributes like `name`, `specifier`, `extras`, and `url`.  \n\n## Edge Cases\
  \ & Limitations  \n\n- **Unsupported File Types:** Only `.cfg` files receive special\
  \ handling; all other file extensions are treated as plain requirement files.  \n\
  - **Invalid Lines:** Lines that cannot be parsed into a `Requirement` (e.g., malformed\
  \ syntax) are silently ignored (`None` is returned and filtered out).  \n- **Comment\
  \ Detection:** The simple regex may not correctly handle `#` characters inside quoted\
  \ strings.  \n"
