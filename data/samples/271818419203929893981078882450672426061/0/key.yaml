"[metadata]\nname = pip-outdated\nversion = 0.8.0\ndescription = Find outdated dependencies\
  \ in your requirements.txt or setup.cfg\nauthor = eight\nauthor_email = eight04@gmail.com\n\
  \n# See https://pypi.python.org/pypi?%3Aaction=list_classifiers\nclassifiers =\n\
  \  Development Status :: 4 - Beta\n  Environment :: Console\n  Intended Audience\
  \ :: Developers\n  Programming Language :: Python :: 3.7\n  Topic :: Software Development\
  \ :: Build Tools\n\t\nkeywords = pip, check, outdate, npm\nlicense = MIT\nlong_description\
  \ = file: README.rst\nurl = https://github.com/eight04/pip-outdated\n\n[options]\n\
  zip_safe = True\npackages = find:\n\ninstall_requires =\n    aiohttp~=3.12\n   \
  \ colorama~=0.4.6\n    packaging~=25.0\n    termcolor~=3.1\n    terminaltables~=3.1\n\
  \  \n[options.packages.find]\nexclude = tests\n\n[options.entry_points]\nconsole_scripts\
  \ =\n  pip-outdated = pip_outdated:main\n\n[vpip]\ncommand_fallback = python cute.py\n"
