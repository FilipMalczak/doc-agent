- content: "**Project:** `pip-outdated` \u2013 a utility to find outdated dependencies\
    \ in `requirements.txt` or `setup.cfg`.\n\n**Purpose (maintainer view)**\n- Helps\
    \ end\u2011users quickly identify packages that are missing, outdated, or incompatible\
    \ with the version specifiers in their project\u2019s dependency files.\n- Provides\
    \ a colored table report, making the information easy to read.\n\n**Key Features**\n\
    - Parses both `requirements.txt` and `setup.cfg` (including `setup_requires` and\
    \ `extras_require`).\n- Supports glob patterns for processing multiple requirement\
    \ files at once.\n- Offers verbose (`-v/--verbose`) and quiet (`-q/--quiet`) modes.\n\
    - Returns exit code\u202F1 when not all dependencies are up\u2011to\u2011date\
    \ (unless `--quiet` is used).\n\n**Installation**\n```bash\npip install pip-outdated\n\
    ```\n*(Package is available on PyPI.)*\n\n**Typical Usage**\n```bash\npip-outdated\
    \                # scans default files: requirements.txt, setup.cfg\npip-outdated\
    \ *-requirements.txt\npip-outdated requirements/*.txt\n```\n- Positional arguments\
    \ accept glob patterns to target specific files.\n\n**Command\u2011Line Options**\n\
    | Option | Description |\n|--------|-------------|\n| `-h, --help` | Show help\
    \ message and exit |\n| `-v, --verbose` | Print detailed processing information\
    \ (default: `False`) |\n| `-q, --quiet` | Suppress exit code\u202F1 on outdated\
    \ dependencies (default: `False`) |\n\n**Future Enhancements (TODOs)**\n- Add\
    \ options to automatically update packages.\n- Add options to modify `requirements.txt`\
    \ / `setup.cfg` with newer versions.\n- Add a global listing mode (e.g., `-g,\
    \ --global`) to list all packages regardless of specifiers.\n\n**Changelog Highlights\
    \ (relevant for maintainers)**\n- **0.8.0 (Aug\u202F9\u202F2025)** \u2013 Dropped\
    \ `setuptools` dependency; switched to `configparse` for `setup.cfg` parsing.\n\
    - **0.7.0 (Aug\u202F13\u202F2024)** \u2013 Ignored `InvalidVersion` errors during\
    \ parsing.\n- **0.6.0 (Jan\u202F1\u202F2023)** \u2013 Fetched package versions\
    \ via the `pip` CLI to work correctly inside virtual environments; removed `cchardet`.\n\
    - **0.5.0 (Jan\u202F12\u202F2022)** \u2013 Added type hints.\n- **0.4.0 (Jan\u202F\
    30\u202F2020)** \u2013 Bumped minimum Python to 3.7, introduced parallel requests,\
    \ added `--quiet` flag.\n- **0.3.0 (Oct\u202F13\u202F2019)** \u2013 Changed exit\u2011\
    code behavior (now non\u2011zero on outdated deps), stopped checking prereleases,\
    \ added support for `setup_requires`/`extras_require`.\n- Earlier releases mainly\
    \ bumped dependencies and introduced initial features.\n\n**CI / Coverage Badges**\n\
    - Build status (Travis CI) and test coverage (Codecov) are displayed in the README,\
    \ indicating continuous integration health.\n\n**Documentation Role**\n- This\
    \ README serves as the primary end\u2011user guide; ensure it stays up\u2011to\u2011\
    date with any new options or breaking changes to aid users in installing and using\
    \ `pip-outdated` effectively."
