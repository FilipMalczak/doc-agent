"## Project Component: `pip_outdated/print_outdated.py`\n### Key Functions\n#### `make_row(outdate:\
  \ OutdateResult) -> Optional[List[str]]`\n- **Input**: An `OutdateResult` instance\
  \ (produced by `check_outdated.py`).  \n- **Output**:  \n  - `None` if the package\
  \ is **not outdated**.  \n  - A list of four string cells (`[name, installed, wanted,\
  \ latest]`) otherwise.  \n- **Color logic** (uses `termcolor.colored`):  \n  - **Installed\
  \ version** (`colored_current`)  \n    - Red\u202F+\u202Fbold \u2192 installation\
  \ info missing or deliberately ignored.  \n    - Normal \u2192 version is available.\
  \  \n  - **Wanted version** (`colored_wanted`)  \n    - Red\u202F+\u202Fbold \u2192\
  \ no version data on PyPI or `wanted` unset.  \n    - Green\u202F+\u202Fbold \u2192\
  \ a newer version is available **and** the package is installed.  \n    - Normal\
  \ \u2192 the wanted version is already installed.  \n  - **Latest version** (`colored_latest`)\
  \  \n    - Red\u202F+\u202Fbold \u2192 PyPI data unavailable.  \n    - Green\u202F\
  +\u202Fbold \u2192 a newer version exists **and** the package is installed.  \n\
  \    - Normal \u2192 the latest version matches the installed one.\n"
