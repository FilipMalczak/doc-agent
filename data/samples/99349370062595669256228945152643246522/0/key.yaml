"### Command\u2011Line Options\n| Option | Description |\n| ------ | ----------- |\n\
  | `-h`, `--help` | Show help message and exit. |\n| `-v`, `--verbose` | Enable verbose\
  \ output (default: `False`). |\n| `-q`, `--quiet` | Suppress exit code `1` when\
  \ not all dependencies are up\u2011to\u2011date (default: `False`). |\n"
