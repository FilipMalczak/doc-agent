        notes: "## \U0001F4C4 Project Notes \u2013 `pip_outdated/print_outdated.py`\n\
          \n### Overview\n- This module formats and displays the results of a **pip\u2011\
          outdated** scan.  \n- It builds a colour\u2011coded ASCII table that shows,\
          \ for each package, the **installed**, **wanted**, and **latest** versions.\
          \  \n- The output is designed for end\u2011users who run the tool from a\
          \ terminal.\n\n### Key Functions  \n\n| Function | Purpose | Important Behaviour\
          \ |\n|----------|---------|---------------------|\n| `make_row(outdate:\
          \ OutdateResult) \u2192 Optional[List[str]]` | Creates a single table row\
          \ **only if** the package is outdated. | * Returns `None` when the package\
          \ is up\u2011to\u2011date.  <br> * Colours: <br>   \u2022 **Current** \u2013\
          \ red **bold** when the package isn\u2019t installed or the user didn\u2019\
          t request an update. <br>   \u2022 **Wanted** \u2013 red **bold** when the\
          \ package can\u2019t be found on PyPI or no version specifier exists; green\
          \ **bold** when a newer version is available. <br>   \u2022 **Latest** \u2013\
          \ red **bold** when the package can\u2019t be found on PyPI; green **bold**\
          \ when a newer version exists. |\n| `print_outdated(outdates: List[Awaitable[OutdateResult]],\
          \ quiet: bool) \u2192 None` | Orchestrates the whole display process. |\
          \ 1. Calls `colorama.init()` to enable cross\u2011platform colour support.\
          \ <br> 2. Builds the table header `[\"Name\", \"Installed\", \"Wanted\"\
          , \"Latest\"]`. <br> 3. Iterates over the **awaitable** `OutdateResult`\
          \ objects, appending rows from `make_row`. <br> 4. Handles three terminal\
          \ states: <br>   \u2022 **No requirements found** \u2013 prints a red message\
          \ and returns. <br>   \u2022 **Everything up\u2011to\u2011date** \u2013\
          \ prints a cyan bold message and returns. <br>   \u2022 **Outdated packages\
          \ present** \u2013 prints a colour legend, the ASCII table, and **exits\
          \ with status\u202F1** unless `quiet` is `True`. |\n| Helper methods inside\
          \ `make_row` (`colored_current`, `colored_wanted`, `colored_latest`) | Encapsulate\
          \ the colour\u2011logic for each column. | Use `termcolor.colored` with\
          \ double\u2011quoted colour names and attributes (e.g., \"red\", \"green\"\
          ). |\n\n### Colour Legend (displayed to the user)\n- **Red** \u2013 \u201C\
          unavailable / outdated / out of version specifier\u201D.  \n- **Green**\
          \ \u2013 \u201Cupdatable\u201D.  \n\nThese messages appear automatically\
          \ when outdated packages are detected.\n\n### Exit Codes\n- **0** \u2013\
          \ No outdated packages *or* the user passed `quiet=True`.  \n- **1** \u2013\
          \ At least one package can be upgraded and `quiet` is **False**.  \n  (The\
          \ non\u2011zero exit code allows scripts to detect that a manual update\
          \ is required.)\n\n### User\u2011Facing Behaviour\n- **Running the tool**\
          \ will print a nicely formatted ASCII table; no extra formatting is required\
          \ from the user.  \n- The `quiet` flag suppresses the non\u2011zero exit\
          \ code, making the command usable in CI pipelines where you only need the\
          \ table output.  \n- If the project\u2019s `requirements.txt` (or equivalent)\
          \ is empty, the tool reports **\u201CNo requirements found.\u201D** in red.\
          \  \n- When everything is current, the tool reports **\u201CEverything is\
          \ up\u2011to\u2011date!\u201D** in cyan bold text.\n\n### Dependencies (installed\
          \ automatically when the package is installed)\n- `colorama` \u2013 ensures\
          \ colour codes work on Windows terminals.  \n- `termcolor` \u2013 provides\
          \ the `colored` helper used throughout the module.  \n- `terminaltables`\
          \ \u2013 renders the ASCII table (`AsciiTable`).  \n\n### Typical Usage\
          \ Pattern (from a user\u2019s perspective)\n```bash\n# Run the pip\u2011\
          outdated command (the CLI wrapper calls `print_outdated` internally)\npip-outdated\n\
          ```\n- The command prints the colour legend, followed by a table similar\
          \ to:\n\n```\n+------------+-----------+--------+--------+\n| Name     \
          \  | Installed | Wanted | Latest |\n+------------+-----------+--------+--------+\n\
          | requests   | 2.23.0    | 2.28.1 | 2.28.1 |\n| numpy      | 1.18.0    |\
          \ None   | None   |\n+------------+-----------+--------+--------+\n```\n\
          - **Red** entries flag missing or mismatched versions; **green** entries\
          \ indicate an upgrade is available.  \n\n### Points of Interest for Documentation\
          \ Writers\n- Emphasise the **visual colour cues** because they are the primary\
          \ way users assess package status.  \n- Explain the **meaning of the exit\
          \ code** for automation contexts (e.g., CI pipelines).  \n- Note the **`quiet`\
          \ flag** as a way to get only the table output without a failing exit status.\
          \  \n- Clarify that the module expects **asynchronous** `OutdateResult`\
          \ objects \u2013 the surrounding CLI handles the async gathering.  \n\n\
          ---\n\n*These notes capture the user\u2011relevant behaviour of `print_outdated.py`\
          \ and can be directly reused when drafting the project's user\u2011facing\
          \ documentation.*"
