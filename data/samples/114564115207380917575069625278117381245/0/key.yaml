".**Notes for Maintainer (User\u2011Facing Documentation)**  \n\n- **File purpose**\
  \ \u2013 `print_outdated.py` formats and displays a list of outdated Python package\
  \ requirements. It is used by the *pip\u2011outdated* tool to give end\u2011users\
  \ a clear, colour\u2011coded view of which packages need attention.  \n\n- **Key\
  \ functions**  \n  - `make_row(outdate: OutdateResult) -> Optional[List[str]]` \
  \ \n    - Returns a table row **only** if the package is outdated.  \n    - Applies\
  \ colour logic:  \n      - **Red** \u2192 version unavailable, not installed, or\
  \ not matching the wanted specifier.  \n      - **Green** \u2192 a newer version\
  \ is available (installable and newer than the wanted version).  \n    - Handles\
  \ edge cases such as missing installation (`install_not_found`), missing PyPI data\
  \ (`pypi_not_found`), and unspecified wanted versions.  \n\n  - `print_outdated(outdates:\
  \ List[Awaitable[OutdateResult]], quiet: bool)` (async)  \n    - Initializes `colorama`\
  \ for cross\u2011platform colour support.  \n    - Builds a table with headers **Name**,\
  \ **Installed**, **Wanted**, **Latest**.  \n    - Prints status messages:  \n  \
  \    - `\"No requirements found.\"` (red) when the input list is empty.  \n    \
  \  - `\"Everything is up\u2011to\u2011date!\"` (cyan, bold) when no rows are added.\
  \  \n      - Colour legend explaining red/green meanings (both bold).  \n    - Renders\
  \ the table using `terminaltables.AsciiTable`.  \n    - Exits with status **1**\
  \ (via `sys.exit(1)`) when `quiet` is `False`, signalling that outdated packages\
  \ exist.  \n\n- **Behavioural notes for end\u2011users**  \n  - When outdated packages\
  \ are detected, the command finishes with a non\u2011zero exit code (unless `--quiet`\
  \ is used), which can be integrated into CI pipelines.  \n  - The colour\u2011coded\
  \ output helps users quickly identify:  \n    - Packages that cannot be resolved\
  \ or are outside the required spec (`red`).  \n    - Packages that can be safely\
  \ upgraded (`green`).  \n\n- **Dependencies** \u2013 The module relies on external\
  \ libraries: `colorama`, `termcolor`, `terminaltables`, and the internal `OutdateResult`\
  \ type from `.check_outdated`. Ensure these are installed in the runtime environment.\
  \  \n\n- **Integration points** \u2013 This file is typically imported by the CLI\
  \ entry\u2011point of *pip\u2011outdated*. Maintainers should expose a high\u2011\
  level async call that supplies a list of `OutdateResult` awaitables and forwards\
  \ the `quiet` flag from user arguments.  \n\n- **Error handling** \u2013 All edge\
  \ conditions (missing packages, missing PyPI metadata, no requirements) generate\
  \ user\u2011readable coloured messages rather than raising exceptions, keeping the\
  \ CLI robust for end\u2011users.  "
