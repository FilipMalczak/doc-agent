- content: "## `pip_outdated/print_outdated.py` \u2013 User\u2011Facing Overview \
    \ \n\n**Purpose**  \n- Supplies the **visual reporting** for the *pip\u2011outdated*\
    \ tool.  \n- Takes a collection of `OutdateResult` objects (one per requirement)\
    \ and prints a concise, colour\u2011coded table that shows which packages are\
    \ outdated, what version is installed, the version the user *wants*, and the latest\
    \ available release.\n\n**Key Functions**\n\n- `make_row(outdate: OutdateResult)\
    \ -> Optional[List[str]]`  \n  - Builds a table row for a single package **only\
    \ if the package is outdated**.  \n  - Applies colour coding:  \n    - **Red**\
    \ \u2192 information missing or version not satisfying the specifier (e.g., install\
    \ not found, PyPI not reachable).  \n    - **Green** \u2192 an upgrade is available\
    \ (installed version lower than wanted/latest).  \n    - **Plain** \u2192 current\
    \ version is already the wanted/latest version.  \n\n- `async def print_outdated(outdates:\
    \ List[Awaitable[OutdateResult]], quiet: bool)`  \n  - Initializes colour handling\
    \ with `colorama`.  \n  - Constructs the table header `[\"Name\", \"Installed\"\
    , \"Wanted\", \"Latest\"]`.  \n  - Iterates over the awaited `OutdateResult` objects,\
    \ using `make_row` to collect rows for packages that need attention.  \n  - **Output\
    \ scenarios**:  \n    - **No requirements found** \u2192 prints a red warning.\
    \  \n    - **All up\u2011to\u2011date** \u2192 prints a cyan message: \u201CEverything\
    \ is up\u2011to\u2011date!\u201D.  \n    - **Some outdated** \u2192 prints a red\
    \ legend (\u201CRed = unavailable/outdated/out of version specifier\u201D) and\
    \ a green legend (\u201CGreen = updatable\u201D), then renders the table with\
    \ `terminaltables.AsciiTable`.  \n  - If `quiet` is **False**, the function terminates\
    \ the process with a non\u2011zero exit code (`sys.exit(1)`) to signal that updates\
    \ are required.  \n\n**User\u2011Relevant Behaviour**\n\n- **Colour\u2011coded\
    \ readability**:  \n  - Red entries flag problems you may need to investigate\
    \ (missing package, version mismatch, unreachable PyPI).  \n  - Green entries\
    \ indicate packages you can safely upgrade.  \n- **Exit status**:  \n  - By default\
    \ (`quiet=False`), the tool exits with status\u202F1 when any outdated packages\
    \ are detected, allowing integration into CI pipelines or scripts that need to\
    \ fail on stale dependencies.  \n  - Using the `--quiet` flag (or passing `quiet=True`\
    \ programmatically) suppresses the non\u2011zero exit, useful for informational\
    \ runs.  \n\n**Typical Usage Flow (from the end\u2011user perspective)**  \n\n\
    1. Run the main *pip\u2011outdated* command (e.g., `python -m pip_outdated`).\
    \  \n2. The command internally gathers dependency information, creates `OutdateResult`\
    \ objects, and calls `print_outdated`.  \n3. Observe the coloured table in the\
    \ terminal to decide which packages to upgrade.  \n4. If you prefer the command\
    \ to **only report** without failing the script, add the `--quiet` option.  \n\
    \n**What You Don't Need to Know**  \n- Internal implementation details such as\
    \ the exact structure of `OutdateResult`, the use of `await`, or the underlying\
    \ `terminaltables` rendering engine.  \n\n**Bottom Line for End Users**  \n- This\
    \ module turns raw version data into an easy\u2011to\u2011read, colour\u2011highlighted\
    \ report, helping you quickly spot and address outdated Python packages."
