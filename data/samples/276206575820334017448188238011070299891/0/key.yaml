      \ others use `parse_requirements`), and yields all discovered `Requirement`\
      \ objects.\"  \n  - *Reason*: The function contains a conditional `requires\
      \ = parse_cfg(file) if file.suffix == \".cfg\" else parse_requirements(file)`\
      \ and then yields from `requires`.\n\n- \"The helper `parse_require(text)` removes\
      \ any option flags (e.g., `--no-binary`) that start with a hyphen after the\
      \ package specifier, then attempts to construct a `packaging.requirements.Requirement`\
      \ object; if parsing fails (`InvalidRequirement`), it returns `None`.\"  \n\
      \  - *Reason*: It applies a regex `r\"(.*?)\\s--?[a-z]\"` to strip options,\
      \ then wraps `Requirement(text)` in a try/except block returning `None` on `InvalidRequirement`.\n\
      \n- \"The module's docstring states that it deals with \u201CFind requirements\u201D\
      \ and references the pip requirement\u2011file format documentation URL.\" \
      \ \n  - *Reason*: The triple\u2011quoted string at the top of the file contains\
