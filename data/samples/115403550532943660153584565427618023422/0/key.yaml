"## Command\u2011Line Interface  \n\n```\nusage: pip-outdated [-h] [-v] [-q] [<file>\
  \ [<file> ...]]\n\nFind outdated dependencies in your requirements.txt or setup.cfg\
  \ file.\n```\n\n### Positional Arguments  \n\n- `<file>` \u2013 One or more requirement\
  \ files to read.  \n  - Accepts **glob patterns** (e.g., `*-requirements.txt`).\
  \  \n  - Default values: `[\"requirements.txt\", \"setup.cfg\"]`.\n"
