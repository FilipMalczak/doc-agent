"# Directory\u2011Level Notes for **`pip_outdated/`**\n## 1. Project Overview  \n\
  ## 2. High\u2011Level Workflow  \n## 3. Core Modules  \n## 4. Important Data Structures\
  \  \n## 5. Verbosity & Quiet Modes  \n## 6. Concurrency Model  \n\n- The tool uses\
  \ **`asyncio`** together with **`aiohttp`**:  \n  - Subprocess calls (`pip show`)\
  \ and HTTP GET requests are wrapped in `async` functions.  \n  - Tasks are scheduled\
  \ concurrently, limited only by the aiohttp connector\u2019s `limit=5`.  \n- **Why\
  \ not `asyncio.run`?** \u2013 To avoid closing the event loop prematurely, which\
  \ can clash with aiohttp\u2019s connection cleanup (see aiohttp issue #1925). The\
  \ code instead fetches the current loop via `asyncio.get_event_loop()`.\n\n--- \
