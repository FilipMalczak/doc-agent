      # Project\u2011Level Documentation \u2013 **pip\u2011outdated**\n## 1. Quick\
      \ Project Summary\n## 2. Installation\n## 3. Command\u2011Line Interface (CLI)\n\
      ## 4. Core Packages and Modules\n| Module | Role | Key Functions / Classes |\n\
      |--------|------|--------------------------|\n| `__init__.py` | CLI entry point\
      \ (`main`, `_main`) and argument parsing (`parse_args`). | `main()`, `_main()`,\
      \ `parse_args()` |\n| `__main__.py` | Enables `python -m pip_outdated`. | imports\
      \ and calls `main()` |\n| `find_require.py` | Parses requirement specifications\
      \ from plain files and `setup.cfg`. | `find_require()`, `parse_require*()`,\
      \ `parse_cfg()` |\n| `check_outdated.py` | Asynchronously fetches local and\
      \ PyPI versions, determines status. | `OutdateResult`, `check_outdated()`, `get_local_version()`,\
      \ `get_pypi_versions()` |\n| `print_outdated.py` | Renders the colour\u2011\
      coded result table. | `make_row()`, `print_outdated()` |\n| `session.py` | Provides\
      \ a pre\u2011configured `aiohttp.ClientSession`. | `get_session()` |\n| `verbose.py`\
      \ | Global verbose flag handling. | `set_verbose()`, `verbose()` |\n\n---\n\n\
