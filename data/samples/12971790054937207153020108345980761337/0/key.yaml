      \ users frequently run the tool behind fast networks and experience slow scans,\
      \ consider raising the limit after benchmarking.  \n    - If remote package\
      \ indexes start rejecting the tool for too many concurrent connections, lower\
      \ the limit.  \n\n- **Resource Management**  \n  - The function **creates**\
      \ a new `ClientSession` each call.  \n  - **Best practice for callers:**  \n\
      \    - Reuse the returned session for the whole run of the tool.  \n    - Explicitly\
      \ **close** the session (`await session.close()`) when finished to free sockets\
      \ and avoid warnings.  \n\n- **Compatibility**  \n  - Relies on `aiohttp` (an\
      \ asynchronous HTTP library).  \n  - Ensure the project's `requirements.txt`\
      \ or `pyproject.toml` pins a version compatible with the project's Python version\
      \ (\u22653.8 recommended).  \n\n- **Testing Implications**  \n  - In unit tests,\
      \ mock `aiohttp.ClientSession` or patch `get_session` to avoid real network\
      \ calls.  \n  - Verify that the `User-Agent` header is present in mock requests.\
