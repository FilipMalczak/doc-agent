      ## 8. Changelog (selected entries)\n- **0.8.0** (2025\u201108\u201109) \u2013\
      \ Dropped `setuptools` dependency; switched to `configparse` for reading `setup.cfg`.\n\
      - **0.7.0** (2024\u201108\u201113) \u2013 Ignored `InvalidVersion` errors.\n\
      - **0.6.0** (2023\u201101\u201101) \u2013 Fetch package versions via the `pip`\
      \ CLI (supports virtual\u2011env versions); removed `cchardet`.\n- **0.5.0**\
      \ (2022\u201101\u201112) \u2013 Added type hints; bumped dependencies.\n- **0.4.0**\
      \ (2020\u201101\u201130) \u2013 **Breaking:** Python\u202F\u2265\u202F3.7 required;\
      \ added parallel requests and `--quiet`.\n- **0.3.0** (2019\u201110\u201113)\
      \ \u2013 **Breaking:** non\u2011zero exit code when any dependency is outdated;\
