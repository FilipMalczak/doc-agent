  facing documentation, onboarding material, or a developer guide.\n\n---  \n\n##\
  \ 7. Important Data Structures  \n\n### `OutdateResult` (in `check_outdated.py`)\
  \  \n\n| Field | Type | Meaning |\n|-------|------|---------|\n| `requirement` |\
  \ `Requirement` | Parsed requirement line (name, specifier, extras). |\n| `version`\
