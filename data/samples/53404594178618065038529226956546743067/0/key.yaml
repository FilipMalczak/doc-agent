"## Project Component: `pip_outdated/print_outdated.py`\n\n### Overview\n- **Purpose**:\
  \ Formats and displays the results of a dependency\u2011out\u2011of\u2011date check\
  \ as a colored table in the terminal.  \n- **Target audience**: End\u2011users of\
  \ the *pip\u2011outdated* utility who want a clear, visual summary of which packages\
  \ need updating.\n\n### Key Functions\n\n#### `make_row(outdate: OutdateResult)\
  \ -> Optional[List[str]]`\n- **Input**: An `OutdateResult` instance (produced by\
  \ `check_outdated.py`).  \n- **Output**:  \n  - `None` if the package is **not outdated**.\
  \  \n  - A list of four string cells (`[name, installed, wanted, latest]`) otherwise.\
  \  \n- **Color logic** (uses `termcolor.colored`):  \n  - **Installed version**\
  \ (`colored_current`)  \n    - Red\u202F+\u202Fbold \u2192 installation info missing\
  \ or deliberately ignored.  \n    - Normal \u2192 version is available.  \n  - **Wanted\
  \ version** (`colored_wanted`)  \n    - Red\u202F+\u202Fbold \u2192 no version data\
  \ on PyPI or `wanted` unset.  \n    - Green\u202F+\u202Fbold \u2192 a newer version\
  \ is available **and** the package is installed.  \n    - Normal \u2192 the wanted\
  \ version is already installed.  \n  - **Latest version** (`colored_latest`)  \n\
  \    - Red\u202F+\u202Fbold \u2192 PyPI data unavailable.  \n    - Green\u202F+\u202F\
  bold \u2192 a newer version exists **and** the package is installed.  \n    - Normal\
  \ \u2192 the latest version matches the installed one.\n\n#### `print_outdated(outdates:\
  \ List[Awaitable[OutdateResult]], quiet: bool)`\n- **Async** \u2013 expects a list\
  \ of awaitable `OutdateResult` objects (e.g., coroutines that query package metadata).\
  \  \n- **Workflow**:  \n  1. Initializes `colorama` for cross\u2011platform ANSI\
  \ color support.  \n  2. Builds a data matrix starting with headers: `[\"Name\"\
  , \"Installed\", \"Wanted\", \"Latest\"]`.  \n  3. Iterates through each awaited\
  \ result, appends a row via `make_row`.  \n  4. Handles three terminal states: \
  \ \n     - **No requirements** (`count == 0`) \u2192 prints a red warning: `\"No\
  \ requirements found.\"` and exits early.  \n     - **All up\u2011to\u2011date**\
  \ (`len(data) == 1`) \u2192 prints a cyan, bold message: `\"Everything is up-to\u2011\
  date!\"`.  \n     - **Out\u2011of\u2011date packages present** \u2192 prints a legend\
  \ explaining color semantics, then renders an ASCII table using `terminaltables.AsciiTable`.\
  \  \n  5. If `quiet` is **False**, the function ends with `sys.exit(1)` to signal\
  \ that updates are needed (useful for CI pipelines).  \n"
