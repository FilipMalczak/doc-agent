"## Project\u202F\u2013\u202F`pip_outdated/print_outdated.py` \u2013\u202FUser\u2011\
  Facing Documentation Notes  \n\n### Overview  \n- This module is responsible for\
  \ **displaying the results of a pip\u2011outdated check** in a readable, colour\u2011\
  coded table.  \n- It is designed to be called **asynchronously** by the CLI entry\u2011\
  point when the user runs the `pip\u2011outdated` command.\n\n### Primary Public\
  \ API  \n\n| Function | Signature | Purpose |\n|----------|-----------|---------|\n\
  | `make_row` | `make_row(outdate: OutdateResult) -> Optional[List[str]]` | Builds\
  \ a single table row for a package that is outdated. Returns `None` if the package\
  \ is up\u2011to\u2011date. |\n| `print_outdated` | `async print_outdated(outdates:\
  \ List[Awaitable[OutdateResult]], quiet: bool)` | Collects all rows, prints a colour\u2011\
  coded table, and (unless `quiet` is `True`) exits the process with status\u202F\
  1 when any package needs updating. |\n\n### Behaviour Details  \n\n- **Colour conventions**\
  \ (displayed in the console):  \n  - **Red** \u2013 \u201Cunavailable\u201D, \u201C\
  outdated\u201D, or \u201Cdoes not satisfy the version specifier\u201D.  \n  - **Green**\
  \ \u2013 \u201Cupdatable\u201D (a newer version is available).  \n  - **Cyan (bold)**\
  \ \u2013 \u201CEverything is up\u2011to\u2011date!\u201D message.  \n\n- **Message\
  \ flow in `print_outdated`**  \n  1. Initialise `colorama` for cross\u2011platform\
  \ colour support.  \n  2. Prepare the header row `[\"Name\", \"Installed\", \"Wanted\"\
  , \"Latest\"]`.  \n  3. Iterate over the `outdates` awaitables, building rows with\
  \ `make_row`.  \n  4. If **no requirements** were found (`count == 0`), print a\
  \ red \u201CNo requirements found.\u201D and stop.  \n  5. If **all packages are\
  \ up\u2011to\u2011date** (`len(data) == 1`), print a cyan bold \u201CEverything\
  \ is up\u2011to\u2011date!\u201D and stop.  \n  6. Otherwise:  \n     - Print the\
  \ colour legend (red / green).  \n     - Render the table with `terminaltables.AsciiTable`.\
  \  \n     - Print the formatted table.  \n     - If `quiet` is **False**, terminate\
  \ the program with exit code **1** to signal that updates are required.  \n\n- **`make_row`\
  \ colour logic**  \n  - **Current version** (`colored_current`) \u2013 red & bold\
  \ when the package is not installed or the install is intentionally omitted.  \n\
  \  - **Wanted version** (`colored_wanted`) \u2013  \n    - Red & bold \u201CNone\u201D\
  \ when the package isn\u2019t listed on PyPI or has no wanted specifier.  \n   \
  \ - Green & bold when a newer *wanted* version exists and the package is installed.\
  \  \n    - Plain text otherwise.  \n  - **Latest version** (`colored_latest`) \u2013\
  \ similar to *Wanted* but always reflects the newest version on PyPI.  \n\n### Expected\
  \ `OutdateResult` Interface  \n\nThe module assumes that each `OutdateResult` instance\
  \ provides the following attributes / methods:\n\n- `name: str` \u2013 package name.\
  \  \n- `version: str | PackagingVersion` \u2013 currently installed version.  \n\
  - `wanted: Optional[str | PackagingVersion]` \u2013 the version that satisfies the\
  \ user's requirement specifier (may be `None`).  \n- `latest: str | PackagingVersion`\
  \ \u2013 newest version available on PyPI.  \n- `outdated() -> bool` \u2013 `True`\
  \ if the package needs attention.  \n- `install_not_found() -> bool` \u2013 `True`\
  \ when the package isn\u2019t installed locally.  \n- `install_not_wanted() -> bool`\
  \ \u2013 `True` when the user explicitly requested not to install it.  \n- `pypi_not_found()\
  \ -> bool` \u2013 `True` when the package cannot be resolved on PyPI.  \n\n### Runtime\
  \ Dependencies  \n\n- **`colorama`** \u2013 ensures ANSI colour codes work on Windows\
  \ terminals.  \n- **`termcolor`** \u2013 helper to wrap strings with colour/attribute\
  \ codes.  \n- **`terminaltables`** \u2013 provides the `AsciiTable` class for rendering\
  \ plain\u2011text tables.  \n\nThese packages must be installed for the module to\
  \ operate correctly; they are declared as runtime dependencies of the `pip\u2011\
  outdated` tool.\n\n### Integration Points  \n\n- **CLI command** \u2013 `print_outdated`\
  \ is invoked after the asynchronous check performed by `check_outdated.py`.  \n\
  - **Exit\u2011code contract** \u2013  \n  - `0` \u2192 either no requirements or\
  \ everything up\u2011to\u2011date.  \n  - `1` \u2192 one or more packages are outdated\
  \ (unless the `--quiet` flag suppresses the exit).  \n\n### User\u2011Facing Documentation\
  \ Highlights  \n\n- **What the user sees**: a clear, colour\u2011coded table that\
  \ instantly tells which packages are behind, which versions are desired, and which\
  \ newer releases exist.  \n- **How to interpret colours**: red means \u201Ccannot\
  \ be updated or does not match the spec\u201D; green means \u201Ca newer version\
  \ is available and can be upgraded\u201D.  \n- **Quiet mode** (`--quiet`): the table\
  \ is still printed, but the process exits with status\u202F0, useful for scripts\
  \ that only need the visual output.  \n- **Error handling**: if no requirements\
  \ are detected, a friendly red warning is shown; if everything is current, a celebratory\
  \ cyan message is displayed.  \n\nThese notes can be directly transformed into user\
  \ guides, man\u2011pages, or online help sections for the `pip\u2011outdated` utility."
