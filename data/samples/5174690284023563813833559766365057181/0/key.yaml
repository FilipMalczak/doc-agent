"### 4.5 Technical Details (for advanced users)\n- **Async Implementation** \u2013\
  \ Uses `asyncio` with a manually managed event loop (`run_until_complete`) to work\
  \ around an `aiohttp` bug that closes the loop when `asyncio.run` is used.  \n-\
  \ **Session Limits** \u2013 HTTP requests are limited to 5 concurrent connections\
  \ to avoid overloading PyPI servers.  \n- **Version Filtering** \u2013 Only stable\
  \ (non\u2011prerelease) releases are considered; prereleases are ignored.  \n- **Requirement\
  \ Parsing Edge Cases**\n  - Inline `#` inside URLs may be stripped incorrectly.\n\
  \  - Only backslash (`\\`) line continuations are supported.\n  - Options after\
  \ a requirement (e.g., `--no-binary`) are removed by a simple regex, which may truncate\
  \ complex options.\n"
