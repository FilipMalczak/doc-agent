"## `pip_outdated` \u2013 Directory\u2011Level Documentation Notes\n### 1. Project\
  \ Overview\n### 2. Command\u2011Line Interface (CLI)\n### 3. Core Modules & Their\
  \ Responsibilities\n### 4. Detailed Module Highlights\n### 5. Extensibility Points\
  \ (where developers might add features)\n### 6. User\u2011Facing Behaviour Summary\n\
  - Run the tool directly (`pip-outdated`) or via `python -m pip_outdated`.\n- By\
  \ default it checks `requirements.txt` and `setup.cfg`.\n- Use `-v/--verbose` for\
  \ detailed processing logs.\n- Use `-q/--quiet` to avoid a failing exit status in\
  \ CI pipelines.\n- Output is a colour\u2011coded table; red entries indicate problems,\
  \ green entries show upgrades.\n- Exit code **1** signals at least one upgrade is\
  \ available (unless `--quiet`).\n\n---\n"
