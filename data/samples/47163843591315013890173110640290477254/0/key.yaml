"## Implementation notes (relevant for users)  \n\n- The entry point `main()` runs\
  \ the asynchronous workflow with `asyncio.get_event_loop().run_until_complete(_main())`\
  \ instead of `asyncio.run()`. This workaround avoids a known issue where `asyncio.run`\
  \ closes the event loop (see comment linking to aiohttp issue #1925).  \n- All heavy\
  \ lifting (`find_require`, `check_outdated`, `print_outdated`, and session handling)\
  \ is performed in the `_main()` coroutine, keeping the top\u2011level script lightweight.\
  \  \n\n---  \n\n*These notes capture the user\u2011facing aspects of `pip_outdated/__init__.py`\
  \ for future documentation.*"
