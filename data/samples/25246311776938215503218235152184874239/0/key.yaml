"## pip-outdated \u2013 Quick Reference\n\n### Overview\n- **Purpose**: Detect outdated,\
  \ missing, or incompatible dependencies listed in `requirements.txt` or `setup.cfg`.\n\
  - **Output**: Shows a table with color\u2011coded status for each dependency.\n\
  - **Note**: For a simple list of updatable packages you can also run `pip list --outdated`.\n\
  \n---\n### Installation\n```bash\npip install pip-outdated\n```\n\n---\n### Usage\n\
  ```bash\npip-outdated [options] [<file> ...]\n```\n- **Positional arguments** \u2013\
  \ one or more requirement files (supports glob patterns). Default: `['requirements.txt',\
  \ 'setup.cfg']`.\n- **Options**\n  - `-h`, `--help` \u2013 Show help message and\
  \ exit.\n  - `-v`, `--verbose` \u2013 Print verbose information (default: `false`).\n\
  \  - `-q`, `--quiet` \u2013 Do **not** return exit code\u202F1 when everything is\
  \ up\u2011to\u2011date (default: `false`).\n\n#### Example commands\n- Check multiple\
  \ files (e.g., `test-requirements.txt` and `dev-requirements.txt`):\n  ```bash\n\
  \  pip-outdated *-requirements.txt\n  ```\n- Check all files in a folder:\n  ```bash\n\
  \  pip-outdated requirements/*.txt\n  ```\n\n---\n### TODO (planned features)\n\
  - Add an option to automatically update the package.\n- Add an option to update\
  \ the `requirements.txt` / `setup.cfg` file.\n- Add a global list option (e.g.,\
  \ `-g, --global`).\n\n---\n### Changelog (selected)\n- **0.8.0** (2025\u201108\u2011\
  09) \u2013 Dropped `setuptools` dependency; switched to `configparse` for reading\
  \ `setup.cfg`.\n- **0.7.0** (2024\u201108\u201113) \u2013 Ignored `InvalidVersion`\
  \ errors.\n- **0.6.0** (2023\u201101\u201101) \u2013 Fetch package versions via\
  \ the `pip` CLI (supports virtual\u2011env versions); removed `cchardet`.\n- **0.5.0**\
  \ (2022\u201101\u201112) \u2013 Added type hints; bumped dependencies.\n- **0.4.0**\
  \ (2020\u201101\u201130) \u2013 **Breaking:** Python\u202F\u2265\u202F3.7 required;\
  \ added parallel requests and `--quiet`.\n- **0.3.0** (2019\u201110\u201113) \u2013\
  \ **Breaking:** non\u2011zero exit code when any dependency is outdated; stopped\
  \ checking prereleases; added `setup_requires` & `extras_require` handling.\n- **0.2.0**\
  \ (2019\u201102\u201110) \u2013 Updated core dependencies (colorama, packaging,\
  \ requests, termcolor, terminaltables).\n- **0.1.0** (2018\u201105\u201112) \u2013\
  \ Initial release.\n\n---\n### Quick Start Checklist for Users\n1. **Install** the\
  \ tool (`pip install pip-outdated`).\n2. **Run** it in your project root (or specify\
  \ files):\n   - `pip-outdated` \u2013 checks default files.\n   - `pip-outdated\
  \ *-requirements.txt` \u2013 custom pattern.\n   - `pip-outdated requirements/*.txt`\
  \ \u2013 folder scan.\n3. **Interpret** the table:\n   - **Green** \u2192 up\u2011\
  to\u2011date.\n   - **Yellow** \u2192 newer version available.\n   - **Red** \u2192\
  \ version specifier is not satisfied or package missing.\n4. **Optional**: Use `-q`\
  \ to suppress non\u2011zero exit status, or `-v` for more details.\n\n---\n### References\n\
  - PyPI: <https://pypi.org/project/pip-outdated/>\n- CI status: <https://travis-ci.com/eight04/pip-outdated>\n\
  - Test coverage: <https://codecov.io/gh/eight04/pip-outdated>\n"
