  - content: "<id>cb702584-8007-568a-80b4-c4dbaa226784</id>\n<document_type>source_file</document_type>\n\
      <details>\n  <path>pip_outdated/print_outdated.py</path>\n</details>\n<provenance>\n\
      \  <list>\n  </list>\n</provenance>\n<content>\nimport sys\nfrom typing import\
      \ Awaitable, List, Optional\n\nimport colorama\n\nfrom termcolor import colored\n\
      from terminaltables import AsciiTable as Table\n\nfrom .check_outdated import\
      \ OutdateResult\n\n\ndef make_row(outdate: OutdateResult) -> Optional[List[str]]:\n\
      \    if not outdate.outdated():\n        return None\n        \n    def colored_current():\n\
      \        if outdate.install_not_found() or outdate.install_not_wanted():\n \
      \           return colored(str(outdate.version), \"red\", attrs=[\"bold\"])\n\
      \        return str(outdate.version)\n        \n    def colored_wanted():\n\
      \        if outdate.pypi_not_found() or not outdate.wanted:\n            return\
      \ colored(\"None\", \"red\", attrs=[\"bold\"])\n        if not outdate.install_not_found()\
      \ and outdate.version < outdate.wanted:\n            return colored(str(outdate.wanted),\
      \ \"green\", attrs=[\"bold\"])\n        return str(outdate.wanted)\n       \
      \ \n    def colored_latest():\n        if outdate.pypi_not_found():\n      \
      \      return colored(\"None\", \"red\", attrs=[\"bold\"])\n        if not outdate.install_not_found()\
      \ and outdate.version < outdate.latest:\n            return colored(str(outdate.latest),\
      \ \"green\", attrs=[\"bold\"])\n        return str(outdate.latest)\n    \n \
      \   return [\n        outdate.name,\n        colored_current(),\n        colored_wanted(),\n\
      \        colored_latest()\n    ]\n\nasync def print_outdated(outdates: List[Awaitable[OutdateResult]],\
      \ quiet: bool):\n    colorama.init()\n    \n    data = [[\"Name\", \"Installed\"\
      , \"Wanted\", \"Latest\"]]\n    count = 0\n    for count, outdate in enumerate(outdates,\
      \ 1):\n        row = make_row(await outdate)\n        if row:\n            data.append(row)\n\
      \            \n    if not count:\n        print(colored(\"No requirements found.\"\
      , \"red\"))\n        return\n        \n    if len(data) == 1:\n        print(colored(\"\
      Everything is up-to-date!\", \"cyan\", attrs=[\"bold\"]))\n        return\n\
      \        \n    print(colored(\"Red = unavailable/outdated/out of version specifier\"\
      , \"red\", attrs=[\"bold\"]))\n    print(colored(\"Green = updatable\", \"green\"\
      , attrs=[\"bold\"]))\n    table = Table(data)\n    print(table.table)\n    if\
      \ not quiet:\n        sys.exit(1)\n\n</content>\n<additional_details>\n  <language>python</language>\n\
      \  <repo_function>code</repo_function>\n</additional_details>"
