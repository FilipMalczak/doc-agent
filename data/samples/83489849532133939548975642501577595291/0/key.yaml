"# Project\u2011Level Notes for **`pip\u2011outdated`**\n\nThese notes aggregate the\
  \ file\u2011level documentation (README, `setup.cfg`, `setup.py`, package source,\
  \ and test suite) into a cohesive outline that can be used as the backbone for user\u2011\
  facing documentation, onboarding material, or a developer guide.\n\n---  \n\n##\
  \ 1. Overview  \n\n- **Package name:** `\"pip-outdated\"`  \n- **Current version:**\
  \ `\"0.8.0\"` (as of August\u202F9\u202F2025)  \n- **Primary purpose:** Scan a project\u2019\
  s dependency specifications (`requirements.txt`, `setup.cfg`, or any glob\u2011\
  matched files) and report which packages have newer releases available on PyPI.\
  \  \n- **Target audience:** Developers who want a quick, colour\u2011coded audit\
  \ of their project\u2019s dependencies without manually parsing `pip list --outdated`.\
  \  \n\n---  \n\n## 2. Installation  \n\n```bash\npip install pip-outdated\n``` \
  \ \n\n- The package is published on PyPI (`https://pypi.org/project/pip-outdated`).\
  \  \n- Supported Python versions: **3.7**\u202Fand newer (minimum raised in version\u202F\
  0.4.0).  \n\n---  \n\n## 3. Command\u2011Line Interface  \n\n```\nusage: pip-outdated\
  \ [-h] [-v] [-q] [<file> [<file> ...]]\n```\n\n| Flag / Argument | Description |\
  \ Default |\n|-----------------|-------------|---------|\n| `<file>` (positional)\
  \ | One or more requirement files (supports glob patterns). Default files: `[\"\
  requirements.txt\", \"setup.cfg\"]`. | \u2014 |\n| `-h, --help` | Show help message\
  \ and exit. | \u2014 |\n| `-v, --verbose` | Enable diagnostic prints (file parsing,\
  \ per\u2011package status). | `False` |\n| `-q, --quiet` | Suppress the non\u2011\
  zero exit code when outdated packages are found. | `False` |\n\n### Example Invocations\
  \  \n\n- Scan all `*-requirements.txt` files:  \n\n  ```bash\n  pip-outdated *-requirements.txt\n\
  \  ```  \n\n- Scan every file inside a `requirements` folder:  \n\n  ```bash\n \
  \ pip-outdated requirements/*.txt\n  ```  \n\n---  \n"
