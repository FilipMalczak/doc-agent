"## pip-outdated \u2013 Quick Reference\n### Usage\n#### Example commands\n- Check\
  \ multiple files (e.g., `test-requirements.txt` and `dev-requirements.txt`):\n \
  \ ```bash\n  pip-outdated *-requirements.txt\n  ```\n- Check all files in a folder:\n\
  \  ```bash\n  pip-outdated requirements/*.txt\n  ```\n\n---"
