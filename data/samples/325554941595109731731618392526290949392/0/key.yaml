"### \U0001F6E1\uFE0F Maintainer\u2011Focused Notes  \n\n- **Dependency Management**:\
  \ The module relies on the external `packaging` library for requirement parsing\
  \ and version handling. Ensure this library is listed in the project's runtime dependencies.\
  \  \n- **Error Handling**:  \n  - If `pip show` fails (non\u2011zero exit code),\
  \ the function silently returns `None`. This is intentional to treat missing installations\
  \ as \u201Cnot found\u201D.  \n  - Network errors from PyPI are propagated via `raise_for_status()`.\
  \ Callers should catch `aiohttp.ClientError` to present a friendly message to users.\
  \  \n- **Performance**:  \n  - The design is fully asynchronous, allowing thousands\
  \ of packages to be checked concurrently with a modest number of open sockets (controlled\
  \ by the `aiohttp` connector limits).  \n  - Filtering of pre\u2011release versions\
  \ is done client\u2011side; no extra API parameters are needed.  \n- **Extensibility**:\
  \  \n  - If future requirements need to include pre\u2011release versions, modify\
  \ `get_pypi_versions` to drop the `if version.is_prerelease: continue` guard.  \n\
  \  - To support alternative package indexes, inject a base URL into `check_outdated`\
  \ and adjust the JSON path accordingly.  \n\n---\n"
