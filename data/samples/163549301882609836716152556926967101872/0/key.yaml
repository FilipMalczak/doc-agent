"**Notes for End\u2011User Documentation \u2013 `pip_outdated/check_outdated.py`**\n\
  \n- **Purpose**\n  - Provides the core logic for detecting outdated Python packages\
  \ in a virtual environment by comparing the locally\u2011installed version with\
  \ the versions available on PyPI.\n\n- **Key Data Structure**\n  - `OutdateResult`\
  \ (a `@dataclass`)\n    - **Fields**\n      - `requirement: Requirement` \u2013\
  \ the original requirement line (e.g., `requests>=2.0`).\n      - `version: Optional[Version]`\
  \ \u2013 version currently installed locally (or `None` if not installed).\n   \
  \   - `all_versions: List[Version]` \u2013 all released, non\u2011prerelease versions\
  \ found on PyPI for the package.\n      - `wanted: Optional[Version]` \u2013 the\
  \ newest version that satisfies the requirement\u2019s specifier (computed automatically).\n\
  \      - `latest: Optional[Version]` \u2013 the absolute newest version on PyPI\
  \ (computed automatically).\n    - **Computed Properties**\n      - `name` \u2013\
  \ shortcut to `requirement.name`.\n      - `install_not_found()` \u2013 `True` when\
  \ the package is not installed locally.\n      - `install_not_wanted()` \u2013 `True`\
  \ when the installed version does **not** satisfy the requirement specifier.\n \
  \     - `pypi_not_found()` \u2013 `True` when the package has no releases on PyPI\
  \ (unlikely, but handled).\n      - `outdated()` \u2013 `True` when the installed\
  \ version differs from either the *wanted* version or the *latest* version.\n\n\
  - **Main Async Functions**\n  - `get_local_version(name: str) -> Optional[Version]`\n\
  \    - Executes `pip show <name>` in a subprocess.\n    - Parses the `Version:`\
  \ line from the command output.\n    - Returns `None` if the package is not installed\
  \ or the command fails.\n  - `get_pypi_versions(name: str, session) -> List[Version]`\n\
  \    - Performs an HTTP GET to `https://pypi.org/pypi/<name>/json`.\n    - Extracts\
  \ all release keys, discarding:\n      - Invalid version strings (`InvalidVersion`).\n\
  \      - Pre\u2011release versions (`is_prerelease`).\n    - Returns a sorted list\
  \ of `Version` objects (oldest \u2192 newest).\n  - `check_outdated(require, session)\
  \ -> OutdateResult`\n    - Entry point used by the higher\u2011level CLI/tool.\n\
  \    - Normalises the package name using `canonicalize_name`.\n    - Retrieves the\
  \ locally installed version and the full list of PyPI versions.\n    - Returns a\
  \ populated `OutdateResult` instance.\n\n- **Operational Flow (as seen by the user)**\n\
  \  1. The tool reads each requirement (e.g., from `requirements.txt`).\n  2. For\
  \ each requirement it:\n     - Prints \u201CChecking: `<package>` `<specifier>`\u201D\
  \ when verbose mode is enabled.\n     - Determines the installed version (if any).\n\
  \     - Fetches the available versions from PyPI.\n     - Constructs an `OutdateResult`\
  \ that tells you:\n       - Whether the package is missing locally.\n       - Whether\
  \ the installed version satisfies the requirement.\n       - Whether a newer version\
  \ exists (either the newest that matches the specifier \u2013 *wanted* \u2013 or\
  \ the absolute newest \u2013 *latest*).\n  3. Consumers of `check_outdated` can\
  \ use the boolean helpers (`install_not_found`, `install_not_wanted`, `pypi_not_found`,\
  \ `outdated`) to decide how to report or act on each package.\n\n- **User\u2011\
  Facing Implications**\n  - **Detecting missing packages:** `install_not_found()`\
  \ \u2192 instruct the user to install the package.\n  - **Detecting version mismatches:**\
  \ `install_not_wanted()` \u2192 advise the user to upgrade/downgrade to meet the\
  \ declared specifier.\n  - **Detecting newer releases:** `outdated()` \u2192 suggest\
  \ updating to the newer version, optionally indicating whether the newer version\
  \ still satisfies the original specifier (`wanted`) or is a completely newer release\
  \ (`latest`).\n\n- **Design Choices Worth Noting**\n  - Only stable releases are\
  \ considered (pre\u2011releases are ignored).\n  - All version parsing relies on\
  \ the robust `packaging` library, ensuring PEP\u202F440 compliance.\n  - Asynchronous\
  \ implementation allows the tool to check many packages concurrently when integrated\
  \ with an `asyncio`\u2011based driver."
