- content: "{\n  \"response\": \"# Notes for End\u2011User Perspective\\n\\n- **Purpose**:\
    \ Provides asynchronous utilities to determine whether installed Python packages\
    \ are outdated compared with the versions available on PyPI.\\n\\n- **Main data\
    \ type**: `OutdateResult`\\n  - Holds the original `Requirement`, the locally\
    \ installed version (if any), all available versions from PyPI, and derived fields:\\\
    n    - `wanted`: newest version that satisfies the requirement\u2019s specifier.\\\
    n    - `latest`: newest version overall (excluding prereleases).\\n  - Helpful\
    \ properties and methods:\\n    - `name` \u2013 package name.\\n    - `install_not_found()`\
    \ \u2013 true when the package is not installed locally.\\n    - `install_not_wanted()`\
    \ \u2013 true when the installed version does not satisfy the requirement specifier.\\\
    n    - `pypi_not_found()` \u2013 true when no versions are found on PyPI.\\n \
    \   - `outdated()` \u2013 true when the installed version differs from either\
    \ the wanted or latest version.\\n\\n- **Key asynchronous functions**:\\n  - `get_local_version(name:\
    \ str) -> Optional[Version]`\\n    - Runs `pip show <name>` to fetch the installed\
    \ version.\\n    - Returns a `Version` object or `None` if the package is not\
    \ installed.\\n  - `get_pypi_versions(name: str, session) -> List[Version]`\\\
    n    - Queries the PyPI JSON API for the given package.\\n    - Returns a sorted\
    \ list of all non\u2011prerelease versions, ignoring any that cannot be parsed.\\\
    n  - `check_outdated(require, session) -> OutdateResult`\\n    - Combines the\
    \ above helpers: resolves the canonical package name, retrieves the local version,\
    \ fetches PyPI versions, and builds an `OutdateResult`.\\n    - Prints a verbose\
    \ message (`Checking: <name> <specifier>`) when verbose mode is enabled.\\n\\\
    n- **Typical workflow for an end\u2011user**:\\n  1. Construct a `Requirement`\
    \ object (e.g., from a `requirements.txt` line).\\n  2. Create an `aiohttp` (or\
    \ compatible) session.\\n  3. Call `await check_outdated(require, session)`.\\\
    n  4. Inspect the returned `OutdateResult` to see if the package is missing, outdated,\
    \ or already up\u2011to\u2011date.\\n\\n- **User\u2011facing benefits**:\\n  -\
    \ Quickly identify which dependencies need updating.\\n  - Supports asynchronous\
    \ execution, allowing batch checks without blocking.\\n  - Handles edge cases\
    \ like missing installations or unavailable PyPI data gracefully.\\n\\n- **Important\
    \ notes**:\\n  - Prerelease versions are deliberately ignored.\\n  - The module\
    \ relies on the external `verbose` function to control console output.\\n  - Errors\
    \ from the PyPI request (`raise_for_status`) will propagate; callers should handle\
    \ exceptions as needed.\\n\"\n}"
