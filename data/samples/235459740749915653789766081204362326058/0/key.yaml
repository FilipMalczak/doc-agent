      \ Honor sys.{stdout,stderr}.encoding, defaulting to utf8 if not set\nusername_0:\
      \ Currently, the logging layer defaults to using the system locale. However,\r\
      \nsince Python 3.2, the streams' encoding can be set via PYTHONIOENCODING.\r\
      \n\r\nThis PR changes the logger to get the encoding from the stream's\r\nencoding\
      \ attribute if set, otherwise defaulting to utf-8. This is\r\nconsistent with\
      \ what Python 3 does itself.\n<issue_comment>username_0: @username_1 This change\
      \ is just a revert of the previous PR, right?\n<issue_comment>username_1: Yes,\
      \ but I'm not convinced it's necessary to use the encoding of `sys.stdout` and\
      \ `sys.stderr`.\r\nI think we should just default to `utf-8`.\r\nThere's a [discussion](https://mail.python.org/pipermail/python-dev/2018-January/151287.html)\
      \ about `PYTHONIOENCODING`, and there's a note that \"Python programs should\
      \ not normally rely on sys.stdout.encoding anyway\".\r\n\r\nSince this is Python\
      \ 2.7, I don't think we should rely on this kind of non-guaranteed feature.\
      \ I'd propose a simple fix: change `locale.getpreferredencoding()` to `'utf-8'`.\r\
      \nWhat do you think?\n<issue_comment>username_0: @username_1 Yeah, as you can\
      \ see, that's exactly what I had before but changed it per your suggestion.\
      \ Now let's just default to `utf-8`. Are you ok with this PR then?\n<issue_comment>username_1:\
      \ Yes, let's do this."
