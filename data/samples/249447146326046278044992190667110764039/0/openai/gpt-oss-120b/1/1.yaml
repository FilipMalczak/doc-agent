    \ via an async HTTP session (`get_session`). Passes if no exception is raised.\
    \ |\\n\\n## Common Testing Patterns\\n- **pytest** is the test runner throughout\
    \ the suite.\\n- **`tmp_path` fixture** (in `test_parse_cfg.py`) is used to create\
