      \    <content>\n## Project Overview  \n- **Name:** `pip-outdated`  \n- **Purpose:**\
      \ Detect outdated, missing, or incompatible dependencies defined in `requirements.txt`\
      \ or `setup.cfg`.  \n- **Key Feature:** Presents results in a colored table;\
      \ compares installed versions against version specifiers.  \n- **Alternative:**\
      \ For a simple list of updatable packages, use `pip list --outdated`.\n\n##\
      \ Badges  \n- **Build:** ![Travis CI](https://travis-ci.com/eight04/pip-outdated.svg?branch=master)\
      \ \u2192 <https://travis-ci.com/eight04/pip-outdated>  \n- **Coverage:** ![Codecov](https://codecov.io/gh/eight04/pip-outdated/branch/master/graph/badge.svg)\
      \ \u2192 <https://codecov.io/gh/eight04/pip-outdated>\n\n## Installation  \n\
      ```bash\npip install pip-outdated\n```\n*Published on PyPI*: <https://pypi.org/project/pip-outdated/>\n\
      \n## Usage Synopsis  \n```bash\npip-outdated [-h] [-v] [-q] [<file> [<file>\
      \ ...]]\n```\n\n### Positional arguments  \n- `<file>`: One or more requirement\
      \ files (supports glob patterns).  \n  - Default: `requirements.txt`, `setup.cfg`\
      \  \n\n### Optional arguments  \n- `-h, --help`: Show help message and exit.\
      \  \n- `-v, --verbose`: Enable verbose output (default: `False`).  \n- `-q,\
      \ --quiet`: Do **not** exit with code\u202F1 when any dependency is outdated\
      \ (default: `False`).  \n\n### Practical examples  \n- **Check multiple requirement\
      \ files**  \n  ```bash\n  pip-outdated *-requirements.txt\n  ```\n- **Check\
      \ all files in a folder**  \n  ```bash\n  pip-outdated requirements/*.txt\n\
      \  ```\n\n## TODO (Future Enhancements)  \n- Add commands to automatically update\
      \ packages.  \n- Add commands to rewrite `requirements.txt` / `setup.cfg` with\
      \ updated versions.  \n- Add a global\u2011list mode (e.g., `-g, --global`)\
      \ to list *all* installed packages.\n\n## Changelog Highlights  \n\n| Version\
      \ | Date | Notable Changes |\n|---------|------|-----------------|\n| **0.8.0**\
      \ | Aug\u202F9\u202F2025 | Dropped `setuptools` dependency; switched to `configparse`\
      \ for reading `setup.cfg`. |\n| **0.7.0** | Aug\u202F13\u202F2024 | Silently\
      \ ignore `InvalidVersion` errors. |\n| **0.6.0** | Jan\u202F1\u202F2023 | \u2022\
      \ Bumped dependencies.<br>\u2022 Removed `cchardet`.<br>\u2022 Fetch package\
      \ version via `pip` CLI (works inside virtualenvs). |\n| **0.5.0** | Jan\u202F\
      12\u202F2022 | Added type hints; bumped dependencies. |\n| **0.4.0** | Jan\u202F\
      30\u202F2020 | **Breaking:** Minimum Python 3.7.<br>Added parallel request handling\
      \ and `--quiet` flag. |\n| **0.3.0** | Oct\u202F13\u202F2019 | **Breaking:**\
      \ Exit code\u202F1 when any dependency is outdated.<br>Fixed prerelease handling.<br>Added\
      \ support for `setup_requires` and `extras_require`. |\n| **0.2.0** | Feb\u202F\
      10\u202F2019 | Updated core dependencies (colorama, packaging, requests, termcolor,\
      \ terminaltables). |\n| **0.1.0** | May\u202F12\u202F2018 | Initial release.\
      \ |\n\n## Key Takeaways for Documentation Authors  \n- Emphasize that `pip-outdated`\
      \ is a **reporting** tool, not a package updater.  \n- Highlight the flexibility\
      \ of file globbing for multi\u2011file projects.  \n- Note the `--quiet` flag\
      \ for CI pipelines where a non\u2011zero exit code may be undesirable.  \n-\
      \ Mention the upcoming features in the TODO section to set user expectations.\
      \  \n- Include the changelog table for quick reference on breaking changes and\
      \ major improvements.  \n    </content>\n    </item>\n    <item index=\"1\"\
      >\n    <subject_path>pip_outdated</subject_path>\n    <subject_type>directory</subject_type>\n\
      \    <notes_format>markdown</notes_format>\n    <content>\n# Directory\u2011\
      Level Documentation \u2013 `pip_outdated/`\n\n## 1. Package Overview\n- **Name:**\
      \ `pip\u2011outdated`  \n- **Version:** `0.8.0`  \n- **Purpose:** A command\u2011\
      line tool that scans dependency files (`requirements.txt`, `setup.cfg`, or any\
      \ glob\u2011matched files) and reports packages that have newer releases on\
      \ PyPI.  \n- **Entry Points**\n  - Console script `pip-outdated` \u2192 `pip_outdated.__init__:main`\
      \  \n  - Python module execution `python -m pip_outdated` \u2192 `pip_outdated.__main__:main`\
      \  \n\n## 2. High\u2011Level Workflow\n1. **Argument Parsing** \u2013 `parse_args()`\
      \ (in `__init__.py`) defines `--verbose/-v`, `--quiet/-q`, and positional file/glob\
      \ arguments.  \n2. **Verbosity Control** \u2013 Global flag handled by `pip_outdated.verbose`\
      \ (`set_verbose` / `verbose`).  \n3. **Requirement Discovery** \u2013 `find_require.find_require(files)`\
      \ walks the supplied paths/patterns, parses plain requirement files and `setup.cfg`\
      \ files, and yields `packaging.requirements.Requirement` objects.  \n4. **HTTP\
      \ Session** \u2013 `session.get_session()` creates a single `aiohttp.ClientSession`\
      \ with a custom *User\u2011Agent* header and a connection limit of **5**.  \n\
      5. **Out\u2011of\u2011date Checks** \u2013 For each requirement, `check_outdated.check_outdated(require,\
      \ session)`:\n   - Retrieves the locally installed version (`pip show`).\n \
      \  - Pulls all stable releases from PyPI.\n   - Populates an `OutdateResult`\
      \ dataclass containing `installed`, `wanted`, and `latest` versions plus helper\
      \ predicates (`outdated()`, `install_not_found()`, etc.).  \n6. **Result Presentation**\
      \ \u2013 `print_outdated.print_outdated(outdates, quiet)` builds a colored ASCII\
      \ table:\n   - Columns: **Name**, **Installed**, **Wanted**, **Latest**.  \n\
      \   - Red\u202F=\u202Fmissing/unavailable, Green\u202F=\u202Fnewer version exists.\
      \  \n   - Exits with code `1` when any package is outdated unless `--quiet`\
      \ is set.  \n\n## 3. Module Summaries\n\n| Module | Core Responsibility | Key\
      \ Public API |\n|-------|----------------------|----------------|\n| `__init__.py`\
      \ | CLI orchestration (argument parsing, async loop handling) | `main()`, `_main()`,\
      \ `parse_args()` |\n| `__main__.py` | Standard \u201Cmodule\u2011as\u2011script\u201D\
      \ entry point | `python -m pip_outdated` |\n| `find_require.py` | Locate and\
      \ parse requirement specifications from files/globs | `find_require(files)`,\
      \ `parse_require(text)` |\n| `check_outdated.py` | Async version comparison\
      \ against PyPI | `OutdateResult` (dataclass), `check_outdated(require, session)`\
      \ |\n| `session.py` | Provide a pre\u2011configured `aiohttp.ClientSession`\
      \ | `get_session()` |\n| `print_outdated.py` | Render results as a colored table\
      \ and manage exit status | `print_outdated(outdates, quiet)` |\n| `verbose.py`\
      \ | Global verbose flag storage | `set_verbose(bool)`, `verbose()` |\n\n## 4.\
      \ User\u2011Facing Documentation Blueprint\n\n### 4.1 Installation\n```bash\n\
      pip install pip-outdated\n# This installs the console script `pip-outdated`\n\
      ```\n\n### 4.2 Quick Start\n```bash\n# Scan default files (requirements.txt\
      \ & setup.cfg)\npip-outdated\n\n# Scan a custom file or glob pattern\npip-outdated\
      \ my_deps/*.txt\n\n# Enable verbose debugging output\npip-outdated -v\n\n# Do\
      \ not fail with a non\u2011zero exit code when updates exist\npip-outdated -q\n\
      ```\n\n### 4.3 Command\u2011Line Reference\n| Option | Shortcut | Effect |\n\
      |--------|----------|--------|\n| `--verbose` | `-v` | Prints detailed status\
      \ lines (e.g., each package being checked). |\n| `--quiet`   | `-q` | Suppresses\
      \ the non\u2011zero exit code when outdated packages are found. |\n| `file`\
      \      | \u2013   | Zero or more positional arguments representing file paths\
      \ or glob patterns. Defaults to `[\"requirements.txt\", \"setup.cfg\"]`. |\n\
      \n### 4.4 Output Explanation\n- **Table Columns**\n  - **Name** \u2013 Package\
      \ name.\n  - **Installed** \u2013 Version currently installed locally (red if\
      \ not installed).\n  - **Wanted** \u2013 Newest version that satisfies the requirement\
      \ specifier (green if newer than installed).\n  - **Latest** \u2013 Absolute\
      \ newest stable version on PyPI (green if newer than installed).\n- **Color\
      \ Legend**\n  - **Red** \u2013 Information unavailable or version does not satisfy\
      \ the specifier.\n  - **Green** \u2013 A newer version exists and can be upgraded.\n\
      - **Exit Codes**\n  - `0` \u2013 All dependencies are up\u2011to\u2011date *or*\
      \ `--quiet` was used.  \n  - `1` \u2013 At least one dependency is outdated\
      \ *and* `--quiet` was *not* used (useful for CI pipelines).\n\n### 4.5 Technical\
      \ Details (for advanced users)\n- **Async Implementation** \u2013 Uses `asyncio`\
      \ with a manually managed event loop (`run_until_complete`) to work around an\
      \ `aiohttp` bug that closes the loop when `asyncio.run` is used.  \n- **Session\
      \ Limits** \u2013 HTTP requests are limited to 5 concurrent connections to avoid\
      \ overloading PyPI servers.  \n- **Version Filtering** \u2013 Only stable (non\u2011\
      prerelease) releases are considered; prereleases are ignored.  \n- **Requirement\
      \ Parsing Edge Cases**\n  - Inline `#` inside URLs may be stripped incorrectly.\n\
      \  - Only backslash (`\\`) line continuations are supported.\n  - Options after\
      \ a requirement (e.g., `--no-binary`) are removed by a simple regex, which may\
      \ truncate complex options.\n\n### 4.6 Extending / Customizing\n- **Adding New\
      \ File Types** \u2013 Extend `find_require.find_require` with a new parser that\
      \ yields `Requirement` objects similar to the existing `parse_cfg` and `parse_requirements`.\
      \  \n- **Changing HTTP Behaviour** \u2013 Modify `session.get_session` to adjust\
      \ headers or connection limits, or instantiate `aiohttp.ClientSession` directly\
      \ if deeper customization is needed.  \n- **Verbosity** \u2013 The `verbose`\
      \ flag is a lightweight global; for more sophisticated logging, replace uses\
      \ of `verbose()` with the standard `logging` module.\n\n## 5. Important Implementation\
      \ Notes (for documentation writers)\n\n- **Lazy Imports** \u2013 Heavy modules\
      \ (`aiohttp`, `check_outdated`, etc.) are imported inside the async main function\
      \ to keep CLI start\u2011up fast.  \n- **Global Verbose Flag** \u2013 Simple\
      \ boolean stored in `pip_outdated.verbose`; not thread\u2011safe and should\
      \ be set once at start\u2011up.  \n- **Error Handling** \u2013 Functions return\
      \ `None` or empty collections on failures (e.g., missing local package, unavailable\
      \ PyPI data) rather than raising, ensuring the tool continues processing other\
      \ packages.  \n- **Known Limitation** \u2013 The tool does not resolve transitive\
      \ dependencies; it only checks packages explicitly listed in the scanned files.\n\
      \n---\n\n*These directory\u2011level notes synthesize the file\u2011level information\
      \ into a cohesive description suitable for user\u2011facing documentation, onboarding\
      \ guides, and technical references for contributors.*\n    </content>\n    </item>\n\
      \    <item index=\"2\">\n    <subject_path>setup.cfg</subject_path>\n    <subject_type>file</subject_type>\n\
      \    <notes_format>markdown</notes_format>\n    <content>\n**Project Overview**\
      \  \n- **Name**: `\"pip-outdated\"`  \n- **Current version**: `\"0.8.0\"`  \n\
      - **Short description**: `\"Find outdated dependencies in your requirements.txt\
      \ or setup.cfg\"`  \n- **Intended audience**: Developers who need to quickly\
      \ identify outdated Python packages.  \n\n**Author & Contact**  \n- **Author**:\
      \ `\"eight\"`  \n- **Email**: `\"eight04@gmail.com\"`  \n\n**Project Home &\
      \ License**  \n- **Repository URL**: `\"https://github.com/eight04/pip-outdated\"\
      `  \n- **License**: `\"MIT\"`  \n\n**Classifiers (PyPI metadata)**  \n- Development\
      \ Status :: 4 - Beta  \n- Environment :: Console  \n- Intended Audience :: Developers\
      \  \n- Programming Language :: Python :: 3.7  \n- Topic :: Software Development\
      \ :: Build Tools  \n\n**Keywords**  \n- `\"pip\"`, `\"check\"`, `\"outdate\"\
      `, `\"npm\"`  \n\n**Installation Requirements**  \n- `aiohttp~=3.12`  \n- `colorama~=0.4.6`\
      \  \n- `packaging~=25.0`  \n- `termcolor~=3.1`  \n- `terminaltables~=3.1`  \n\
      \n**Packaging Options**  \n- The package is **zip\u2011safe** (`zip_safe = True`).\
      \  \n- Packages are discovered automatically (`packages = find:`) with the `tests`\
      \ directory excluded.  \n\n**Command\u2011Line Interface**  \n- A console script\
      \ is defined:  \n\n  ```bash\n  pip-outdated = pip_outdated:main\n  ```  \n\n\
      \  Running `pip-outdated` invokes the `main` function in the `pip_outdated`\
      \ module.  \n\n**Additional Configuration (`[vpip]` section)**  \n- `command_fallback\
      \ = \"python cute.py\"` \u2013 defines a fallback command that can be used by\
      \ tools that read the `vpip` configuration.  \n\n**Typical User Workflow** (for\
      \ documentation purposes)  \n1. **Install** the tool via `pip install pip-outdated`.\
      \  \n2. **Run** the command in a project directory containing `requirements.txt`\
      \ or `setup.cfg`:  \n\n   ```bash\n   pip-outdated\n   ```  \n\n3. The tool\
      \ will scan the listed dependencies and report any that are newer than the versions\
      \ currently specified.  \n\n**Notes for Documentation Writers**  \n- Emphasize\
      \ that the tool works with both `requirements.txt` **and** `setup.cfg`.  \n\
      - Highlight that the project is still in **Beta**, so users might encounter\
      \ edge cases.  \n- Mention the required Python version (3.7) based on the classifier.\
      \  \n- Provide examples of the output format (e.g., a table of outdated packages)\
      \ using the `terminaltables` dependency.  \n\n**Future Documentation Topics**\
      \  \n- How to customize the fallback command (`[vpip]`).  \n- Extending the\
      \ tool to support additional package managers.  \n- Contributing guidelines\
      \ (not present in `setup.cfg` but useful for a contributor guide).  \n    </content>\n\
      \    </item>\n    <item index=\"3\">\n    <subject_path>setup.py</subject_path>\n\
      \    <subject_type>file</subject_type>\n    <notes_format>markdown</notes_format>\n\
      \    <content>\n**File:** `setup.py`  \n**Type:** Python source file \u2013\
      \ project configuration (packaging)\n\n---\n\n### Overview\n- Shebang line:\
      \ `#! python3` \u2013 indicates the script should be executed with the system\u2019\
      s default Python\u202F3 interpreter.  \n- Imports `setup` from the **setuptools**\
      \ package.  \n- Calls `setup()` **without any arguments**.\n\n---\n\n### Key\
      \ Elements\n- `#!/usr/bin/env python3` (implicitly suggested by the shebang)\
      \ \u2013 makes the file directly executable on *nix systems.  \n- `from setuptools\
      \ import setup` \u2013 pulls the primary packaging entry point from the widely\u2011\
      used **setuptools** library.  \n- `setup()` \u2013 placeholder invocation; currently\
      \ provides **no metadata** (e.g., `name`, `version`, `packages`, `author`, etc.).\n\
      \n---\n\n### Observations for the User  \n- The file exists, but it does **not**\
      \ define any packaging metadata, so running `python setup.py install` or similar\
      \ commands would not install anything useful.  \n- Presence of this minimal\
      \ script suggests the project is **in an early stage** or that packaging details\
      \ may be intended to live elsewhere (e.g., a `pyproject.toml`).  \n- Because\
      \ `setup()` is empty, tools that rely on `setup.cfg` or `pyproject.toml` will\
      \ also find no configuration here.\n\n---\n\n### Points to Cover in User\u2011\
      Facing Documentation  \n- **Purpose of `setup.py`** \u2013 explain that it is\
      \ the classic entry point for packaging with `setuptools`.  \n- **Current state**\
      \ \u2013 note that the script is a placeholder and does not contain required\
      \ fields.  \n- **Next steps for developers**  \n  - Add required arguments to\
      \ `setup()`, such as `\"name\"`, `\"version\"`, `\"description\"`, `\"author\"\
      `, `\"packages\"`, etc.  \n  - Optionally migrate metadata to a static `setup.cfg`\
      \ or a `pyproject.toml` (PEP\u202F517/518) for a modern, declarative build configuration.\
      \  \n- **Execution** \u2013 with a proper configuration, users can install the\
      \ project via `pip install .` or `python -m pip install .` from the repository\
      \ root.  \n\n---\n\n### Quick Reference (template)\n\n```python\n#!/usr/bin/env\
      \ python3\n\nfrom setuptools import setup, find_packages\n\nsetup(\n    name=\"\
      your-package-name\",\n    version=\"0.1.0\",\n    description=\"A short description\
      \ of the project.\",\n    author=\"Your Name\",\n    author_email=\"you@example.com\"\
      ,\n    url=\"https://github.com/your/repo\",\n    packages=find_packages(),\n\
      \    install_requires=[\n        # list runtime dependencies here\n    ],\n\
      \    python_requires=\">=3.8\",\n    # ...additional metadata...\n)\n```\n\n\
      *Replace the placeholder values with the actual project information.*\n    </content>\n\
