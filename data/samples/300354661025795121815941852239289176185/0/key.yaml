"## Project Overview  \n- **Package name:** `pip-outdated`  \n- **Current version:**\
  \ `\"0.8.0\"`  \n\n## Purpose  \nThe tool scans Python dependency files (e.g., `requirements.txt`,\
  \ `setup.cfg`) and reports any packages that have newer releases available.\n\n\
  ## Command\u2011Line Interface  \n\n| Option | Short | Long | Type | Default | Description\
  \ |\n|--------|-------|------|------|---------|-------------|\n| Verbose output\
  \ | `-v` | `--verbose` | flag | `False` | Print detailed information during execution.\
  \ |\n| Quiet mode | `-q` | `--quiet` | flag | `False` | Suppress exit\u2011code\u202F\
  1 when all dependencies are up\u2011to\u2011date. |\n| Input files | positional\
  \ | \u2014 | list of strings | `[\"requirements.txt\", \"setup.cfg\"]` | Files (or\
  \ glob patterns) from which to read dependencies. Multiple files can be supplied.\
  \ |\n\n### Example Invocations  \n```bash\npip-outdated               # uses default\
  \ files\npip-outdated -v my_pkg.txt\npip-outdated -q *.txt\n```\n\n## Core Execution\
  \ Flow  \n\n1. **Argument Parsing** (`parse_args`)  \n   - Uses `argparse.ArgumentParser`\
  \ with a helpful description and default\u2011help formatting.  \n   - Returns a\
  \ namespace containing `verbose`, `quiet`, and `file` values.\n\n2. **Entry Point**\
  \ (`main`)  \n   - Runs the asynchronous `_main` coroutine.  \n   - Uses `asyncio.get_event_loop().run_until_complete`\
  \ instead of `asyncio.run` to avoid closing the event loop (see linked aiohttp issue).\
  \  \n\n3. **Asynchronous Main Logic** (`_main`)  \n   - Retrieves parsed arguments.\
  \  \n   - Enables verbose mode via `verbose.set_verbose`.  \n   - Dynamically imports\
  \ the internal modules needed for the run:  \n     - `find_require` \u2013 discovers\
  \ dependency specifications from the supplied files.  \n     - `check_outdated`\
  \ \u2013 queries the Python Package Index (PyPI) to determine newer versions.  \n\
  \     - `print_outdated` \u2013 formats and outputs the results.  \n     - `session.get_session`\
  \ \u2013 provides an `aiohttp` client session for network calls.  \n   - Calls `find_require`\
  \ to produce a list of requirement objects.  \n   - Opens an asynchronous HTTP session\
  \ (`async with get_session() as session`).  \n   - For each requirement, creates\
  \ a task that runs `check_outdated` concurrently.  \n   - Awaits `print_outdated`,\
  \ passing the list of tasks and the `quiet` flag.  \n\n## Implementation Details\
  \  \n\n- **Asynchronous Design:**  \n  - Leveraging `asyncio` enables parallel querying\
  \ of PyPI for each package, improving performance over a sequential approach.  \n\
  \  - The event loop is manually managed to maintain compatibility with external\
  \ libraries that have known issues with `asyncio.run`.  \n\n- **Modular Structure:**\
  \  \n  - Core functionality is split across dedicated modules (`verbose`, `find_require`,\
  \ `check_outdated`, `print_outdated`, `session`). This keeps the entry script minimal\
  \ and promotes testability.  \n\n- **Extensibility Points:**  \n  - Adding support\
  \ for additional dependency file formats would involve extending `find_require`.\
  \  \n  - Custom output formatting could be achieved by modifying or replacing `print_outdated`.\
  \  \n\n## User\u2011Facing Documentation Hooks  \n\n- **Installation Instructions:**\
  \ (not in this file but required elsewhere)  \n  - Typically installed via `pip\
  \ install pip-outdated`.  \n\n- **Usage Section:**  \n  - Summarize the CLI options\
  \ and provide example commands as shown above.  \n\n- **Behavior Notes:**  \n  -\
  \ By default the tool exits with status\u202F1 when outdated packages are found;\
  \ this can be suppressed with `--quiet`.  \n  - Verbose mode prints additional diagnostic\
  \ messages, useful for debugging or advanced users.  \n\n- **Limitations & Known\
  \ Issues:**  \n  - The script avoids `asyncio.run` due to a known aiohttp bug; future\
  \ releases may update this once the upstream issue is resolved.  \n\n---  \n\n*These\
  \ notes capture the functional aspects of `pip_outdated/__init__.py` to aid in creating\
  \ clear, user\u2011oriented documentation.*"
