"## 3. Module Summaries\n\n| Module | Core Responsibility | Key Public API |\n|-------|----------------------|----------------|\n\
  | `__init__.py` | CLI orchestration (argument parsing, async loop handling) | `main()`,\
  \ `_main()`, `parse_args()` |\n| `__main__.py` | Standard \u201Cmodule\u2011as\u2011\
  script\u201D entry point | `python -m pip_outdated` |\n| `find_require.py` | Locate\
  \ and parse requirement specifications from files/globs | `find_require(files)`,\
  \ `parse_require(text)` |\n| `check_outdated.py` | Async version comparison against\
  \ PyPI | `OutdateResult` (dataclass), `check_outdated(require, session)` |\n| `session.py`\
  \ | Provide a pre\u2011configured `aiohttp.ClientSession` | `get_session()` |\n\
  | `print_outdated.py` | Render results as a colored table and manage exit status\
  \ | `print_outdated(outdates, quiet)` |\n| `verbose.py` | Global verbose flag storage\
  \ | `set_verbose(bool)`, `verbose()` |\n"
