"## `pip_outdated` \u2013 Directory\u2011Level Documentation Notes\n### 1. Project\
  \ Overview\n### 2. Command\u2011Line Interface (CLI)\n### 3. Core Modules & Their\
  \ Responsibilities\n### 4. Detailed Module Highlights\n#### `find_require.py`\n\
  - Supports both plain requirements files and `setup.cfg`.\n- Handles comments (`#`)\
  \ and line continuations (`\\\\`).\n- Strips command\u2011line style options before\
  \ creating `packaging.Requirement` objects.\n- Silently ignores invalid lines.\n\
  \n#### `check_outdated.py`\n- Uses `canonicalize_name` to match PyPI naming.\n-\
  \ `OutdateResult` captures:\n  - Original requirement, local version, all PyPI versions,\
  \ newest version satisfying the specifier (`wanted`), and absolute latest (`latest`).\n\
  - Provides helper properties (`install_not_found`, `outdated`, etc.) for easy status\
  \ checks.\n- Retrieves local version via `pip show` subprocess; fetches PyPI data\
  \ via `aiohttp`.\n- Verbose flag toggles per\u2011package diagnostic prints.\n\n\
  #### `print_outdated.py`\n- Initializes `colorama` for cross\u2011platform colour\
  \ support.\n- Builds an ASCII table (`terminaltables.AsciiTable`).\n- Colour logic:\n\
  \  - **Red** \u2013 missing, unavailable, or outdated.\n  - **Green** \u2013 updatable.\n\
  - Prints a legend, the table, and exits with status\u202F1 unless `quiet` is true.\n\
  - Handles three terminal states: no requirements, everything up\u2011to\u2011date,\
  \ or some packages outdated.\n\n#### `session.py`\n- Returns a fresh `aiohttp.ClientSession`\
  \ each call.\n- Sets default `User-Agent: pip-outdated`.\n- Limits concurrent connections\
  \ to 5 via `TCPConnector`.\n\n#### `verbose.py`\n- Simple module\u2011level storage\
  \ of a global `VERBOSE` flag.\n- Functions `set_verbose(bool)` and `verbose()` access\
  \ or modify the flag.\n- Not thread\u2011safe \u2013 intended for single\u2011threaded\
  \ CLI usage.\n\n---\n"
