"## Project Overview  \n- **Name:** `pip-outdated`  \n- **Purpose:** Detect outdated,\
  \ missing, or incompatible packages in `requirements.txt` or `setup.cfg` files and\
  \ present results in a colored table.  \n- **Key Benefit:** Provides a focused view\
  \ of problems with dependency specifications, complementing `pip list --outdated`\
  \ which only lists updatable packages.  \n\n## Installation  \n```bash\npip install\
  \ pip-outdated\n```  \n\n*Package is published on PyPI.*  \n\n## Basic Usage  \n\
  \n```bash\npip-outdated [-h] [-v] [-q] [<file> [<file> ...]]\n```  \n\n### Positional\
  \ argument `<file>`  \n- Accepts one or more requirement files.  \n- Supports glob\
  \ patterns.  \n- Default files: `requirements.txt`, `setup.cfg`.  \n\n### Common\
  \ examples  \n- **Multiple requirement files** (e.g., `test-requirements.txt`, `dev-requirements.txt`):\
  \  \n\n  ```bash\n  pip-outdated *-requirements.txt\n  ```  \n\n- **All files in\
  \ a folder** (`requirements/*.txt`):  \n\n  ```bash\n  pip-outdated requirements/*.txt\n\
  \  ```  \n\n## Options  \n\n| Option | Description | Default |\n|--------|-------------|---------|\n\
  | `-h`, `--help` | Show help message and exit. | \u2013 |\n| `-v`, `--verbose` |\
  \ Print verbose information. | `False` |\n| `-q`, `--quiet` | Do **not** return\
  \ exit code\u202F1 when some dependencies are outdated. | `False` |\n\n## Feature\
  \ Highlights  \n\n- Parses version specifiers from both `requirements.txt` **and**\
  \ `setup.cfg`.  \n- Detects missing, outdated, and incompatible packages.  \n- Displays\
  \ results in a color\u2011coded table for quick visual scanning.  \n- Handles glob\
  \ patterns for flexible file selection.  \n- Uses the `pip` CLI to obtain installed\
  \ package versions, ensuring accurate results inside virtual environments.  \n\n\
  ## Todos (Planned Enhancements)  \n\n- Add command\u2011line options to **update\
  \ packages** automatically.  \n- Add options to **modify** `requirements.txt` /\
  \ `setup.cfg` with corrected versions.  \n- Add a global listing mode (e.g., `-g`,\
  \ `--global`) to list **all** updatable packages regardless of specifiers.  \n\n\
