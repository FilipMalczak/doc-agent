  \ namespace for managing a global *verbose* flag used throughout the project.  \n\
  - **Key elements:**  \n  - `VERBOSE: bool = None` \u2013 global variable that stores\
  \ the current verbosity state.  \n  - `set_verbose(value: bool) -> None` \u2013\
  \ function to set the global `VERBOSE` flag.  \n  - `verbose() -> bool` \u2013 function\
