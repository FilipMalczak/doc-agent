- content: "**File:** `pip_outdated/check_outdated.py`  \n**Language:** Python  \n\
    \n---\n\n### Overview\nThe module inspects a Python package requirement, compares\
    \ the installed version with the versions available on PyPI, and reports whether\
    \ the package is outdated, missing, or not satisfying the specified constraints.\n\
    \n---\n\n### Key Components\n\n#### 1. `OutdateResult` (dataclass)\n- **Fields**\n\
    \  - `requirement: Requirement` \u2013 The original requirement object.\n  - `version:\
    \ Optional[Version]` \u2013 The locally installed version (or `None` if not installed).\n\
    \  - `all_versions: List[Version]` \u2013 All non\u2011prerelease versions fetched\
    \ from PyPI, sorted ascending.\n  - `wanted: Optional[Version]` \u2013 The newest\
    \ version that satisfies the requirement\u2019s specifier (computed in `__post_init__`).\n\
    \  - `latest: Optional[Version]` \u2013 The absolute newest version on PyPI (computed\
    \ in `__post_init__`).\n\n- **Methods**\n  - `name` \u2013 Returns the requirement\u2019\
    s package name.\n  - `install_not_found()` \u2013 `True` when the package isn\u2019\
    t installed locally.\n  - `install_not_wanted()` \u2013 `True` when the installed\
    \ version does not satisfy the requirement\u2019s specifier.\n  - `pypi_not_found()`\
    \ \u2013 `True` when no versions were retrieved from PyPI.\n  - `outdated()` \u2013\
    \ `True` when the installed version differs from either the wanted or the latest\
    \ version.\n\n- **Behaviour of `__post_init__`**\n  - Determines `wanted` by scanning\
    \ `all_versions` in reverse (newest\u2011first) and picking the first version\
    \ that matches the specifier.\n  - Sets `latest` to the last element of `all_versions`\
    \ (the highest version).\n\n#### 2. Asynchronous Helper Functions\n- `async get_local_version(name:\
    \ str) -> Optional[Version]`\n  - Executes `pip show <name>` in a subprocess.\n\
    \  - Parses the line beginning with `\"Version: \"` and returns a `Version` object.\n\
    \  - Returns `None` if `pip` fails or the version line is missing.\n\n- `async\
    \ get_pypi_versions(name: str, session) -> List[Version]`\n  - Performs an HTTP\
    \ GET request to `https://pypi.org/pypi/<name>/json`.\n  - Extracts version strings\
    \ from the `\"releases\"` dictionary.\n  - Filters out entries that raise `InvalidVersion`\
    \ or are prereleases.\n  - Returns a sorted list of `Version` objects.\n\n- `async\
    \ check_outdated(require, session) -> OutdateResult`\n  - Prints a debug line\
    \ when `verbose()` is enabled.\n  - Normalises the package name via `canonicalize_name`.\n\
    \  - Retrieves the local version and PyPI versions concurrently.\n  - Constructs\
    \ and returns an `OutdateResult` instance.\n\n#### 3. External Dependencies\n\
    - `packaging` \u2013 for requirement parsing, canonical name handling, and version\
    \ objects.\n- `asyncio` \u2013 subprocess handling and overall async workflow.\n\
    - `aiohttp` (implicitly via the `session` argument) \u2013 asynchronous HTTP client.\n\
    - Local module `.verbose` \u2013 provides a function returning a truthy value\
    \ when verbose mode is active.\n\n---\n\n### Notable Implementation Details\n\
    - **Version Selection Logic**\n  - `wanted` is the latest PyPI version that satisfies\
    \ the requirement\u2019s specifier, *not* the newest version overall. This matches\
    \ typical \u201Cupdate if it still meets the constraint\u201D semantics.\n- **Prerelease\
    \ Filtering**\n  - Prerelease versions (`is_prerelease`) are excluded entirely\
    \ from the candidate list, ensuring only stable releases influence `wanted` and\
    \ `latest`.\n- **Error Handling**\n  - If `pip show` fails (e.g., the package\
    \ isn\u2019t installed), `get_local_version` gracefully returns `None`.\n  - HTTP\
    \ errors are propagated via `raise_for_status()`, which will raise an exception\
    \ that callers must handle.\n\n---\n\n### Potential Improvements / Edge Cases\n\
    - **Parallelization**\n  - `check_outdated` currently awaits `get_local_version`\
    \ then `get_pypi_versions`. Both calls are independent and could be gathered with\
    \ `asyncio.gather` for a speed boost.\n- **Robustness of `pip show` Parsing**\n\
    \  - The current parser assumes the `\"Version: \"` line appears verbatim. Adding\
    \ a fallback to handle localized output or varying whitespace could improve reliability.\n\
    - **Handling of Missing PyPI Package**\n  - When a package does not exist on PyPI,\
    \ `get_pypi_versions` will raise an HTTP error. Converting this to a `pypi_not_found`\
    \ flag inside `OutdateResult` would keep the API consistent.\n- **Testing for\
    \ Empty `all_versions`**\n  - `OutdateResult.__post_init__` accesses `self.all_versions[-1]`.\
    \ If the list is empty (e.g., all releases invalid/prerelease), this will raise\
    \ `IndexError`. Adding a guard would avoid crashes.\n- **Verbose Output Formatting**\n\
    \  - The print statement could include `repr` or quoting to make debugging clearer:\
    \ `print(f\"Checking: {require.name!r} {require.specifier!r}\")`.\n- **Type Annotations\
    \ for `require`**\n  - The `check_outdated` signature accepts `require` without\
    \ an explicit type. Annotating it as `Requirement` would improve IDE support.\n\
    \n---\n\n### Quick Reference (Markdown)\n\n```markdown\n- **OutdateResult**\n\
    \  - `requirement`: original `Requirement`\n  - `version`: local `Version` or\
    \ `None`\n  - `all_versions`: sorted list of available `Version`s\n  - `wanted`:\
    \ latest compatible version (computed)\n  - `latest`: newest PyPI version (computed)\n\
    \n- **Helpers**\n  - `get_local_version(name)`: runs `pip show`, extracts version\n\
    \  - `get_pypi_versions(name, session)`: fetches JSON from PyPI, filters/ sorts\
    \ versions\n  - `check_outdated(require, session)`: orchestrates the check, returns\
    \ `OutdateResult`\n\n- **Key Flags**\n  - `install_not_found()`: not installed\
    \ locally\n  - `install_not_wanted()`: installed but does not satisfy specifier\n\
    \  - `pypi_not_found()`: no versions retrieved from PyPI\n  - `outdated()`: installed\
    \ version differs from wanted or latest\n```"
