      \ of knowledge that can be later used to prepare user-facing documentation of\
      \ the project that the input file is part of; explain why you think that each\
      \ statement is a fact; facts should include all the necessary details to be\
      \ understandable without additional context; make sure not to make statements\
      \ like 'there is one <something>', contextualize instead, resulting in 'there\
      \ is one <something> in <this file>'.</detailed>\n</task>"
