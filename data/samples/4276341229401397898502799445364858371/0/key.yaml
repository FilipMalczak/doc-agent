"- **Module purpose**: Provides asynchronous utilities to determine whether installed\
  \ Python packages are outdated compared to the versions available on PyPI.  \n-\
  \ **Key class \u2013 `OutdateResult`**  \n  - Holds the result of a single requirement\
  \ check.  \n  - Fields:  \n    - `requirement` \u2013 the original `Requirement`\
  \ object.  \n    - `version` \u2013 currently installed `Version` (or `None`). \
  \ \n    - `all_versions` \u2013 list of all non\u2011prerelease `Version`s found\
  \ on PyPI.  \n    - `wanted` \u2013 newest version that satisfies the requirement\
  \ specifier (populated in `__post_init__`).  \n    - `latest` \u2013 newest version\
  \ overall on PyPI.  \n  - Helper methods:  \n    - `install_not_found()` \u2013\
  \ `True` when the package is not installed.  \n    - `install_not_wanted()` \u2013\
  \ `True` when the installed version does not satisfy the requirement specifier.\
  \  \n    - `pypi_not_found()` \u2013 `True` when no versions could be retrieved\
  \ from PyPI.  \n    - `outdated()` \u2013 `True` when the installed version differs\
  \ from either the wanted or latest version.  \n- **Key asynchronous functions**\
  \  \n  - `get_local_version(name: str) -> Optional[Version]`  \n    - Executes `pip\
  \ show <name>` in a subprocess.  \n    - Parses the `Version:` line and returns\
  \ a `Version` object, or `None` on failure.  \n  - `get_pypi_versions(name: str,\
  \ session) -> List[Version]`  \n    - Fetches the JSON metadata for the package\
  \ from `https://pypi.org/pypi/<name>/json`.  \n    - Extracts, validates, and sorts\
  \ all non\u2011prerelease `Version`s, discarding invalid entries.  \n  - `check_outdated(require,\
  \ session) -> OutdateResult`  \n    - Normalizes the requirement name using `canonicalize_name`.\
  \  \n    - Retrieves the local version and the full list of PyPI versions.  \n \
  \   - Returns an `OutdateResult` instance.  \n    - Prints a debug line (`Checking:\
  \ \u2026`) when `verbose()` is enabled.  \n- **Dependencies & environment expectations**\
  \  \n  - Relies on the `packaging` library (`Requirement`, `Version`, `canonicalize_name`).\
  \  \n  - Requires an asynchronous HTTP client session (e.g., `aiohttp.ClientSession`)\
  \ to be passed to `check_outdated`.  \n  - Assumes the `pip` command is available\
  \ in the runtime environment.  \n  - Uses the project's `.verbose.verbose` helper\
  \ for optional logging.  \n- **Error handling & edge cases**  \n  - `get_local_version`\
  \ returns `None` if `pip show` fails (e.g., package not installed).  \n  - `get_pypi_versions`\
  \ skips invalid or prerelease version strings.  \n  - `OutdateResult.__post_init__`\
  \ safely handles an empty `all_versions` list; `wanted` remains `None` if no matching\
  \ version is found.  \n- **Maintainer usage notes**  \n  - Ensure an async HTTP\
  \ session is created and passed to `check_outdated` (commonly via `aiohttp`).  \n\
  \  - Consider catching exceptions from `check_outdated` at a higher level to handle\
  \ network failures.  \n  - Verbose mode can aid debugging but may be disabled in\
  \ production.  \n  - The module is designed for integration into higher\u2011level\
  \ commands that iterate over a list of requirements and aggregate `OutdateResult`s\
  \ for user\u2011facing reporting."
